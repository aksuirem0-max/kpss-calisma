<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hücre Ustası</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #e2e8f0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* YILDIZ ARKA PLAN */
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 3s infinite alternate;
}
@keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.6; } }

.oyun-alani {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto; padding: 16px;
}

/* ÜSTTE DURUM ÇUBUĞU */
.durum {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(30,41,59,0.9); border-radius: 16px;
  padding: 10px 16px; margin-bottom: 14px;
  border: 1px solid #1e3a5f;
}
.seviye-chip {
  background: linear-gradient(135deg, #1e3a8a, #3b82f6);
  border-radius: 20px; padding: 4px 12px;
  font-size: 0.75rem; font-weight: 700; color: #fff;
}
.puan-goster { font-size: 1.2rem; font-weight: 800; color: #fbbf24; }
.seri-chip {
  background: #7c3aed; border-radius: 20px; padding: 4px 10px;
  font-size: 0.75rem; font-weight: 700; color: #fff;
  transition: all 0.3s;
}
.seri-chip.aktif { background: #f59e0b; color: #0a0a1a; animation: pulse 0.5s; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }

/* KURAL ÖZET */
.kural-ozet {
  background: rgba(15,23,42,0.95); border-radius: 12px;
  padding: 10px 14px; margin-bottom: 14px;
  border-left: 3px solid #3b82f6; font-size: 0.78rem; color: #94a3b8;
  cursor: pointer;
}
.kural-ozet b { color: #60a5fa; }
.kural-detay { display: none; margin-top: 8px; }
.kural-detay.acik { display: block; }

/* SORU KARTI */
.soru-kart {
  background: rgba(15,23,42,0.95);
  border-radius: 20px; padding: 18px;
  margin-bottom: 14px;
  border: 1px solid #1e3a5f;
  animation: slideIn 0.4s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.soru-baslik {
  text-align: center; font-size: 0.85rem;
  color: #60a5fa; margin-bottom: 4px; font-weight: 700;
}
.boss-label {
  text-align: center; font-size: 0.9rem;
  color: #f59e0b; margin-bottom: 8px; font-weight: 800;
  animation: bossPulse 1s infinite alternate;
}
@keyframes bossPulse { from{color:#f59e0b;} to{color:#ef4444;} }

.soru-metin {
  background: rgba(0,0,0,0.3); border-radius: 8px;
  padding: 10px 12px; margin-bottom: 14px;
  font-size: 0.83rem; color: #cbd5e1; line-height: 1.6;
  border-left: 3px solid #f59e0b;
}

/* TABLO */
.tablo-wrap { overflow-x: auto; margin-bottom: 16px; }
table.ghucre {
  border-collapse: separate; border-spacing: 3px;
  margin: 0 auto;
}
table.ghucre td {
  width: 46px; height: 46px; text-align: center;
  font-size: 1rem; font-weight: 800; border-radius: 8px;
}
.h-baslik { background: #1e293b; color: #475569; font-size: 0.7rem; font-weight: 600; width: 30px; }
.h-sabit { background: #1e3a5f; color: #60a5fa; border: 1.5px solid #3b82f6; }
.h-bos { background: #0f172a; color: #334155; border: 1px solid #1e293b; }
.h-input-wrap { background: #111827; border-radius: 8px; border: 2px solid #334155; }
.h-input-wrap:focus-within { border-color: #f59e0b; }
.h-input {
  width: 42px; height: 42px; background: transparent;
  border: none; color: #fbbf24; font-size: 1.1rem; font-weight: 800;
  text-align: center; outline: none; border-radius: 6px;
}
.h-dogru { background: #052e16; border: 2px solid #4ade80; color: #4ade80; animation: dogruAnim 0.4s; }
@keyframes dogruAnim { 0%{transform:scale(0.8);} 60%{transform:scale(1.15);} 100%{transform:scale(1);} }
.h-yanlis { background: #2d0a0a; border: 2px solid #ef4444; color: #ef4444; animation: yanlisSallan 0.4s; }
@keyframes yanlisSallan { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

/* BUTONLAR */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  flex: 1; padding: 11px 10px; border-radius: 12px;
  border: none; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; min-width: 80px;
}
.btn:active { transform: scale(0.95); }
.btn-kontrol { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; }
.btn-ipucu { background: rgba(124,58,237,0.3); color: #a78bfa; border: 1px solid #7c3aed; }
.btn-ipucu.kullanildi { opacity: 0.4; pointer-events: none; }
.btn-atla { background: rgba(51,65,85,0.5); color: #64748b; border: 1px solid #334155; font-size: 0.78rem; }

/* MESAJ */
.mesaj-alani {
  border-radius: 12px; padding: 12px 14px; margin-top: 12px;
  font-size: 0.85rem; line-height: 1.6; display: none;
}
.mesaj-dogru { background: #052e16; color: #4ade80; border: 1px solid #166534; display: block; }
.mesaj-yanlis { background: #2d0a0a; color: #f87171; border: 1px solid #991b1b; display: block; }
.mesaj-ipucu { background: #1c1400; color: #fbbf24; border: 1px solid #92400e; display: block; }

/* İLERLEME ÇUBUĞU */
.ilerleme-wrap { margin-bottom: 12px; }
.ilerleme-bilgi { display: flex; justify-content: space-between; font-size: 0.75rem; color: #475569; margin-bottom: 4px; }
.ilerleme-bar { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
.ilerleme-dolu { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 10px; transition: width 0.5s ease; }

/* PUAN ANIMASYONU */
.puan-pop {
  position: fixed; font-size: 1.5rem; font-weight: 900;
  color: #fbbf24; pointer-events: none; z-index: 999;
  animation: puanUc 1.2s ease forwards;
}
@keyframes puanUc { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-80px) scale(1.5);} }

/* SEVİYE GEÇİŞ EKRANI */
.seviye-gecis {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 30px;
}
.seviye-gecis.aktif { display: flex; }
.seviye-gecis h2 { font-size: 2rem; margin-bottom: 8px; }
.seviye-gecis p { color: #94a3b8; margin-bottom: 24px; }
.btn-devam {
  padding: 14px 40px; border-radius: 14px;
  background: linear-gradient(135deg, #1d4ed8, #7c3aed);
  color: #fff; font-size: 1rem; font-weight: 800;
  border: none; cursor: pointer;
}

/* BİTİŞ EKRANI */
.bitis-ekran {
  display: none; text-align: center; padding: 30px 20px;
  animation: slideIn 0.5s ease;
}
.bitis-ekran.aktif { display: block; }
.bitis-puan { font-size: 3rem; font-weight: 900; color: #fbbf24; }
.bitis-yildiz { font-size: 2.5rem; margin: 10px 0; }
.btn-tekrar {
  margin-top: 20px; padding: 14px 40px; border-radius: 14px;
  background: linear-gradient(135deg, #1d4ed8, #7c3aed);
  color: #fff; font-size: 1rem; font-weight: 800;
  border: none; cursor: pointer; display: inline-block;
}
</style>
</head>
<body>

<canvas class="stars" id="stars"></canvas>

<div class="oyun-alani">

  <!-- DURUM ÇUBUĞU -->
  <div class="durum">
    <div>
      <div class="seviye-chip" id="seviyeChip">⚔️ Çaylak</div>
    </div>
    <div class="puan-goster" id="puanGoster">0</div>
    <div class="seri-chip" id="seriChip">🔥 0 seri</div>
  </div>

  <!-- İLERLEME -->
  <div class="ilerleme-wrap">
    <div class="ilerleme-bilgi">
      <span id="soruBilgi">Soru 1/4</span>
      <span id="seviyeBilgi">Çaylak Seviyesi</span>
    </div>
    <div class="ilerleme-bar">
      <div class="ilerleme-dolu" id="ilerlemeBar" style="width:0%"></div>
    </div>
  </div>

  <!-- KURAL ÖZET -->
  <div class="kural-ozet" onclick="kuralToggle()">
    <b>📋 Kurallar (tıkla)</b> — Her satırda 1-6 birer kez | Komşu fark <b>≥ 3</b>
    <div class="kural-detay" id="kuralDetay">
      <br>
      <b style="color:#4ade80">Komşu olabilenler:</b><br>
      1 → 4,5,6 &nbsp;|&nbsp; 2 → 5,6 &nbsp;|&nbsp; 3 → 6<br>
      4 → 1 &nbsp;|&nbsp; 5 → 1,2 &nbsp;|&nbsp; 6 → 1,2,3
    </div>
  </div>

  <!-- SORU ALANI -->
  <div id="soruAlani"></div>

  <!-- SEVİYE GEÇİŞ -->
  <div class="seviye-gecis" id="seviyeGecis">
    <div style="font-size:4rem" id="seviyeEmoji">🎉</div>
    <h2 id="seviyeBaslik">Seviye Tamamlandı!</h2>
    <p id="seviyeAciklama">Harika gidiyorsun!</p>
    <button class="btn-devam" onclick="seviyeDevam()">Devam Et →</button>
  </div>

  <!-- BİTİŞ -->
  <div class="bitis-ekran" id="bitisEkran">
    <div style="font-size:3rem">🏆</div>
    <div class="bitis-puan" id="bitis-puan">0</div>
    <div style="color:#94a3b8; margin-bottom:4px">toplam puan</div>
    <div class="bitis-yildiz" id="bitisYildiz">⭐⭐⭐</div>
    <div style="color:#cbd5e1; font-size:0.9rem" id="bitisYorum"></div>
    <button class="btn-tekrar" onclick="oyunuBaslat()">🔄 Tekrar Oyna</button>
  </div>

</div>

<script>
// ===== YILDIZLAR =====
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  const r = Math.random() * 1.5;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.5 + 0.1})`;
  ctx.fill();
}

// ===== OYUN DURUMU =====
let mevcutSeviye = 0;
let mevcutSoru = 0;
let toplamPuan = 0;
let seri = 0;
let ipucuKullanildi = false;

function oyunuBaslat() {
  mevcutSeviye = 0;
  mevcutSoru = 0;
  toplamPuan = 0;
  seri = 0;
  document.getElementById('bitisEkran').classList.remove('aktif');
  soruGoster();
}

function soruGoster() {
  const sv = seviyeler[mevcutSeviye];
  const s = sv.sorular[mevcutSoru];
  ipucuKullanildi = false;

  // Durum güncelle
  document.getElementById('seviyeChip').textContent = sv.emoji + ' ' + sv.ad;
  document.getElementById('seviyeChip').style.background = `linear-gradient(135deg, ${sv.renk}88, ${sv.renk})`;
  document.getElementById('puanGoster').textContent = toplamPuan;
  seriGuncelle();

  // İlerleme
  const toplamSoru = seviyeler.reduce((a, s) => a + s.sorular.length, 0);
  const tamamlanan = seviyeler.slice(0, mevcutSeviye).reduce((a, s) => a + s.sorular.length, 0) + mevcutSoru;
  document.getElementById('ilerlemeBar').style.width = (tamamlanan / toplamSoru * 100) + '%';
  document.getElementById('soruBilgi').textContent = `Soru ${mevcutSoru + 1}/${sv.sorular.length}`;
  document.getElementById('seviyeBilgi').textContent = sv.ad + ' Seviyesi';

  // Tablo oluştur
  let html = `<div class="soru-kart">`;
  if (s.boss) html += `<div class="boss-label">⚡ BOSS SORU ⚡</div>`;
  html += `<div class="soru-baslik">${sv.emoji} ${sv.ad} — Soru ${mevcutSoru + 1}</div>`;
  html += `<div class="soru-metin">${s.metin}</div>`;
  html += `<div class="tablo-wrap"><table class="ghucre">`;

  // Başlık satırı
  html += `<tr><td class="h-baslik"></td>`;
  for (let k = 1; k <= 6; k++) html += `<td class="h-baslik">S${k}</td>`;
  html += `</tr>`;

  // Satır 1
  html += `<tr><td class="h-baslik">R1</td>`;
  for (let k = 1; k <= 6; k++) {
    const val = s.satir1[k];
    if (s.hedef.satir === 1 && s.hedef.sutun === k) {
      html += `<td class="h-input-wrap"><input class="h-input" id="cevapInput" type="number" min="0" max="9" placeholder="?"></td>`;
    } else if (val !== null && val !== undefined) {
      html += `<td class="h-sabit">${val}</td>`;
    } else {
      html += `<td class="h-bos">·</td>`;
    }
  }
  html += `</tr>`;

  // Satır 2
  html += `<tr><td class="h-baslik">R2</td>`;
  for (let k = 1; k <= 6; k++) {
    const val = s.satir2[k];
    if (s.hedef.satir === 2 && s.hedef.sutun === k) {
      html += `<td class="h-input-wrap"><input class="h-input" id="cevapInput" type="number" min="0" max="9" placeholder="?"></td>`;
    } else if (val !== null && val !== undefined) {
      html += `<td class="h-sabit">${val}</td>`;
    } else {
      html += `<td class="h-bos">·</td>`;
    }
  }
  html += `</tr></table></div>`;

  html += `<div class="btn-row">
    <button class="btn btn-kontrol" onclick="kontrol()">✓ Kontrol</button>
    <button class="btn btn-ipucu" id="ipucuBtn" onclick="ipucuGoster()">💡 İpucu (-3p)</button>
    <button class="btn btn-atla" onclick="sonrakiSoru(false)">Atla →</button>
  </div>
  <div class="mesaj-alani" id="mesajAlani"></div>
  </div>`;

  document.getElementById('soruAlani').innerHTML = html;

  // Enter ile kontrol
  setTimeout(() => {
    const inp = document.getElementById('cevapInput');
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') kontrol(); });
  }, 100);
}

function kontrol() {
  const input = document.getElementById('cevapInput');
  const mesaj = document.getElementById('mesajAlani');
  const s = seviyeler[mevcutSeviye].sorular[mevcutSoru];

  if (!input || input.value === '') {
    mesaj.className = 'mesaj-alani mesaj-yanlis';
    mesaj.textContent = 'Bir değer gir!';
    return;
  }

  const val = parseInt(input.value);

  if (val === s.cevap) {
    let puan = s.boss ? 20 : 10;
    if (ipucuKullanildi) puan -= 3;
    if (seri >= 2) { puan *= 2; }
    seri++;
    toplamPuan += puan;
    document.getElementById('puanGoster').textContent = toplamPuan;
    seriGuncelle();

    mesaj.className = 'mesaj-alani mesaj-dogru';
    const seriBonus = seri > 2 ? ` 🔥 ${seri} Seri! 2x Bonus!` : '';
    mesaj.innerHTML = `✅ Doğru! +${puan} puan${seriBonus}<br><small style="opacity:0.8">${s.aciklama}</small>`;

    puanAnimasyonu('+' + puan);

    setTimeout(() => sonrakiSoru(true), 1800);
  } else {
    seri = 0;
    seriGuncelle();
    mesaj.className = 'mesaj-alani mesaj-yanlis';
    mesaj.textContent = `❌ Yanlış. Tekrar dene. (İpucu al?)`;
    input.style.animation = 'yanlisSallan 0.4s';
    setTimeout(() => { if (input) input.style.animation = ''; }, 400);
  }
}

function ipucuGoster() {
  const s = seviyeler[mevcutSeviye].sorular[mevcutSoru];
  const mesaj = document.getElementById('mesajAlani');
  const btn = document.getElementById('ipucuBtn');
  ipucuKullanildi = true;
  btn.classList.add('kullanildi');
  mesaj.className = 'mesaj-alani mesaj-ipucu';
  mesaj.innerHTML = `💡 <b>İpucu:</b> ${s.ipucu}`;
}

function sonrakiSoru(dogru) {
  const sv = seviyeler[mevcutSeviye];

  if (mevcutSoru < sv.sorular.length - 1) {
    mevcutSoru++;
    soruGoster();
  } else {
    // Seviye bitti
    if (mevcutSeviye < seviyeler.length - 1) {
      seviyeGecisGoster();
    } else {
      oyunBitti();
    }
  }
}

function seviyeGecisGoster() {
  const sv = seviyeler[mevcutSeviye];
  const sonraki = seviyeler[mevcutSeviye + 1];
  const gecis = document.getElementById('seviyeGecis');
  document.getElementById('seviyeEmoji').textContent = sonraki.emoji;
  document.getElementById('seviyeBaslik').textContent = sv.ad + ' Tamamlandı! 🎉';
  document.getElementById('seviyeAciklama').textContent = `Sıradaki: ${sonraki.ad} Seviyesi`;
  gecis.classList.add('aktif');
}

function seviyeDevam() {
  document.getElementById('seviyeGecis').classList.remove('aktif');
  mevcutSeviye++;
  mevcutSoru = 0;
  soruGoster();
}

function oyunBitti() {
  document.getElementById('soruAlani').innerHTML = '';
  const bitis = document.getElementById('bitisEkran');
  document.getElementById('bitis-puan').textContent = toplamPuan;

  const maxPuan = seviyeler.reduce((a, sv) => a + sv.sorular.reduce((b, s) => b + (s.boss ? 40 : 20), 0), 0);
  const oran = toplamPuan / maxPuan;

  let yildiz = '⭐';
  let yorum = 'Daha fazla pratik yap!';
  if (oran >= 0.8) { yildiz = '⭐⭐⭐'; yorum = 'Mükemmel! Gerçek KPSS\'ye hazırsın.'; }
  else if (oran >= 0.5) { yildiz = '⭐⭐'; yorum = 'İyi gidiyorsun, biraz daha pratik!'; }

  document.getElementById('bitisYildiz').textContent = yildiz;
  document.getElementById('bitisYorum').textContent = yorum;
  bitis.classList.add('aktif');
}

function seriGuncelle() {
  const chip = document.getElementById('seriChip');
  chip.textContent = `🔥 ${seri} seri`;
  if (seri >= 3) chip.classList.add('aktif');
  else chip.classList.remove('aktif');
}

function puanAnimasyonu(metin) {
  const el = document.createElement('div');
  el.className = 'puan-pop';
  el.textContent = metin;
  el.style.left = (window.innerWidth / 2 - 40) + 'px';
  el.style.top = '120px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function kuralToggle() {
  const d = document.getElementById('kuralDetay');
  d.classList.toggle('acik');
}

// Başlat
oyunuBaslat();
</script>
