<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sözcükte Yapı – Test 2: Çekim Ekleri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222635;
    --border: #2e3247;
    --accent: #6c63ff;
    --accent-dim: rgba(108,99,255,0.12);
    --correct: #22c55e;
    --correct-dim: rgba(34,197,94,0.12);
    --wrong: #ef4444;
    --wrong-dim: rgba(239,68,68,0.12);
    --text: #e8e9f0;
    --text-muted: #8b8fa8;
    --text-dim: #545870;
    --gold: #f5c842;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-tag { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .header-title { font-family: 'Crimson Pro', serif; font-size: 20px; font-weight: 600; color: var(--text); }

  .scoreboard { display: flex; gap: 20px; align-items: center; }
  .score-item { text-align: center; line-height: 1.2; }
  .score-num { font-size: 22px; font-weight: 600; }
  .score-num.correct { color: var(--correct); }
  .score-num.wrong { color: var(--wrong); }
  .score-num.total { color: var(--accent); }
  .score-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }

  .progress-bar { height: 3px; background: var(--border); position: sticky; top: 65px; z-index: 99; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); transition: width .4s ease; width: 0%; }

  main { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }

  .intro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 32px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .intro-icon { font-size: 28px; flex-shrink: 0; }
  .intro-text h2 { font-family: 'Crimson Pro', serif; font-size: 18px; margin-bottom: 6px; }
  .intro-text p { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color .2s;
  }

  .question-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .q-num {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .q-text {
    font-family: 'Crimson Pro', serif;
    font-size: 16.5px;
    line-height: 1.55;
    flex: 1;
  }
  .q-text em { font-style: italic; }
  .q-text u { text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 3px; }
  .q-text .bold { font-weight: 600; }
  .q-text .ask { display: block; margin-top: 10px; font-weight: 600; font-size: 15.5px; color: var(--text); }
  .q-text .list-item { display: block; margin: 3px 0 3px 12px; color: var(--text-muted); font-size: 14.5px; }

  .options { padding: 14px 20px 18px; display: flex; flex-direction: column; gap: 8px; }

  .option-btn {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer; text-align: left;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: var(--text);
    transition: border-color .15s, background .15s;
    width: 100%; line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }

  .option-label {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0; color: var(--text-muted);
    transition: border-color .15s, background .15s, color .15s;
  }
  .option-btn:hover:not(:disabled) .option-label { border-color: var(--accent); color: var(--accent); }

  .option-btn.selected-correct { border-color: var(--correct); background: var(--correct-dim); }
  .option-btn.selected-correct .option-label { background: var(--correct); border-color: var(--correct); color: #fff; }

  .option-btn.selected-wrong { border-color: var(--wrong); background: var(--wrong-dim); }
  .option-btn.selected-wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  .option-btn.reveal-correct { border-color: var(--correct); background: var(--correct-dim); }
  .option-btn.reveal-correct .option-label { border-color: var(--correct); color: var(--correct); }

  .option-btn:disabled { cursor: default; }

  .explanation { margin: 0 20px 18px; border-radius: 8px; overflow: hidden; display: none; }
  .explanation.show { display: block; }

  .exp-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .exp-header.correct-exp {
    background: var(--correct-dim); color: var(--correct);
    border: 1px solid rgba(34,197,94,.25); border-bottom: none;
    border-radius: 8px 8px 0 0;
  }
  .exp-header.wrong-exp {
    background: var(--wrong-dim); color: var(--wrong);
    border: 1px solid rgba(239,68,68,.25); border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  .exp-body {
    background: var(--surface2);
    border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 14px; font-size: 13.5px; line-height: 1.7;
    color: var(--text-muted);
  }
  .exp-body strong { color: var(--text); }
  .exp-body .cevap { color: var(--correct); font-weight: 600; }
  .exp-body .yanlis { color: var(--wrong); }
  .exp-body .hatirla {
    display: block; margin-top: 10px;
    padding: 10px 12px;
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    color: var(--text); font-size: 13px;
  }
  .exp-body .kural {
    display: block; margin-top: 8px;
    padding: 8px 12px;
    background: rgba(245,200,66,.06);
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    color: #e8d98a; font-size: 13px;
  }

  #result-screen { display: none; text-align: center; padding: 48px 20px; }
  .result-icon { font-size: 64px; margin-bottom: 16px; }
  .result-title { font-family: 'Crimson Pro', serif; font-size: 36px; margin-bottom: 8px; }
  .result-sub { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
  .result-stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 36px; }
  .rstat { text-align: center; }
  .rstat-n { font-size: 40px; font-weight: 700; line-height: 1; }
  .rstat-l { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); margin-top: 4px; }
  .rstat-n.green { color: var(--correct); }
  .rstat-n.red { color: var(--wrong); }
  .rstat-n.purple { color: var(--accent); }

  .restart-btn {
    padding: 14px 36px; border-radius: 8px;
    background: var(--accent); color: #fff; border: none;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .restart-btn:hover { opacity: .85; }

  @media (max-width: 600px) {
    .scoreboard { gap: 12px; }
    .score-num { font-size: 18px; }
    header { padding: 14px 16px; }
    main { padding: 20px 12px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-tag">Sözcükte Yapı</span>
    <span class="header-title">Test 2 — Çekim Ekleri</span>
  </div>
  <div class="scoreboard">
    <div class="score-item">
      <div class="score-num correct" id="sc-correct">0</div>
      <div class="score-label">Doğru</div>
    </div>
    <div class="score-item">
      <div class="score-num wrong" id="sc-wrong">0</div>
      <div class="score-label">Yanlış</div>
    </div>
    <div class="score-item">
      <div class="score-num total" id="sc-left">13</div>
      <div class="score-label">Kalan</div>
    </div>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<main>
  <div class="intro-card">
    <span class="intro-icon">📚</span>
    <div class="intro-text">
      <h2>Nasıl çalışır?</h2>
      <p>Her soruyu oku, cevabını seç. <strong>Doğru seçersen</strong> neden doğru olduğu açıklanır. <strong>Yanlış seçersen</strong> doğru cevap gösterilir ve her iki seçeneğin açıklaması verilir. Kaynaklar kitabın çözüm bölümünden alınmıştır.</p>
    </div>
  </div>

  <div id="quiz-container"></div>
  <div id="result-screen"></div>
</main>

<script>
const questions = [
  {
    num: 1,
    text: `Çekim ekleri, yeni bir sözcük türetmeyen, sözcüğün cümlede diğer sözcüklerle ilişkisini belirleyen eklerdir.<br><br>
    <strong>Buna göre</strong><br>
    <span class="list-item"><u>Zamanın</u> <u>uzaydan</u> tümüyle ayrı ve <u>bağımsız</u> olmadığı, kavranması zor <u>düşünceler</u> <u>arasında</u> yer alıyor.</span>
    <br>(I: zamanın &nbsp; II: uzaydan &nbsp; III: bağımsız &nbsp; IV: düşünceler &nbsp; V: arasında)
    <span class="ask">cümlesindeki altı çizili sözcüklerden hangisi çekim eki almamıştır?</span>`,
    options: ["I (zamanın)", "II (uzaydan)", "III (bağımsız)", "IV (düşünceler)", "V (arasında)"],
    correct: 2,
    explanation: {
      correct_why: `<strong>C şıkkı doğrudur.</strong> "bağımsız" sözcüğü çekim eki almamıştır.<br><br>
      bağ-ım-sız → "bağ" kök + "-ım" fiilden isim yapım eki + "-sız" isimden isim yapım eki. Yalnızca <strong>yapım ekleri</strong> almıştır, çekim eki yoktur.<br><br>
      Diğer sözcükler:<br>
      I. zaman-<strong>ın</strong> → tamlayan eki (çekim eki) ✓<br>
      II. uzay-<strong>dan</strong> → ayrılma hâl eki (çekim eki) ✓<br>
      IV. düşünce-<strong>ler</strong> → çoğul eki (çekim eki) ✓<br>
      V. ara-<strong>sında</strong> → III. tekil kişi iyelik + bulunma hâl eki (çekim eki) ✓
      <span class="hatirla">💡 Çekim ekleri yeni sözcük türetmez, sözcüğün cümledeki ilişkisini belirler. Yalnızca yapım eki alan sözcük çekim eki almamış sayılır.</span>`,
      wrong_why: `Seçtiğin sözcük çekim eki almıştır. <strong>"bağımsız" (III)</strong> yalnızca yapım ekleri (bağ+ım+sız) almış, hiç çekim eki almamıştır. Doğru cevap C'dir.`
    }
  },
  {
    num: 2,
    text: `Hâl (durum) ekleri adlara ya da ad görevinde kullanılan sözcüklere gelen belirtme, yönelme, bulunma ve ayrılma ekleridir.<br><br>
    <span class="list-item">I. <u>Sistemde</u> ufak bir arıza var. (Bulunma hâl eki)</span>
    <span class="list-item">II. Süreç <u>boyunca</u> zorluklar yaşandı. (Yönelme hâl eki)</span>
    <span class="list-item">III. Onun <u>yeteneklerinden</u> haberin yoktu. (Ayrılma hâl eki)</span>
    <span class="list-item">IV. <u>Yorumları</u> hepimizi şaşırttı. (Belirtme hâl eki)</span>
    <span class="ask">Buna göre yukarıdaki cümlelerin hangilerinde altı çizili sözcük ayraç içinde verilen hâl ekini almamıştır?</span>`,
    options: ["I ve II", "I ve III", "II ve III", "II ve IV", "III ve IV"],
    correct: 3,
    explanation: {
      correct_why: `<strong>D şıkkı doğrudur: II ve IV.</strong><br><br>
      I. sistem-<strong>de</strong> → bulunma hâl eki ✓ doğru etiket<br>
      II. boy-un-<strong>ca</strong> → "-unca" zarf yapım ekidir, yönelme hâl eki <strong>değildir ✗</strong><br>
      III. yetenek-ler-i-<strong>nden</strong> → ayrılma hâl eki ✓ doğru etiket<br>
      IV. yorum-lar-<strong>ı</strong> → "onun yorumları" anlamı katmış, iyelik ekidir; belirtme hâl eki <strong>değildir ✗</strong>
      <span class="kural">📌 "-ı/-i/-u/-ü" ekini gördüğünde "onun" sözcüğünü başa ekleyerek test et. Anlam katıyorsa iyelik, belirlilik bildiriyorsa belirtme hâl ekidir.</span>`,
      wrong_why: `Seçtiğin kombinasyon doğru değil. <strong>II. "boyunca"</strong> yönelme eki değil zarf yapım ekidir; <strong>IV. "yorumları"</strong> belirtme değil iyelik ekidir. Yanlış etiket taşıyanlar II ve IV → Doğru cevap D.`
    }
  },
  {
    num: 3,
    text: `Çekim eki olan "-ler / -lar" isimlere veya isim görevindeki sözcüklere "çoğul eki"; çekimli fiillere ya da cümlenin yüklemine "onlar" anlamı katan bir kişi eki olarak gelir.<br>
    <span class="ask">Buna göre "-ler / -lar" eki aşağıdakilerin hangisinde farklı bir görevde kullanılmıştır?</span>`,
    options: [
      "Elbette belirsizlikler herkesi yorar.",
      "Biraz inatlaşırlar ama bir yolunu bulurum.",
      "Derinlikli karakterler görmeyi umuyorduk.",
      "Hesaplar sanırım biraz karışacak.",
      "Zor zamanlar geçirdiğini bilemezdik."
    ],
    correct: 1,
    explanation: {
      correct_why: `<strong>B şıkkı doğrudur.</strong> "inatlaş-ır-<strong>lar</strong>" → yüklem konumundaki fiile gelmiş, "onlar" anlamı katmış → <strong>kişi (şahıs) ekidir</strong>.<br><br>
      A) belirsizlik-<strong>ler</strong> → çoğul eki<br>
      C) karakter-<strong>ler</strong> → çoğul eki<br>
      D) hesap-<strong>lar</strong> → çoğul eki<br>
      E) zaman-<strong>lar</strong> → çoğul eki<br><br>
      Yalnızca B'de "-lar" fiil yüklemine gelerek "onlar" anlamı katmış.
      <span class="hatirla">💡 "-ler/-lar" fiil yükleme geldiğinde kişi eki, isme geldiğinde çoğul ekidir.</span>`,
      wrong_why: `Seçtiğin sözcükteki "-ler/-lar" çoğul ekidir. <strong>B şıkkında "inatlaşırlar"</strong> sözcüğünde "-lar" fiil yükleme gelerek "onlar" anlamı katmıştır → kişi ekidir, farklı görevdedir.`
    }
  },
  {
    num: 4,
    text: `İsimlere ya da isim görevinde kullanılan sözcüklere eklenerek onların ait olduğu kişiyi / varlığı bildiren ekler <strong>iyelik ekidir</strong>. İyelik eki alan sözcüğün başına "benim, senin, onun, bizim, sizin, onların" sözcükleri getirilebilir.<br>
    <span class="ask">Buna göre aşağıdaki cümlelerin hangisinde altı çizili sözcük iyelik eki almamıştır?</span>`,
    options: [
      "<u>Öğrenimimi</u> Ankara'da tamamladım.",
      "Sonunda <u>emeğinizin</u> karşılığını alacaksınız.",
      "<u>Sorumluluğu</u> kimseyle paylaşmak istemem.",
      "<u>Kaygıları</u> hata yapmasına sebep olacak.",
      "Daha <u>zamanın</u> var, sakinliğini korumalısın."
    ],
    correct: 2,
    explanation: {
      correct_why: `<strong>C şıkkı doğrudur.</strong> "sorumluluk-<strong>u</strong>" → "-u" eki burada belirtme hâl ekidir, iyelik değildir.<br><br>
      Test: "onun sorumluluğu kimseyle paylaşmak istemem" → cümle anlamsızlaşıyor, başa "onun" getirmiyor → iyelik eki değil.<br><br>
      A) öğrenim-<strong>im</strong>-i → "benim öğrenimim" → iyelik ✓<br>
      B) emek-<strong>iniz</strong>-in → "sizin emeğiniz" → iyelik ✓<br>
      D) kaygı-lar-<strong>ı</strong> → "onların kaygıları" → iyelik ✓<br>
      E) zaman-<strong>ın</strong> → "senin zamanın" → iyelik ✓
      <span class="kural">📌 "-u/-ü/-ı/-i" ekini "onun" ile test et. Anlam katmıyorsa belirtme hâl ekidir.</span>`,
      wrong_why: `Seçtiğin sözcük iyelik eki almıştır. <strong>C'deki "sorumluluğu"</strong> sözcüğündeki "-u" belirtme hâl ekidir. Bu sözcük iyelik eki almamıştır.`
    }
  },
  {
    num: 5,
    text: `Fiillere gelen kip ve kişi ekleri de çekim ekidir.<br>
    <span class="ask">Aşağıdaki cümlelerin hangisinde bu açıklamaya örnek gösterilemez?</span>`,
    options: [
      "Sandalyemin arkasına yaslanıp gözlerimi kapadım.",
      "Fotoğraflara bakmıştık o akşam, eğlenceliydi.",
      "Gittikçe sessizleşmesinin bir açıklaması var.",
      "Coşkuyla oynarken tozu dumana katıyorlar.",
      "Davete katılırsanız gerçekten çok memnun oluruz."
    ],
    correct: 2,
    explanation: {
      correct_why: `<strong>C şıkkı doğrudur (örnek gösterilemez).</strong><br><br>
      "Gittikçe sessizleşmesinin" cümlesindeki sözcükler:<br>
      git-<strong>tikçe</strong> → "-dikçe" zarf-fiil eki, kip ve kişi eki almamış<br>
      sessizleş-<strong>me</strong>-si-nin → "-me" isim-fiil eki, fiilimsi<br><br>
      Fiilimsiler kip ve kişi eki almaz → bu cümle örnek olamaz.<br><br>
      Diğerleri: kapa-<strong>dı-m</strong>, bak-<strong>mış-tı-k</strong>, katı-<strong>yor-lar</strong>, katılır-<strong>sa-nız</strong> → kip + kişi eki ✓
      <span class="hatirla">💡 Fiilimsiler (-mak/-mek, -ma/-me, -dıkça, -ken, -arak, -ıp…) kip ve kişi eki almaz.</span>`,
      wrong_why: `Seçtiğin cümlede kip ve kişi eki örneği vardır. <strong>C şıkkında</strong> "gittikçe" ve "sessizleşmesinin" fiilimsilerdir, kip ve kişi eki almadıkları için bu açıklamaya örnek gösterilemez.`
    }
  },
  {
    num: 6,
    text: `"-i (-ı, -ü, -u)" eki ada belirli olma anlamı kattığında <strong>belirtme hâl eki</strong>, adın karşıladığı varlığın "o" kişisine ait olduğunu ifade ettiğinde <strong>iyelik eki</strong> olur.<br>
    <span class="ask">Bu açıklamaya göre aşağıdaki cümlelerin hangisinde "-i (-ı, -ü, -u)" eki diğerlerinden farklı bir görevde kullanılmıştır?</span>`,
    options: [
      "Hiç âdeti değilken güne bir kahveyle başladı.",
      "İç cebimdeki fotoğrafı herkesten gizledim.",
      "Dükkânı emanet edebileceğin bir arkadaşın var mı?",
      "Etrafı dolaşıp tehlike devam ediyor mu, diye baktık.",
      "Filme dalınca saati unutmuşum, geç kaldım."
    ],
    correct: 0,
    explanation: {
      correct_why: `<strong>A şıkkı doğrudur.</strong> "âdet-<strong>i</strong>" → "onun âdeti" anlamını katmış → <strong>iyelik ekidir</strong>.<br><br>
      Diğer sözcüklerde "-ı/-i" belirli bir nesneyi gösteriyor → belirtme hâl eki:<br>
      B) fotoğraf-<strong>ı</strong> → belirli fotoğrafı gizledi ✓<br>
      C) dükkân-<strong>ı</strong> → belirli dükkanı emanet et ✓<br>
      D) etraf-<strong>ı</strong> → belirli etrafı dolaştı ✓<br>
      E) saat-<strong>i</strong> → belirli saati unuttu ✓
      <span class="kural">📌 Başına "onun" ekle. "Onun âdeti değilken" anlam katıyor → iyelik. "Onun fotoğrafı gizledim" → bozuk → belirtme hâl.</span>`,

let answers = new Array(questions.length).fill(null);
let correct = 0;
let wrong = 0;

function buildUI() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q-${idx}`;

    const optLabels = ['A', 'B', 'C', 'D', 'E'];

    const optsHTML = q.options.map((opt, oi) => `
      <button class="option-btn" onclick="selectAnswer(${idx}, ${oi})" id="opt-${idx}-${oi}">
        <span class="option-label">${optLabels[oi]}</span>
        <span>${opt}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="question-header">
        <div class="q-num">${q.num}</div>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">${optsHTML}</div>
      <div class="explanation" id="exp-${idx}"></div>
    `;

    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (answers[qIdx] !== null) return;

  answers[qIdx] = optIdx;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.correct;

  if (isCorrect) correct++;
  else wrong++;

  const optLabels = ['A', 'B', 'C', 'D', 'E'];
  q.options.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${qIdx}-${oi}`);
    btn.disabled = true;
    if (oi === optIdx && isCorrect) btn.className = 'option-btn selected-correct';
    else if (oi === optIdx && !isCorrect) btn.className = 'option-btn selected-wrong';
    else if (oi === q.correct && !isCorrect) btn.className = 'option-btn reveal-correct';
    else btn.className = 'option-btn';
  });

  const expDiv = document.getElementById(`exp-${qIdx}`);
  expDiv.classList.add('show');

  if (isCorrect) {
    expDiv.innerHTML = `
      <div class="exp-header correct-exp">✓ Doğru cevap</div>
      <div class="exp-body">${q.explanation.correct_why}</div>
    `;
  } else {
    expDiv.innerHTML = `
      <div class="exp-header wrong-exp">✗ Yanlış — Doğru cevap: ${optLabels[q.correct]}</div>
      <div class="exp-body">
        <span class="yanlis">Seçtiğin şık (${optLabels[optIdx]}) yanlış.</span><br><br>
        ${q.explanation.wrong_why}
        <br><br>
        <strong>Doğru cevap (${optLabels[q.correct]}) neden doğru:</strong><br>
        ${q.explanation.correct_why}
      </div>
    `;
  }

  updateScore();

  const answered = answers.filter(a => a !== null).length;
  if (answered === questions.length) {
    setTimeout(showResult, 600);
  }
}

function updateScore() {
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-left').textContent = questions.length - answered;
  document.getElementById('progress-fill').style.width = (answered / questions.length * 100) + '%';
}

function showResult() {
  document.getElementById('quiz-container').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const pct = Math.round((correct / questions.length) * 100);
  let emoji = '😔', msg = 'Çekim eklerini tekrar çalış.';
  if (pct >= 85) { emoji = '🏆'; msg = 'Mükemmel! Çekim eklerine hâkimsin.'; }
  else if (pct >= 65) { emoji = '👍'; msg = 'İyi gidiyorsun, biraz daha pekiştir.'; }
  else if (pct >= 45) { emoji = '📖'; msg = 'Temel tanımları tekrar gözden geçir.'; }

  rs.innerHTML = `
    <div class="result-icon">${emoji}</div>
    <div class="result-title">Test Tamamlandı</div>
    <div class="result-sub">${msg}</div>
    <div class="result-stats">
      <div class="rstat"><div class="rstat-n green">${correct}</div><div class="rstat-l">Doğru</div></div>
      <div class="rstat"><div class="rstat-n red">${wrong}</div><div class="rstat-l">Yanlış</div></div>
      <div class="rstat"><div class="rstat-n purple">${pct}%</div><div class="rstat-l">Başarı</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Testi Yeniden Çöz</button>
  `;
}

function restartQuiz() {
  answers = new Array(questions.length).fill(null);
  correct = 0;
  wrong = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';
  updateScore();
  buildUI();
  window.scrollTo(0, 0);
}

buildUI();
updateScore();
</script>
