<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esmâü'l-Hüsnâ — 99 İsim Çalışma Programı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gece:#0d1117;--yuzeygece:#161b22;--kenar:#21262d;
  --altin:#c9a84c;--altin-acik:#e2c97e;--altin-koyu:#8a6e2f;
  --turkuaz:#4fa3a0;--turkuaz-acik:#7bc8c5;
  --metin:#e6edf3;--metin-ikincil:#8b949e;
  --zat:#a78bfa;--celal:#f87171;--cemal:#34d399;--kemal:#60a5fa;
  --r:0.75rem;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--gece);color:var(--metin);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;font-size:17px;line-height:1.65;}
.arapca{font-family:'Amiri',serif;direction:rtl;text-align:right;}
code,kbd,cite{font-family:'IBM Plex Mono',monospace;}

/* BAŞLIK */
header{background:var(--yuzeygece);border-bottom:1px solid var(--kenar);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;}
header h1{font-size:1.2rem;color:var(--altin);letter-spacing:.04em;font-weight:600;}
header .ilerleme-bar{flex:1;height:6px;background:var(--kenar);border-radius:3px;overflow:hidden;}
header .ilerleme-ic{height:100%;background:linear-gradient(90deg,var(--altin-koyu),var(--altin));transition:width .4s ease;}
header .ilerleme-yazi{font-size:.8rem;color:var(--metin-ikincil);white-space:nowrap;font-family:'IBM Plex Mono',monospace;}

/* FİLTRE ÇUBUĞU */
.filtre-alan{background:var(--yuzeygece);border-bottom:1px solid var(--kenar);padding:.75rem 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.filtre-alan span{font-size:.8rem;color:var(--metin-ikincil);margin-right:.25rem;}
.filtre-btn{padding:.3rem .8rem;border-radius:2rem;border:1px solid var(--kenar);background:transparent;color:var(--metin-ikincil);cursor:pointer;font-size:.8rem;transition:all .2s;font-family:'Crimson Pro',serif;}
.filtre-btn:hover{border-color:var(--altin);color:var(--altin);}
.filtre-btn.aktif{background:var(--altin-koyu);border-color:var(--altin);color:var(--altin-acik);}
.filtre-btn.zat.aktif{background:#4c1d95;border-color:var(--zat);color:var(--zat);}
.filtre-btn.celal.aktif{background:#7f1d1d;border-color:var(--celal);color:var(--celal);}
.filtre-btn.cemal.aktif{background:#064e3b;border-color:var(--cemal);color:var(--cemal);}
.filtre-btn.kemal.aktif{background:#1e3a5f;border-color:var(--kemal);color:var(--kemal);}
.arama-alani{margin-left:auto;}
.arama-alani input{background:var(--kenar);border:1px solid var(--kenar);color:var(--metin);padding:.3rem .75rem;border-radius:.4rem;font-family:'Crimson Pro',serif;font-size:.9rem;width:180px;}
.arama-alani input:focus{outline:none;border-color:var(--altin-koyu);}

/* ANA DÜZEN */
.konteyner{display:flex;gap:0;min-height:calc(100vh - 110px);}

/* SOL LİSTE */
.esma-listesi{width:280px;min-width:200px;background:var(--yuzeygece);border-right:1px solid var(--kenar);overflow-y:auto;max-height:calc(100vh - 110px);position:sticky;top:110px;}
.esma-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;cursor:pointer;border-bottom:1px solid var(--kenar);transition:background .15s;}
.esma-item:hover{background:var(--kenar);}
.esma-item.aktif{background:linear-gradient(90deg,rgba(201,168,76,.12),transparent);border-left:3px solid var(--altin);}
.esma-item.ogrenildi{opacity:.55;}
.esma-no{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--metin-ikincil);min-width:24px;}
.esma-arapca-kucuk{font-family:'Amiri',serif;font-size:1.2rem;direction:rtl;color:var(--altin-acik);}
.esma-latin{font-size:.85rem;color:var(--metin-ikincil);}
.grup-nokta{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gp-Zât{background:var(--zat);}
.gp-Celâl{background:var(--celal);}
.gp-Cemâl{background:var(--cemal);}
.gp-Kemâl{background:var(--kemal);}
.ogrenildi-isaret{margin-left:auto;font-size:.85rem;color:var(--cemal);}

/* DETAY PANELİ */
.detay-panel{flex:1;overflow-y:auto;max-height:calc(100vh - 110px);padding:2rem;}

/* KART */
.kart{max-width:820px;margin:0 auto;}
.kart-baslik{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--kenar);}
.kart-no-grup{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.kart-no{font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--metin-ikincil);}
.grup-etiket{font-size:.7rem;padding:.2rem .5rem;border-radius:.25rem;font-weight:600;letter-spacing:.05em;}
.ge-Zât{background:rgba(167,139,250,.15);color:var(--zat);border:1px solid rgba(167,139,250,.3);}
.ge-Celâl{background:rgba(248,113,113,.15);color:var(--celal);border:1px solid rgba(248,113,113,.3);}
.ge-Cemâl{background:rgba(52,211,153,.15);color:var(--cemal);border:1px solid rgba(52,211,153,.3);}
.ge-Kemâl{background:rgba(96,165,250,.15);color:var(--kemal);border:1px solid rgba(96,165,250,.3);}
.kart-isim-blok{flex:1;}
.kart-arapca{font-family:'Amiri',serif;font-size:3rem;direction:rtl;text-align:right;color:var(--altin-acik);line-height:1.3;margin-bottom:.4rem;}
.kart-latin{font-size:1.4rem;font-weight:600;color:var(--altin);margin-bottom:.2rem;}
.kart-anlam{font-size:1rem;color:var(--metin-ikincil);font-style:italic;}

/* BÖLÜMLER */
.bolum{margin-bottom:1.75rem;}
.bolum-baslik{font-family:'IBM Plex Mono',monospace;font-size:.75rem;letter-spacing:.12em;color:var(--altin-koyu);text-transform:uppercase;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid var(--kenar);}
.kok-metin{font-size:.95rem;color:var(--metin-ikincil);line-height:1.7;}

/* AYET */
.ayet-kart{background:var(--yuzeygece);border:1px solid var(--kenar);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.ayet-arapca{font-family:'Amiri',serif;font-size:1.6rem;direction:rtl;text-align:right;line-height:1.8;margin-bottom:.75rem;color:var(--metin);}
.ayet-meal{font-style:italic;color:var(--metin-ikincil);margin-bottom:.5rem;font-size:.95rem;}
.ayet-kaynak{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--altin-koyu);margin-bottom:.75rem;}
.ayet-tefsir{font-size:.92rem;color:var(--metin);line-height:1.75;border-left:2px solid var(--altin-koyu);padding-left:.9rem;}

/* HADİS */
.hadis-kart{background:var(--yuzeygece);border:1px solid var(--kenar);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;flex-direction:column;gap:.4rem;}
.hadis-metin{font-size:.97rem;line-height:1.7;}
.hadis-alt{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.hadis-kaynak{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--metin-ikincil);}
.hadis-derece{font-size:.72rem;padding:.15rem .45rem;border-radius:.2rem;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.hd-Sahih{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
.hd-Hasen{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.hd-Zayıf{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);}

/* GEYLANİ */
.geylani-kutu{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.03));border:1px solid var(--altin-koyu);border-radius:var(--r);padding:1.1rem 1.25rem;font-style:italic;font-size:.97rem;color:var(--altin-acik);position:relative;}
.geylani-kutu::before{content:'"';font-family:'Amiri',serif;font-size:3rem;color:var(--altin-koyu);position:absolute;top:-.2rem;left:.75rem;line-height:1;}
.geylani-metin{padding-left:1.5rem;}
.geylani-imza{margin-top:.5rem;font-size:.75rem;font-family:'IBM Plex Mono',monospace;color:var(--altin-koyu);font-style:normal;padding-left:1.5rem;}

/* ALT KONTROLLER */
.kart-alt{display:flex;align-items:center;justify-content:space-between;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--kenar);}
.nav-buton{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:.4rem;border:1px solid var(--kenar);background:transparent;color:var(--metin-ikincil);cursor:pointer;font-family:'Crimson Pro',serif;font-size:.9rem;transition:all .2s;}
.nav-buton:hover{border-color:var(--altin);color:var(--altin);}
.ogrenildi-buton{padding:.5rem 1.25rem;border-radius:.4rem;border:1px solid var(--cemal);background:rgba(52,211,153,.1);color:var(--cemal);cursor:pointer;font-family:'Crimson Pro',serif;font-size:.9rem;transition:all .2s;}
.ogrenildi-buton:hover{background:rgba(52,211,153,.2);}
.ogrenildi-buton.isaret{background:rgba(52,211,153,.25);font-weight:600;}

/* BOŞ DURUM */
.bos-durum{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--metin-ikincil);padding:3rem;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--yuzeygece);}
::-webkit-scrollbar-thumb{background:var(--kenar);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#30363d;}

@media(max-width:700px){
  .esma-listesi{display:none;}
  .detay-panel{padding:1rem;}
}
</style>
</head>
<body>
<header>
  <h1>Esmâü'l-Hüsnâ</h1>
  <div class="ilerleme-bar"><div class="ilerleme-ic" id="ilerlemeIc" style="width:0%"></div></div>
  <span class="ilerleme-yazi" id="ilerlemeYazi">0/99</span>
</header>

<div class="filtre-alan">
  <span>Grup:</span>
  <button class="filtre-btn aktif" data-filtre="hepsi">Tümü</button>
  <button class="filtre-btn zat" data-filtre="Zât">Zât</button>
  <button class="filtre-btn celal" data-filtre="Celâl">Celâl</button>
  <button class="filtre-btn cemal" data-filtre="Cemâl">Cemâl</button>
  <button class="filtre-btn kemal" data-filtre="Kemâl">Kemâl</button>
  <button class="filtre-btn" data-filtre="ogrenildi">Öğrenildiler</button>
  <div class="arama-alani"><input id="aramaInput" type="text" placeholder="İsim ara..." autocomplete="off"></div>
</div>

<div class="konteyner">
  <aside class="esma-listesi" id="esmaListesi"></aside>
  <main class="detay-panel" id="detayPanel">
    <div class="bos-durum">
      <div style="font-size:3rem;opacity:.2;">☽</div>
      <p>Soldan bir isim seçin</p>
    </div>
  </main>
</div>

<script>
const ESMALAR = [
{
  no:1, arapca:"ٱللَّه", latin:"Allah", anlam:"Tek İlah — bütün varlığın mutlak sahibi ve tek ma'budu", grup:"Zât",
  kok:"İki görüş: (1) 'İlâh' kökünden türemiş, elif-lam belirlilik takısıyla 'el-İlâh' → 'Allah' biçimine geçmiş. (2) Arap dilinde başka hiçbir kelimeye benzeşmeyen, türetilemeyen özel isim (ism-i âlem). İkinci görüş İbn Kayyım, Sîbeveyhi ve cumhur-u ulemânın tercihidir. İsmin özel olması, Allah'ın zâtının eşsizliğine işaret eder.",
  ayetler:[
    {arapca:"ٱللَّهُ لَآ إِلَـٰهَ إِلَّا هُوَ ٱلْحَىُّ ٱلْقَيُّومُ", meal:"Allah — O'ndan başka ilah yoktur. O, Hayy'dır, Kayyûm'dur.", kaynak:"Bakara 2:255",
     tefsir:"İbn Kesîr: 'Bu âyet, Kur'ân'ın en büyük âyetidir. Allah ismi zât isminin zirvesidir; Hayy ve Kayyûm sıfatları bu ismin iki direği gibidir — Hayy yaşamı, Kayyûm ise her şeyi ayakta tutmayı ifade eder.' Kurtubî: 'Müfessirlerin büyük çoğunluğu Allah isminin alem (özel isim) olduğunu ve türetilmediğini söylemiştir; bu isim aynı zamanda bütün esmâü'l-hüsnânın anahtarıdır, nitekim âyetin devamındaki tüm sıfatlar bu isimle bağlanmaktadır.'"},
    {arapca:"شَهِدَ ٱللَّهُ أَنَّهُۥ لَآ إِلَـٰهَ إِلَّا هُوَ", meal:"Allah, kendisinden başka ilah olmadığına bizzat şahitlik etti.", kaynak:"Âl-i İmrân 3:18",
     tefsir:"Taberî: 'Allah'ın kendi zâtına şahitlik etmesi, bu tevhid hükmünün en büyük delili olduğunu gösterir. Meleklerin ve ilim sahiplerinin şahitliği de aynı âyette zikredilmiş, böylece üç mertebeye dikkat çekilmiştir.' Râzî: 'Şahitliğin Allah ile başlaması, insanın aklının bu hakikati kavrayabilmesi için önce ilahî beyana muhtaç olduğuna işaret eder; sonra melek, sonra âlim sıralaması, bilginin kaynaktan alıcıya doğru aktığını gösterir.'"}
  ],
  hadisler:[
    {metin:"Allah'ın doksan dokuz ismi vardır; kim onları ihsâ ederse (sayar, anlar, yaşarsa) cennete girer.", kaynak:"Buhârî, Daavât 68; Müslim, Zikir 5", derece:"Sahih"},
    {metin:"En büyük isim şu üç sûrede geçmektedir: Bakara, Âl-i İmrân ve Tâhâ.", kaynak:"İbn Mâce, Duâ 9; Hâkim, Müstedrek", derece:"Hasen"}
  ],
  geylani:"'Allah' ismini dilden değil, yürekten söyle; zira bu isim kalpte taht kurarsa dünya ve ahiretin yükü hafifler."
},
{
  no:2, arapca:"ٱلرَّحْمَـٰن", latin:"er-Rahmân", anlam:"Rahmet eden — dünya ve ahirette sonsuz rahmetiyle her şeyi kuşatan", grup:"Cemâl",
  kok:"R-H-M kökü. 'Rahm' (rahim — ana rahmi) kelimesiyle aynı kök; sevgi, şefkat ve koruma anlamlarını taşır. 'Fe'lân' kalıbı (Rahmân) Arapçada geçici değil kalıcı ve yoğun bir sıfatı ifade eder; bu nedenle rahmeti hiçbir zaman kesilmeyen demektir. İbn Fâris: 'Bu kökün temel anlamı yumuşaklık ve merhametle sarıp sarmalamaktır.'",
  ayetler:[
    {arapca:"ٱلرَّحْمَـٰنُ عَلَى ٱلْعَرْشِ ٱسْتَوَىٰ", meal:"Rahmân, Arş'a istivâ etti.", kaynak:"Tâhâ 20:5",
     tefsir:"İbn Kesîr: 'Arş üzerinde istivânın Rahmân ismiyle bağlanması tesadüf değildir; Arş'ı tutan ve geniş tutan yalnızca rahmetin ta kendisidir. Selef-i sâlihin istivâyı bilmeden ve keyfiyetsiz kabul etmiştir.' Kurtubî: 'Rahmân isminin Arş ile birlikte zikredilmesi şunu gösterir: Eğer rahmet olmasaydı kâinat hükümle değil gazapla idare edilirdi; oysa her şeyi kuşatan rahmet, Arş'ın genişliği gibi sınırsızdır.'"},
    {arapca:"قُلِ ٱدْعُوا۟ ٱللَّهَ أَوِ ٱدْعُوا۟ ٱلرَّحْمَـٰنَ", meal:"De ki: 'Allah'a dua edin, Rahmân'a dua edin; hangisini çağırırsanız çağırın, en güzel isimler O'nundur.'", kaynak:"İsrâ 17:110",
     tefsir:"Taberî: 'Müşrikler Peygamber'in bazen Allah, bazen Rahmân diye dua ettiğini duyunca iki ilaha mı dua ediyor sandılar. Âyet, her iki ismin de aynı zâta ait olduğunu açıkladı.' Râzî: 'Bu âyet aynı zamanda tüm esmâü'l-hüsnânın tek bir zâtta toplandığının delilidir; isimler farklı, müsemmâ (isimlendirilen) birdir.'"}
  ],
  hadisler:[
    {metin:"Allah rahmetini yüz parçaya böldü; doksan dokuzunu kendi katında sakladı, bir parçasını yeryüzüne indirdi. O bir parçadan dolayı mahlûkat birbirine merhamet eder.", kaynak:"Buhârî, Edeb 19; Müslim, Tevbe 17", derece:"Sahih"},
    {metin:"Rahmân'a, rahim diyenlere (akraba bağını koruyanlara) rahim (merhamet) eder.", kaynak:"Buhârî, Edeb 13; Tirmizî, Birr 16", derece:"Sahih"}
  ],
  geylani:"Rahmân ismi, sâlikin (yolcunun) en karanlık anlarında tutunduğu ip gibidir; bu ismi çok zikreden kimse, Allah'ın yarattığı hiçbir canlıya sertlik edemez hale gelir."
},
{
  no:3, arapca:"ٱلرَّحِيم", latin:"er-Rahîm", anlam:"Çok merhametli — ahirette mü'minlere özel rahmet eden", grup:"Cemâl",
  kok:"R-H-M kökü, 'Fa'îl' kalıbı. Rahmân ile aynı kökten gelir ancak kalıp farkı anlam farkı doğurur: Rahmân dünyadaki genel ve geniş rahmeti, Rahîm ahiretteki mü'minlere özel ve derinlikli rahmeti ifade eder. Bu ayrımı İmam Kurtubî ve İbn Kayyım açıkça yapmıştır.",
  ayetler:[
    {arapca:"وَكَانَ بِٱلْمُؤْمِنِينَ رَحِيمًا", meal:"O, mü'minlere karşı son derece merhametlidir.", kaynak:"Ahzâb 33:43",
     tefsir:"İbn Kesîr: 'Bu âyette Rahîm isminin doğrudan mü'minlere nispet edilmesi, bu rahmetin evrensel değil özel olduğunu doğrular. Rahmân bütün mahlûkatı kucaklar; Rahîm yalnızca mü'minlerin kalbine işler.' Kurtubî: 'Âyetin bağlamı, Allah'ın Peygamber aracılığıyla mü'minleri karanlıktan aydınlığa çıkarmasını anlatmaktadır; bu çıkış yalnızca rahmetle mümkündür, başka bir güçle değil.'"},
    {arapca:"إِنَّهُۥ هُوَ ٱلتَّوَّابُ ٱلرَّحِيمُ", meal:"Şüphesiz O, tevbeleri çok kabul eden ve çok merhametli olandır.", kaynak:"Bakara 2:37",
     tefsir:"Taberî: 'Âdem'in tevbesinin kabulü anlatıldıktan sonra Rahîm isminin gelmesi, rahmetin tevbeye kapı araladığını gösterir. Tevvâb ve Rahîm isimleri Kur'ân'da çoğunlukla birlikte gelir.' Râzî: 'Tevbe kapısının açık olmasının sebebi Rahîm sıfatıdır; bu sıfat olmasaydı hiçbir günah affedilemezdi.'"}
  ],
  hadisler:[
    {metin:"Allah, anneden evladına olan merhametten daha fazla kullarına merhamet eder.", kaynak:"Buhârî, Edeb 18; Müslim, Tevbe 22", derece:"Sahih"},
    {metin:"(Kıyamette Allah) 'Rahmetim gazabımın önüne geçti' buyuracaktır.", kaynak:"Buhârî, Tevhid 15; Müslim, Tevbe 14", derece:"Sahih"}
  ],
  geylani:"Rahmân ismi yağmur gibi herkese yağar; Rahîm ismi ise özel bir pınar gibidir — ancak arayan, yönelen ve tevbe eden içer."
},
{
  no:4, arapca:"ٱلْمَلِك", latin:"el-Melik", anlam:"Mutlak hükümdar — mülkün gerçek sahibi ve tek egemen", grup:"Celâl",
  kok:"M-L-K kökü. Üç anlamı birden taşır: (1) Güç ve kuvvet sahibi olmak, (2) Emretme yetkisi, (3) Sahiplik. 'Mülk' (varlıksal egemenlik) ve 'milk' (sahiplik) aynı kökten türer. İbn Fâris: 'Mâlik sahipliği, Melik ise yönetimi ve yetkiyi öne çıkarır.'",
  ayetler:[
    {arapca:"فَتَعَـٰلَى ٱللَّهُ ٱلْمَلِكُ ٱلْحَقُّ", meal:"Allah, gerçek hükümdar olarak her şeyden yücedir.", kaynak:"Tâhâ 20:114",
     tefsir:"İbn Kesîr: 'Melik ve Hakk isminin birleşmesi önemlidir: Dünya hükümdarları geçici ve sınırlıdır, Allah'ın egemenliği ise mutlak ve değişmez gerçektir.' Kurtubî: 'Bu âyet Kur'ân öğretimi bağlamında inmistir; Allah, Peygamber'e acele etmemesini buyurmuş ve ardından kendi ismiyle öğüt vermiştir. Melik ismi, öğretinin kaynağının da yalnızca O olduğunu vurgular.'"},

  hadisler:[

  kok:"Q-D-S kökü. 'Kuds' kelimesinin temel anlamı maddî ve manevî kirlerden arınmış olmaktır. 'Fu'ûl' kalıbı (Kuddûs), mübalağa (abartı değil, yoğunluk) ifade eder. Kudüs şehri ve 'Rûhu'l-Kuds' (Cebrâil) aynı kökten gelir. İbn Fâris: 'Bereket ve temizlik bu kökün iki ana anlamıdır.'",
  ayetler:[

     tefsir:"İbn Kesîr: 'Tesbih (sübhânallah demek), Allah'ı eksikliklerden tenzih etmektir. Kuddûs ismi bu tenzîhin özüdür; varlıktaki her şey buna şahitlik eder.' Kurtubî: 'Melik ve Kuddûs isminin birleşmesi şunu anlatır: Gerçek hükümdar kusursuz olmalıdır — dünya hükümdarları ise hata yapar, zulüm eder; yalnızca Allah her ikisini mükemmel olarak bir arada taşır.'"},
    {arapca:"هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَـٰهَ إِلَّا هُوَ ٱلْمَلِكُ ٱلْقُدُّوسُ ٱلسَّلَـٰمُ", meal:"O Allah ki, O'ndan başka ilah yoktur. O Melik'tir, Kuddûs'tur, Selâm'dır.", kaynak:"Haşr 59:23",

  hadisler:[

    {metin:"Peygamber gece namazında 'Allahümme ente'l-Melikü'l-Kuddûs' diye dua ederdi.", kaynak:"Müslim, Müsâfirîn 201; Ebû Dâvûd, Tatavvu 24", derece:"Sahih"}

  kok:"S-L-M kökü. İslam, Müslim, selâm, silm (barış) hepsi aynı kökten gelir. Temel anlam: teslim olmak ve sağ-salim olmak. Allah'a isim olduğunda iki boyutu vardır: (1) Zâtının her kusurdan salim olması, (2) Kullarına esenlik veren olması. İbn Kayyım: 'Bu isim hem bir sıfatı hem de bir vaadi içerir.'",
  ayetler:[

     tefsir:"İbn Kesîr: 'Selâm isminin Kuddûs'ten sonra gelmesi anlamlıdır: Önce O'nun her eksiklikten münezzeh olduğu söylenir, ardından O'ndan esenliğin fışkırdığı anlatılır.' Kurtubî: 'Selamın kullar arasında yayılması bu ismin bir tecellisidir (yansımasıdır); nitekim Peygamber selamı yaymayı emretmiş, bunun sevgiye ve cennete kapı olduğunu söylemiştir.'"},
    {arapca:"وَٱللَّهُ يَدْعُوٓا۟ إِلَىٰ دَارِ ٱلسَّلَـٰمِ", meal:"Allah, esenlik yurduna (cennete) davet eder.", kaynak:"Yûnus 10:25",

    {metin:"Aranıza imanı yerleştirmedikçe cennete giremezsiniz; birbirinizi sevmedikçe iman etmiş olmazsınız. Selamı yaymanızı söyleyeyim mi? Birbirinize selam verin.", kaynak:"Müslim, İman 93; Tirmizî, Et'ime 45", derece:"Sahih"}

  no:7, arapca:"ٱلْمُؤْمِن", latin:"el-Mü'min", anlam:"Güven veren — kullarını korkudan emin kılan ve vahyini doğrulayan", grup:"Celâl",
  kok:"E-M-N kökü. İman (inanmak), emân (güvenlik), emânet (emanet) aynı kökten. İki anlam bir arada: (1) Doğrulayıcı — kendi kendini doğrulayan, vahyini doğrulayan; (2) Güvence veren — kullarına korkmayın diyen. İbn Fâris: 'Bu kök kalp huzurunun ve dışa yansıyan güvencenin köküdür.'",
  ayetler:[
    {arapca:"هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَـٰهَ إِلَّا هُوَ ... ٱلْمُؤْمِنُ", meal:"O Allah, O'ndan başka ilah olmayan ... el-Mü'min'dir.", kaynak:"Haşr 59:23",
     tefsir:"İbn Kesîr: 'Mü'min isminin iki tefsiri vardır: (1) Peygamberlerini mucizelerle tasdik eden, (2) Azabından korkan kullarına güven veren. Her iki anlam da âlimlerce benimsenmiştir.' Kurtubî: 'Allah'ın Mü'min olması, O'nun vaadinin gerçek ve hiçbir zaman bozulmayacağı anlamına gelir. Bu, kula imanın sarsılmaz bir temele dayandığını öğretir.'"},
    {arapca:"أَلَآ إِنَّ أَوْلِيَآءَ ٱللَّهِ لَا خَوْفٌ عَلَيْهِمْ وَلَا هُمْ يَحْزَنُونَ", meal:"Dikkat edin: Allah'ın velileri için ne korku vardır ne de onlar üzülür.", kaynak:"Yûnus 10:62",
     tefsir:"Taberî: 'Bu âyet Mü'min isminin işlevini özetler: Allah'ın güvencesi altına girenler, dünyanın ve ahiretin korkularından emin olur.' Râzî: 'Velâyet (velilik) Allah'ın Mü'min ismiyle ilişkilidir; zira ancak güven veren bir Rab'be gönülden bağlananlar gerçek anlamda O'nun velisi olabilir.'"}

  hadisler:[

  no:8, arapca:"ٱلْمُهَيْمِن", latin:"el-Müheymin", anlam:"Gözetip koruyan — her şeyi kontrol altında tutan ve muhafaza eden", grup:"Celâl",
  kok:"H-Y-M-N kökü. Nadir kullanılan bir kök; 'hâfız, rakîb ve şehîd' anlamlarının kesişim noktasında durur. Kuş yuvasını kanatlarıyla örter gibi koruma ve gözetim ifade eder. İbn Fâris: 'Müheymin, bir şeyin üzerine hâkim olup onu denetim altında tutan demektir.' Aynı kök, Kur'ân'ın önceki kitapları 'denetim altında tutması' için de kullanılmıştır (Mâide 5:48).",
  ayetler:[
    {arapca:"هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَـٰهَ إِلَّا هُوَ ... ٱلْمُهَيْمِنُ", meal:"O Allah, O'ndan başka ilah yoktur ... el-Müheymin'dir.", kaynak:"Haşr 59:23",
     tefsir:"İbn Kesîr: 'Müheymin, kullarının amellerini, rızıklarını, ecellerini bilen ve hepsini gözetip koruyan demektir.' Kurtubî: 'Haşr sûresinin bu dizisi içinde Müheymin; Mü'min (güven veren) ile Azîz (güçlü) arasına yerleşmiştir. Sıra önemlidir: Önce güven, sonra gözetim, sonra güç — Allah'ın kullarıyla ilişkisinin üç boyutu.'"},
    {arapca:"وَأَنزَلْنَآ إِلَيْكَ ٱلْكِتَـٰبَ بِٱلْحَقِّ مُصَدِّقًا لِّمَا بَيْنَ يَدَيْهِ مِنَ ٱلْكِتَـٰبِ وَمُهَيْمِنًا عَلَيْهِ", meal:"Sana da önceki kitabı doğrulayıcı ve onu denetim altında tutan olarak bu Kitab'ı indirdik.", kaynak:"Mâide 5:48",
     tefsir:"Taberî: 'Kur'ân'ın Müheymin olması, onu tasdik ettiği kitaplara hâkim olması, onlardaki hataları düzeltmesi ve orijinal hakikati muhafaza etmesi demektir.' Râzî: 'Allah'ın hem ismi hem de Kitabı Müheymin'dir; bu isimlerin örtüşmesi, Kur'ân'ın ilahî koruma altında olduğunun en açık delilidir.'"}

  ayetler:[
    {arapca:"هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَـٰهَ إِلَّا هُوَ ... ٱلْمُتَكَبِّرُ", meal:"O Allah, O'ndan başka ilah yoktur ... el-Mütekebbir'dir.", kaynak:"Haşr 59:23",
     tefsir:"İbn Kesîr: 'Mütekebbir Haşr sûresinin bu ismî dizisinin sonuncusudur; listenin zirvesini oluşturur. Allah'ın büyüklüğü hakiki büyüklüktür; her şey O'nun karşısında küçük kalır.' Kurtubî: 'Mütekebbir ile Cebbâr arasındaki fark şudur: Cebbâr güçle ilgilidir, Mütekebbir ise büyüklük ve yücelikle. Her ikisi de yalnızca Allah'a yaraşır.'"},

// ============================================================
// VERİ BURAYA GELECEK (merged_data.js inline edilecek)
// ============================================================

// ---- UYGULAMA KODU ----
let aktifFiltre = 'hepsi';
let aktifEsmaNo = null;
let ogrenildiSet = new Set(JSON.parse(localStorage.getItem('esma_ogrenildi') || '[]'));

function kaydetOgrenildi() {
  localStorage.setItem('esma_ogrenildi', JSON.stringify([...ogrenildiSet]));
}

function ilerlemeGuncelle() {
  const sayi = ogrenildiSet.size;
  const yuzde = (sayi / 99) * 100;
  document.getElementById('ilerlemeIc').style.width = yuzde + '%';
  document.getElementById('ilerlemeYazi').textContent = sayi + '/99';
}

function filtrelenmisList() {
  const ara = document.getElementById('aramaInput').value.toLowerCase().trim();
  return ESMALAR.filter(e => {
    if (aktifFiltre === 'ogrenildi') return ogrenildiSet.has(e.no);
    if (aktifFiltre !== 'hepsi' && e.grup !== aktifFiltre) return false;
    if (ara) {
      return e.latin.toLowerCase().includes(ara) ||
             e.anlam.toLowerCase().includes(ara) ||
             String(e.no).includes(ara);
    }
    return true;
  });
}

function listeRender() {
  const liste = filtrelenmisList();
  const konteyner = document.getElementById('esmaListesi');
  konteyner.innerHTML = '';
  liste.forEach(e => {
    const el = document.createElement('div');
    el.className = 'esma-item' +
      (e.no === aktifEsmaNo ? ' aktif' : '') +
      (ogrenildiSet.has(e.no) ? ' ogrenildi' : '');
    el.dataset.no = e.no;
    el.innerHTML = `
      <span class="esma-no">${e.no}</span>
      <div class="grup-nokta gp-${e.grup}"></div>
      <div>
        <div class="esma-arapca-kucuk">${e.arapca}</div>
        <div class="esma-latin">${e.latin}</div>
      </div>
      ${ogrenildiSet.has(e.no) ? '<span class="ogrenildi-isaret">✓</span>' : ''}
    `;
    el.addEventListener('click', () => esmaGoster(e.no));
    konteyner.appendChild(el);
  });
}

function derece(d) {
  const bas = d.split(/[—\-\s]/)[0].trim();
  if (bas === 'Sahih') return 'hd-Sahih';
  if (bas === 'Hasen') return 'hd-Hasen';
  return 'hd-Zayıf';
}

function esmaGoster(no) {
  const e = ESMALAR.find(x => x.no === no);
  if (!e) return;
  aktifEsmaNo = no;

  // Listedeki aktif işareti güncelle
  document.querySelectorAll('.esma-item').forEach(el => {
    el.classList.toggle('aktif', Number(el.dataset.no) === no);
  });

  const filtreliListe = filtrelenmisList();
  const idx = filtreliListe.findIndex(x => x.no === no);

  const panel = document.getElementById('detayPanel');

  // Ayet HTML
  const ayetHTML = e.ayetler.map(a => `
    <div class="ayet-kart">
      <div class="ayet-arapca arapca">${a.arapca}</div>
      <div class="ayet-meal">"${a.meal}"</div>
      <cite class="ayet-kaynak">${a.kaynak}</cite>
      <div class="ayet-tefsir">${a.tefsir}</div>
    </div>
  `).join('');

  // Hadis HTML
  const hadisHTML = e.hadisler.map(h => `
    <div class="hadis-kart">
      <div class="hadis-metin">"${h.metin}"</div>
      <div class="hadis-alt">
        <cite class="hadis-kaynak">${h.kaynak}</cite>
        <span class="hadis-derece ${derece(h.derece)}">${h.derece}</span>
      </div>
    </div>
  `).join('');

  const ogr = ogrenildiSet.has(no);

  panel.innerHTML = `
    <div class="kart">
      <div class="kart-baslik">
        <div class="kart-no-grup">
          <span class="kart-no">#${e.no}</span>
          <span class="grup-etiket ge-${e.grup}">${e.grup}</span>
        </div>
        <div class="kart-isim-blok">
          <div class="kart-arapca arapca">${e.arapca}</div>
          <div class="kart-latin">${e.latin}</div>
          <div class="kart-anlam">${e.anlam}</div>
        </div>
      </div>

      <div class="bolum">
        <div class="bolum-baslik">Kök ve Dil Analizi</div>
        <div class="kok-metin">${e.kok}</div>
      </div>

      <div class="bolum">
        <div class="bolum-baslik">Kur'ân Âyetleri ve Tefsir</div>
        ${ayetHTML}
      </div>

      <div class="bolum">
        <div class="bolum-baslik">Hadisler</div>
        ${hadisHTML}
      </div>

      <div class="bolum">
        <div class="bolum-baslik">Geylânî Hikmeti</div>
        <div class="geylani-kutu">
          <div class="geylani-metin">${e.geylani}</div>
          <div class="geylani-imza">— Abdülkâdir Geylânî (k.s.)</div>
        </div>
      </div>

      <div class="kart-alt">
        <button class="nav-buton" id="btnOnceki" ${idx === 0 ? 'disabled' : ''}>
          ← Önceki
        </button>
        <button class="ogrenildi-buton ${ogr ? 'isaret' : ''}" id="btnOgrenildi">
          ${ogr ? '✓ Öğrenildi' : 'Öğrenildi işaretle'}
        </button>
        <button class="nav-buton" id="btnSonraki" ${idx >= filtreliListe.length - 1 ? 'disabled' : ''}>
          Sonraki →
        </button>
      </div>
    </div>
  `;

  document.getElementById('btnOgrenildi').addEventListener('click', () => {
    if (ogrenildiSet.has(no)) ogrenildiSet.delete(no);
    else ogrenildiSet.add(no);
    kaydetOgrenildi();
    ilerlemeGuncelle();
    listeRender();
    esmaGoster(no);
  });

  if (idx > 0) {
    document.getElementById('btnOnceki').addEventListener('click', () => {
      esmaGoster(filtreliListe[idx - 1].no);
    });
  }
  if (idx < filtreliListe.length - 1) {
    document.getElementById('btnSonraki').addEventListener('click', () => {
      esmaGoster(filtreliListe[idx + 1].no);
    });
  }

  panel.scrollTop = 0;
}

// Filtre butonları
document.querySelectorAll('.filtre-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
    btn.classList.add('aktif');
    aktifFiltre = btn.dataset.filtre;
    listeRender();
    const liste = filtrelenmisList();
    if (liste.length > 0) esmaGoster(liste[0].no);
  });
});

// Arama
document.getElementById('aramaInput').addEventListener('input', () => {
  listeRender();
  const liste = filtrelenmisList();
  if (liste.length > 0) esmaGoster(liste[0].no);
});

// Klavye navigasyonu
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const liste = filtrelenmisList();
  const idx = liste.findIndex(x => x.no === aktifEsmaNo);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (idx < liste.length - 1) esmaGoster(liste[idx + 1].no);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (idx > 0) esmaGoster(liste[idx - 1].no);
  }
});

// Başlat
ilerlemeGuncelle();
listeRender();
esmaGoster(1);

</script>
