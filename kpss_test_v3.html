<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS TG-06 Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:wght@300;400;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --border: #d4c9b0;
    --accent: #c0392b;
    --accent2: #2c3e50;
    --text: #1a1a1a;
    --muted: #6b6455;
    --correct: #1a6b3a;
    --correct-bg: #e8f5ec;
    --wrong: #8b1a1a;
    --wrong-bg: #fdeaea;
    --explain-bg: #fffbf0;
    --opt-exp-bg: #f9f5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 1.2rem;
    width: 100%;
    max-width: 700px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    color: var(--accent2);
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 700px;
    background: #e0d9cc;
    border-radius: 20px;
    height: 8px;
    margin: 0.6rem 0 0.3rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 20px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 0.7rem;
  }

  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 2rem;
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1.5rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .score-item { text-align: center; }
  .score-item .snum {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    display: block;
  }
  .score-item .slabel {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  #sc-correct .snum { color: var(--correct); }
  #sc-wrong .snum { color: var(--accent); }
  #sc-remain .snum { color: var(--accent2); }

  .q-card {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.6rem 1.8rem 1.4rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-top {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.1rem;
  }

  .q-num-badge {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
    min-width: 2.5rem;
  }

  .section-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    color: white;
    margin-bottom: 0.4rem;
  }

  .q-text {
    font-size: 0.96rem;
    line-height: 1.72;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    margin-top: 1.1rem;
  }

  .opt-wrap { display: flex; flex-direction: column; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    font-size: 0.93rem;
    line-height: 1.5;
    background: #faf8f3;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }

  .opt:hover:not(.disabled) {
    border-color: var(--accent2);
    background: #eee9dc;
    transform: translateX(3px);
  }

  .opt-letter {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    min-width: 1.3rem;
  }

  .opt-text { flex: 1; }

  .opt-icon {
    font-size: 1.1rem;
    margin-left: auto;
    padding-top: 1px;
    display: none;
  }

  .opt.correct-ans {
    background: var(--correct-bg);
    border-color: var(--correct);
    border-radius: 8px 8px 0 0;
  }
  .opt.correct-ans .opt-letter { color: var(--correct); }
  .opt.correct-ans .opt-icon { display: block; color: var(--correct); }

  .opt.wrong-ans {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    border-radius: 8px 8px 0 0;
  }
  .opt.wrong-ans .opt-letter { color: var(--wrong); }
  .opt.wrong-ans .opt-icon { display: block; color: var(--wrong); }

  .opt.disabled { cursor: default; }

  /* Per-option explanation (verbal only) */
  .opt-exp {
    display: none;
    font-size: 0.85rem;
    line-height: 1.65;
    padding: 0.7rem 1rem 0.7rem 1.2rem;
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    background: var(--opt-exp-bg);
    color: #2a2a2a;
  }

  .opt-exp.show { display: block; }

  .opt-exp.correct-exp {
    background: #f0faf3;
    border-color: var(--correct);
    color: #1a3a28;
  }

  .opt-exp.wrong-exp {
    background: #fff5f5;
    border-color: var(--wrong);
    color: #4a1010;
  }

  /* General explanation (non-verbal) */
  .general-exp {
    display: none;
    margin-top: 1rem;
    padding: 1rem 1.1rem;
    background: var(--explain-bg);
    border-left: 3px solid var(--correct);
    border-radius: 0 8px 8px 0;
    font-size: 0.9rem;
    line-height: 1.75;
    color: #2a2a2a;
    animation: fadeIn 0.25s ease;
  }

  .general-exp.show { display: block; }
  .general-exp.wrong-border { border-left-color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .next-btn {
    display: none;
    margin-top: 1.3rem;
    width: 100%;
    padding: 0.85rem;
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .next-btn:hover { background: #1a2940; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* Finish screen */
  .finish-screen {
    display: none;
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    animation: slideIn 0.4s ease;
  }

  .finish-screen.show { display: block; }

  .finish-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--accent2);
    margin-bottom: 0.4rem;
  }

  .finish-scores {
    display: flex;
    justify-content: center;
    gap: 4rem;
    margin: 2rem 0 1.5rem;
    flex-wrap: wrap;
  }

  .finish-score .num {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    display: block;
    line-height: 1;
  }

  .finish-score .lbl {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 0.3rem;
    display: block;
  }

  .finish-score.c .num { color: var(--correct); }
  .finish-score.w .num { color: var(--accent); }

  #fin-msg {
    font-size: 1.05rem;
    margin-bottom: 1.8rem;
    color: var(--muted);
    font-style: italic;
  }

  .restart-btn {
    padding: 0.8rem 2.8rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .restart-btn:hover { background: #a93226; }

  @media (max-width: 500px) {
    .q-card { padding: 1.2rem 1rem; }
    .q-num-badge { font-size: 1.5rem; }
  }

  /* MÜZİK ÇALAR */
  #muzik-calar { position:fixed; bottom:16px; right:16px; z-index:999; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,0.5); min-width:220px; }
  .mc-btn { background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0; line-height:1; }
  .mc-bilgi { flex:1; }
  .mc-parca { font-size:0.68rem; color:#e8c547; font-family:monospace; }
  .mc-durum { font-size:0.6rem; color:#666; }
  .mc-ses { width:55px; accent-color:#e8c547; cursor:pointer; }
</style>
</head>

31rda / ya\u015f\u0131yorlar.","optExp":"\u274c Yanl\u0131\u015f: 'Yazlar\u0131 \u00c7ukurova'ya' zarf t\u00fcmleci do\u011fru. Ancak 'pamuk toplamak i\u00e7in giden \u0131rgatlar' \u00f6zne \u00f6be\u011fidir ve bu iki par\u00e7a birbirinden ayr\u0131lmamal\u0131d\u0131r. 'Bir \u00e7ad\u0131rda' = dolayl\u0131 t\u00fcmle\u00e7, 'ya\u015f\u0131yorlar' = y\u00fcklem. \u00d6zne \u00f6be\u011fi b\u00f6l\u00fcnm\u00fc\u015ft\u00fcr."},{"letter":"E","correct":"E","text":"Ge\u00e7en hafta d\u00fczenlenen konferansta / Mehmet Akif Ersoy'un \u015fiirleri / okundu.","optExp":"\u2705 Do\u011fru: 'Ge\u00e7en hafta d\u00fczenlenen konferansta' = zarf t\u00fcmleci | 'Mehmet Akif Ersoy'un \u015fiirleri' = \u00f6zne | 'okundu' = y\u00fcklem. \u00dc\u00e7 \u00f6ge tam ve do\u011fru bi\u00e7imde ayr\u0131lm\u0131\u015ft\u0131r."}],

// ── LocalStorage ile ilerleme kaydetme ──────────────────────────
const SAVE_KEY = 'kpss_tg06_progress';

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      current, correctCount, wrongCount,
      answers: answers  // {qIdx: {chosen, correct}}
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearState() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function render(idx) {
  const q = QUESTIONS[idx];
  const card = document.getElementById('qcard');

  const optsHtml = q.opts.map(o => `
    <div class="opt-wrap">
      <div class="opt" id="opt-${o.letter}" onclick="answer(this,'${o.letter}','${o.correct}')">
        <span class="opt-letter">${o.letter}</span>
        <span class="opt-text">${o.text}</span>
        <span class="opt-icon"></span>
      </div>
      <div class="opt-exp" id="optexp-${o.letter}"></div>
    </div>`).join('');

  card.innerHTML = `
    <div class="q-top">
      <div class="q-num-badge">${q.num}</div>
      <div>
        <span class="section-badge" style="background:${SEC_COLORS[q.section]||'#555'}">${q.tag}</span>
      </div>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options">${optsHtml}</div>
    <div class="general-exp" id="genexp"></div>
    <button class="next-btn" id="nextbtn" onclick="next()">
      ${idx < QUESTIONS.length - 1 ? 'Sonraki Soru &rarr;' : 'Sonuçları Gör'}
    </button>
  `;

  document.getElementById('prog').style.width = (idx / QUESTIONS.length * 100) + '%';
  document.getElementById('prog-text').textContent = 'Soru ' + (idx+1) + ' / ' + QUESTIONS.length;

  // Eğer bu soru daha önce cevaplandıysa (geri gelindi), göster
  if (answers[idx]) {
    restoreAnswer(idx, answers[idx].chosen, answers[idx].correct);
  }
}

function restoreAnswer(idx, chosen, correct) {
  // Cevabı sessizce geri yükle (sayaçları değiştirmeden)
  const card = document.getElementById('qcard');
  card.dataset.answered = '1';
  const q = QUESTIONS[idx];

  q.opts.forEach(o => {
    const optEl = document.getElementById('opt-' + o.letter);
    if (optEl) { optEl.classList.add('disabled'); optEl.onclick = null; }
  });

  const correctEl = document.getElementById('opt-' + correct);
  correctEl.classList.add('correct-ans');
  correctEl.querySelector('.opt-icon').textContent = '✓';

  if (chosen !== correct) {
    const chosenEl = document.getElementById('opt-' + chosen);
    chosenEl.classList.add('wrong-ans');
    chosenEl.querySelector('.opt-icon').textContent = '✗';
  }

  showExplanations(q, chosen, correct);
  document.getElementById('nextbtn').classList.add('show');
}

function showExplanations(q, chosen, correct) {
  if (q.isVerbal) {
    q.opts.forEach(o => {
      const expEl = document.getElementById('optexp-' + o.letter);
      const optBtn = document.getElementById('opt-' + o.letter);
      if (expEl && o.optExp) {
        expEl.innerHTML = o.optExp;
        expEl.classList.add('show');
        optBtn.style.borderRadius = '8px 8px 0 0';
        if (o.letter === correct) {
          expEl.classList.add('correct-exp');
        } else {
          expEl.classList.add('wrong-exp');
        }
      }
    });
  } else {
    const genExp = document.getElementById('genexp');
    genExp.innerHTML = q.exp;
    genExp.classList.add('show');
    if (chosen !== correct) genExp.classList.add('wrong-border');
  }
}

function answer(el, chosen, correct) {
  const card = document.getElementById('qcard');
  if (card.dataset.answered) return;
  card.dataset.answered = '1';

  const q = QUESTIONS[current];

  // Disable all options
  q.opts.forEach(o => {
    const optEl = document.getElementById('opt-' + o.letter);
    if (optEl) { optEl.classList.add('disabled'); optEl.onclick = null; }
  });

  const correctEl = document.getElementById('opt-' + correct);
  correctEl.classList.add('correct-ans');
  correctEl.querySelector('.opt-icon').textContent = '✓';

  if (chosen !== correct) {
    wrongCount++;
    const chosenEl = document.getElementById('opt-' + chosen);
    chosenEl.classList.add('wrong-ans');
    chosenEl.querySelector('.opt-icon').textContent = '✗';
  } else {
    correctCount++;
  }

  showExplanations(q, chosen, correct);

  // Cevabı kaydet
  answers[current] = { chosen, correct };
  saveState();

  document.querySelector('#sc-correct .snum').textContent = correctCount;
  document.querySelector('#sc-wrong .snum').textContent = wrongCount;
  document.querySelector('#sc-remain .snum').textContent = QUESTIONS.length - current - 1;

  document.getElementById('nextbtn').classList.add('show');
}

function next() {
  current++;
  if (current >= QUESTIONS.length) { showFinish(); return; }
  const card = document.getElementById('qcard');
  delete card.dataset.answered;
  saveState();
  render(current);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFinish() {
  document.getElementById('qcard').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.querySelector('.progress-text').style.display = 'none';
  document.getElementById('prog').style.width = '100%';
  clearState();

  const f = document.getElementById('finish');
  f.classList.add('show');
  document.getElementById('fin-c').textContent = correctCount;
  document.getElementById('fin-w').textContent = wrongCount;

  const pct = Math.round(correctCount / QUESTIONS.length * 100);
  let msg = pct >= 85 ? 'Mükemmel performans!' :
            pct >= 70 ? 'Çok iyi! Biraz daha çalışmayla mükemmel.' :
            pct >= 50 ? 'İyi çalışma. Tekrar üzerinden geç.' :
                        'Devam et! Tekrar çözerek pekiştir.';
  document.getElementById('fin-msg').textContent = msg;
}

function restart() {
  current = 0; correctCount = 0; wrongCount = 0; answers = {};
  clearState();
  document.querySelector('#sc-correct .snum').textContent = 0;
  document.querySelector('#sc-wrong .snum').textContent = 0;
  document.querySelector('#sc-remain .snum').textContent = QUESTIONS.length;
  document.getElementById('qcard').style.display = '';
  document.querySelector('.progress-bar-wrap').style.display = '';
  document.querySelector('.progress-text').style.display = '';
  document.getElementById('finish').classList.remove('show');
  const card = document.getElementById('qcard');
  delete card.dataset.answered;
  render(0);
  window.scrollTo({ top: 0 });
}

// ── Sayfa açılışında kayıtlı ilerlemeyi kontrol et ──────────────
const saved = loadState();
if (saved && saved.current > 0 && saved.current < QUESTIONS.length) {
  // Devam ekranı göster
  const card = document.getElementById('qcard');
  card.innerHTML = `
    <div style="text-align:center;padding:2rem 1rem;">
      <div style="font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--accent2);margin-bottom:0.8rem;">
        Kaldığın yerden devam et
      </div>
      <p style="color:var(--muted);font-size:0.95rem;margin-bottom:1.5rem;">
        ${saved.current}. soruya kadar tamamlandı<br>
        <strong style="color:var(--correct)">✓ ${saved.correctCount} Doğru</strong> &nbsp;
        <strong style="color:var(--accent)">✗ ${saved.wrongCount} Yanlış</strong>
      </p>
      <button onclick="resumeSession()" style="
        padding:0.75rem 2rem;background:var(--accent2);color:white;
        border:none;border-radius:8px;font-family:'Source Serif 4',serif;
        font-size:1rem;cursor:pointer;margin-right:1rem;">
        Devam Et →
      </button>
      <button onclick="render(0)" style="
        padding:0.75rem 2rem;background:transparent;color:var(--muted);
        border:1.5px solid var(--border);border-radius:8px;
        font-family:'Source Serif 4',serif;font-size:1rem;cursor:pointer;">
        Baştan Başla
      </button>
    </div>
  `;
  document.getElementById('prog').style.width = (saved.current / QUESTIONS.length * 100) + '%';
  document.getElementById('prog-text').textContent = 'Soru ' + (saved.current+1) + ' / ' + QUESTIONS.length;
  document.querySelector('#sc-correct .snum').textContent = saved.correctCount;
  document.querySelector('#sc-wrong .snum').textContent = saved.wrongCount;
  document.querySelector('#sc-remain .snum').textContent = QUESTIONS.length - saved.current;
} else if (saved && saved.current >= QUESTIONS.length) {
  // Test bitmişti, sıfırdan başlat
  clearState();
  render(0);
} else {
  render(0);
}

function resumeSession() {
  const saved = loadState();
  if (!saved) { render(0); return; }
  current = saved.current;
  correctCount = saved.correctCount;
  wrongCount = saved.wrongCount;
  answers = saved.answers || {};
  document.querySelector('#sc-correct .snum').textContent = correctCount;
  document.querySelector('#sc-wrong .snum').textContent = wrongCount;
  document.querySelector('#sc-remain .snum').textContent = QUESTIONS.length - current;
  const card = document.getElementById('qcard');
  delete card.dataset.answered;
  render(current);
  window.scrollTo({ top: 0 });
}
// ────────────────────────────────────────────────────────────────
</script>
<!-- MÜZİK ÇALAR -->
<div id="muzik-calar">
  <button class="mc-btn" onclick="oncekiParca()">⏮️</button>
  <button class="mc-btn" id="mc-pp" onclick="muzikToggle()">▶️</button>
  <button class="mc-btn" onclick="sonrakiParca()">⏭️</button>
  <div class="mc-bilgi">
    <div class="mc-parca" id="mc-parca">Yükleniyor...</div>
    <div class="mc-durum" id="mc-durum">Sessiz — sesi aç →</div>
  </div>
  <input class="mc-ses" type="range" min="0" max="1" step="0.05" value="0" id="mc-ses" oninput="sesAyarla(this.value)">
  <span style="font-size:0.9rem;cursor:pointer;" onclick="var s=document.getElementById('mc-ses');s.value=s.value==0?0.5:0;sesAyarla(s.value);">🔊</span>
</div>
<audio id="muzik-player" preload="none"></audio>
<script>
// ── MÜZİK — GitHub API otomatik ──
let PARCALAR = [];
let mevcutParca = 0;
let muzikBasladi = false;
const player = document.getElementById('muzik-player');
player.volume = 0;
player.addEventListener('ended', () => { mevcutParca = (mevcutParca + 1) % PARCALAR.length; parcaYukle(true); });
async function muzikListesiYukle() {
  try {
    const res = await fetch('https://api.github.com/repos/aksuirem0-max/kpss-calisma/contents/');
    const dosyalar = await res.json();
    PARCALAR = dosyalar.filter(d => d.type === 'file' && /\.(mp3|mpeg|ogg|wav|m4a)$/i.test(d.name)).map(d => ({ url: 'https://raw.githubusercontent.com/aksuirem0-max/kpss-calisma/main/' + d.name, ad: d.name.replace(/\.[^.]+$/, '') }));
    if (PARCALAR.length > 0) { document.getElementById('mc-parca').textContent = PARCALAR[0].ad + ' · 1 / ' + PARCALAR.length; document.getElementById('mc-durum').textContent = PARCALAR.length + ' parça — sesi aç →'; parcaYukle(false); }
    else { document.getElementById('mc-durum').textContent = 'Müzik bulunamadı'; }
  } catch(e) { document.getElementById('mc-durum').textContent = 'Bağlantı hatası'; }
}
function parcaYukle(oyna) {
  if (PARCALAR.length === 0) return;
  player.src = PARCALAR[mevcutParca].url;
  document.getElementById('mc-parca').textContent = PARCALAR[mevcutParca].ad + ' · ' + (mevcutParca + 1) + ' / ' + PARCALAR.length;
  if (oyna) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = 'Çalıyor'; }
}
function muzikToggle() {
  if (!muzikBasladi) { muzikBasladi = true; parcaYukle(true); return; }
  if (player.paused) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = player.volume === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor'; }
  else { player.pause(); document.getElementById('mc-pp').textContent = '▶️'; document.getElementById('mc-durum').textContent = 'Duraklatıldı'; }
}
function sesAyarla(val) {
  player.volume = parseFloat(val);
  if (!muzikBasladi && parseFloat(val) > 0) { muzikBasladi = true; parcaYukle(true); }
  document.getElementById('mc-durum').textContent = parseFloat(val) === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor';
}
function oncekiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca - 1 + PARCALAR.length) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
function sonrakiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca + 1) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
window.addEventListener('load', () => { muzikListesiYukle(); });

</script>
</body>
</html>
