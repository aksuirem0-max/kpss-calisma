<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Vatandaşlık Quiz 3 - Zor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0F1E;--surface:#0F172A;--border:#1E293B;
  --accent:#F59E0B;--accent2:#EF4444;
  --correct:#059669;--wrong:#DC2626;
  --text:#F1F5F9;--muted:#64748B;--card:#111827;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
header{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;padding:14px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.logo .z{color:var(--accent2);font-size:11px;font-weight:700;border:1px solid var(--accent2);padding:2px 6px;border-radius:3px;margin-left:6px;vertical-align:middle;}
.stats{display:flex;gap:18px;font-size:12px;color:var(--muted);}
.stat strong{color:var(--text);font-size:16px;display:block;text-align:center;}
.progress-wrap{width:100%;max-width:760px;height:4px;background:var(--border);border-radius:2px;margin-bottom:18px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .35s ease;}
.top-row{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cat-pill{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:rgba(245,158,11,.1);border:1px solid var(--accent);padding:3px 10px;border-radius:20px;}
.timer-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px;}
.timer-num{font-size:16px;font-weight:800;color:var(--accent);min-width:22px;}
.timer-num.danger{color:var(--wrong);}
.question-card{width:100%;max-width:760px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:12px;}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-number{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;}
.q-diff{font-size:10px;color:var(--accent2);font-weight:700;border:1px solid var(--accent2);padding:1px 7px;border-radius:10px;}
.q-text{font-size:17px;line-height:1.6;color:var(--text);font-weight:500;}
.q-note{font-size:12px;color:var(--accent);margin-top:8px;font-style:italic;}
.options{width:100%;max-width:760px;display:grid;gap:8px;margin-bottom:12px;}
.option-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,background .15s;line-height:1.4;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(245,158,11,.06);}
.option-btn .key{width:26px;height:26px;border-radius:5px;background:var(--border);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);margin-top:1px;}
.option-btn.correct{border-color:var(--correct);background:rgba(5,150,105,.1);}
.option-btn.correct .key{background:var(--correct);color:#fff;}
.option-btn.wrong{border-color:var(--wrong);background:rgba(220,38,38,.1);}
.option-btn.wrong .key{background:var(--wrong);color:#fff;}
.option-btn:disabled{cursor:default;}
.feedback{width:100%;max-width:760px;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;line-height:1.5;}
.feedback.show{display:block;}
.feedback.correct{background:rgba(5,150,105,.12);border:1px solid var(--correct);color:#34D399;}
.feedback.wrong{background:rgba(220,38,38,.12);border:1px solid var(--wrong);color:#F87171;}
.next-btn{width:100%;max-width:760px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:none;transition:opacity .15s;}
.next-btn:hover{opacity:.88;}
.next-btn.show{display:block;}
#result-screen{display:none;width:100%;max-width:760px;text-align:center;padding-top:10px;}
.result-emoji{font-size:50px;margin-bottom:10px;}
.result-title{font-size:24px;font-weight:800;margin-bottom:6px;}
.result-score{font-size:62px;font-weight:800;line-height:1;margin:12px 0;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.result-label{color:var(--muted);font-size:14px;margin-bottom:22px;}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
.rstat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;}
.rstat .rnum{font-size:24px;font-weight:800;margin-bottom:3px;}
.rstat .rlbl{font-size:11px;color:var(--muted);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:13px 26px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.btn-s{background:var(--surface);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:13px 26px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.btn-s:hover{border-color:var(--accent);}
#cat-screen{width:100%;max-width:760px;}
.cat-header{text-align:center;margin-bottom:26px;}
.cat-header h1{font-size:26px;font-weight:800;margin-bottom:6px;}
.cat-header h1 span{color:var(--accent);}
.cat-header p{color:var(--muted);font-size:13px;}
.diff-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(239,68,68,.1);border:1px solid var(--accent2);color:var(--accent2);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px;}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.cat-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s;}
.cat-card:hover{border-color:var(--accent);}
.cat-card.selected{border-color:var(--accent);background:rgba(245,158,11,.07);}
.cat-card .ci{font-size:22px;margin-bottom:6px;}
.cat-card .cn{font-weight:700;font-size:13px;margin-bottom:2px;}
.cat-card .cc{font-size:11px;color:var(--muted);}
.start-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
#quiz-screen{display:none;width:100%;}
@media(max-width:520px){.cat-grid{grid-template-columns:1fr;}.result-grid{grid-template-columns:1fr 1fr;}.q-text{font-size:15px;}.btn-row{flex-direction:column;}}
</style>
</head>
<body>
<header>
  <div class="logo">KPSS Vatandaşlık <span class="z">ZOR</span></div>
  <div class="stats" id="hstats" style="display:none">
    <div class="stat"><strong id="sc">0</strong>Doğru</div>
    <div class="stat"><strong id="sw">0</strong>Yanlış</div>
    <div class="stat"><strong id="st">0</strong>Toplam</div>
  </div>
</header>

<div id="cat-screen">
  <div class="cat-header">
    <div class="diff-badge">🔥 ZOR SEVİYE — 20 saniyelik süre</div>
    <h1>Konu <span>Seç</span></h1>
    <p>Şıklar birbirine yakın — dikkatli oku</p>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="start-btn" onclick="startQuiz()">Sınava Gir →</button>
</div>

<div id="quiz-screen">
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
  <div class="top-row">
    <div class="cat-pill" id="cpill"></div>
    <div class="timer-box"><span style="font-size:13px;color:var(--muted)">⏱</span><span class="timer-num" id="tnum">20</span></div>
  </div>
  <div class="question-card">
    <div class="q-meta"><div class="q-number" id="qnum"></div><div class="q-diff">ZOR</div></div>
    <div class="q-text" id="qtext"></div>
    <div class="q-note" id="qnote"></div>
  </div>
  <div class="options" id="opts"></div>
  <div class="feedback" id="fb"></div>
  <button class="next-btn" id="nbtn" onclick="nextQ()">Sonraki →</button>
</div>

<div id="result-screen">
  <div class="result-emoji" id="remoji"></div>
  <div class="result-title">Sınav Bitti</div>
  <div class="result-score" id="rscore"></div>
  <div class="result-label" id="rlabel"></div>
  <div class="result-grid">
    <div class="rstat"><div class="rnum" style="color:var(--correct)" id="rc">0</div><div class="rlbl">Doğru</div></div>
    <div class="rstat"><div class="rnum" style="color:var(--wrong)" id="rw">0</div><div class="rlbl">Yanlış</div></div>
    <div class="rstat"><div class="rnum" style="color:var(--accent)" id="rs">0</div><div class="rlbl">Süre Doldu</div></div>
  </div>
  <div class="btn-row">
    <button class="btn-p" onclick="showCat()">Yeniden Oyna</button>
    <button class="btn-s" onclick="replaySame()">Aynı Konuyu Tekrar</button>
  </div>
</div>

<script>
var Q=[];

/* ===== TEMEL HUKUK - ZOR ===== */
Q.push({c:"Temel Hukuk",q:"Kanunun 'ayırt etme gücü bulunmayan kişinin yaptığı sözleşmeler geçersizdir' maddesindeki boşluk türü hangisidir?",a:"Açık olmayan boşluk",o:["Açık boşluk","Açık olmayan boşluk","Hukuk boşluğu","Kanun boşluğu"],note:"Açık boşluk: düzenleme hiç yok. Açık olmayan boşluk: var ama yetersiz."});
Q.push({c:"Temel Hukuk",q:"Kural içi boşluklarda bilinçli bırakılmış boşluğu doldurmak için hakimin kullandığı yetki nedir?",a:"Takdir yetkisi",o:["Hukuk yaratma yetkisi","Kıyas yetkisi","Takdir yetkisi","Yorum yetkisi"],note:"Kanun boşluğu = takdir yetkisi. Hukuk boşluğu = hukuk yaratma yetkisi."});
Q.push({c:"Temel Hukuk",q:"Bir olaya uygulanacak yazılı veya yazısız kural yoksa hakim 'Hukuk Yaratma Yetkisi'ni kullandığı boşluk türü nedir?",a:"Hukuk boşluğu",o:["Kanun boşluğu","Hukuk boşluğu","Açık boşluk","Açık olmayan boşluk"],note:""});
Q.push({c:"Temel Hukuk",q:"Kişinin ölüm tehlikesiyle kaybolması durumunda gaiplik kararı için son haberden kaç yıl geçmesi gerekir?",a:"1 yıl",o:["1 yıl","3 yıl","5 yıl","15 yıl"],note:"Uzun süre haber alınamama durumunda gaiplik için 5 yıl gerekir — karıştırma!"});
Q.push({c:"Temel Hukuk",q:"Sağır ve dilsizlerde ceza ehliyeti kaç yaşında BAŞLAR?",a:"15",o:["12","15","18","21"],note:"Normal kişilerde ceza ehliyeti 12'de başlar. Sağır-dilsizlerde 15."});
Q.push({c:"Temel Hukuk",q:"Sağır ve dilsizlerde TAM ceza ehliyeti kaç yaşında başlar?",a:"21",o:["15","18","21","25"],note:"Normal tam ceza ehliyeti 18. Sağır-dilsizlerde 21."});
Q.push({c:"Temel Hukuk",q:"Türk Borçlar Hukukunda hakların KAZANILMASINDA hakim olan ilke nedir?",a:"Subjektif iyi niyet",o:["Dürüstlük","Subjektif iyi niyet","Objektif iyi niyet","Eşitlik"],note:"Hakların kullanılması ve borçların ifasında dürüstlük; kazanılmasında iyi niyet."});
Q.push({c:"Temel Hukuk",q:"25 yaşındaki Aslı ile 35 yaşındaki Kerem dayısının evlenmesiyle oluşan yaptırım nedir?",a:"Mutlak butlan",o:["Yokluk","Nisbi butlan","Mutlak butlan","Tek taraflı bağlamazlık"],note:"Yasal engellere rağmen yapılan evlilik mutlak butlanla geçersizdir."});
Q.push({c:"Temel Hukuk",q:"Birden fazla kişiden hangisinin önce öldüğü ispat edilemezse ne uygulanır?",a:"Birlikte ölüm karinesi — aynı anda ölmüş sayılırlar",o:["Gaiplik kararı verilir","Birlikte ölüm karinesi — aynı anda ölmüş sayılırlar","Ölüm karinesi uygulanır","Sulh mahkemesi karar verir"],note:""});
Q.push({c:"Temel Hukuk",q:"Türk Ceza Kanunu'na göre kaç yıla kadar mahkumiyet para cezasına çevrilebilir?",a:"2 yıl",o:["1 yıl","2 yıl","3 yıl","5 yıl"],note:""});
Q.push({c:"Temel Hukuk",q:"Hak ehliyeti ne zaman kazanılır?",a:"Tam ve sağ olmak şartıyla ana rahmine düşmekle",o:["Doğumla birlikte","Tam ve sağ olmak şartıyla ana rahmine düşmekle","Nüfusa tescille","Sağ doğumla"],note:"Cenin, sağ doğum şartıyla ana rahmine düştüğü andan itibaren hak ehliyetine sahiptir."});
Q.push({c:"Temel Hukuk",q:"Kadir ile kardeşi Aslı arasında kaçıncı dereceden hısımlık vardır?",a:"2. derece yan soy",o:["1. derece yan soy","2. derece yan soy","2. derece alt soy","3. derece yan soy"],note:"Kardeşler birbirinden 2. dereceden hısım ve yan soy hısımıdır."});
Q.push({c:"Temel Hukuk",q:"Türk hukukunda Olağanüstü evlenme yaşı kaçtır ve kim karar verir?",a:"16 — mahkeme kararıyla",o:["15 — vali kararıyla","16 — mahkeme kararıyla","16 — CB onayıyla","17 — mahkeme kararıyla"],note:"Olağan 17, olağanüstü 16 — ikisi de karıştırılır."});
Q.push({c:"Temel Hukuk",q:"Borçlunun alacaklıya mirasçı olması durumunu açıklayan borç sona erme hali nedir?",a:"Birleşme",o:["İbra","Tecdit","Takas","Birleşme"],note:"Alacaklı ve borçlu sıfatı aynı kişide birleşince borç sona erer."});
Q.push({c:"Temel Hukuk",q:"Kamu Hukuku dalları arasında hangisi YER ALMAZ?",a:"Borçlar Hukuku",o:["Anayasa Hukuku","Ceza Hukuku","Vergi Hukuku","Borçlar Hukuku"],note:"Borçlar Hukuku özel hukuk dalıdır."});
Q.push({c:"Temel Hukuk",q:"'Pozitif hukuk' ile 'mevzu hukuk' arasındaki temel fark nedir?",a:"Pozitif hukuk yazılı+yazısız, mevzu hukuk yalnızca yazılı",o:["İkisi aynı anlama gelir","Pozitif hukuk yazılı+yazısız, mevzu hukuk yalnızca yazılı","Mevzu hukuk yazılı+yazısız, pozitif hukuk yalnızca yazılı","Pozitif hukuk yürürlükteki, mevzu hukuk tarihi hukuktur"],note:""});
Q.push({c:"Temel Hukuk",q:"Evli bir çiftin birlikte evlat edinebilmesi için aranan iki koşul nedir?",a:"En az 5 yıl evli olmak ve evlat edinenin 30 yaşını doldurmuş olması",o:["En az 3 yıl evli ve 25 yaşını doldurmuş olmak","En az 5 yıl evli olmak ve evlat edinenin 30 yaşını doldurmuş olması","En az 2 yıl evli ve 21 yaşını doldurmuş olmak","En az 1 yıl evli ve 18 yaşı gerekir"],note:""});
Q.push({c:"Temel Hukuk",q:"İddianamenin kabulüyle başlayıp hükmün kesinleşmesine kadar geçen süreye ne denir?",a:"Kovuşturma",o:["Soruşturma","Kovuşturma","Yargılama","İspat"],note:"Suç ihbarından iddianameye = soruşturma. İddianamedden karara = kovuşturma."});

/* ===== ANAYASA TARİHİ - ZOR ===== */
Q.push({c:"Anayasa Tarihi",q:"1924, 1921 ve 1961 anayasalarının ortak değişmez hükmü nedir?",a:"Devletin şekli",o:["Başkentin Ankara olması","Devletin şekli","Egemenliğin millete ait olması","Laiklik ilkesi"],note:"1921'de Cumhuriyet ilanıyla eklendi, sonraki anayasalarda da devam etti."});
Q.push({c:"Anayasa Tarihi",q:"1876 Kanun-i Esasi'nin ilk halinde hükümet kime karşı sorumluydu?",a:"Padişaha",o:["Meclise","Padişaha","Millete","Anayasa Mahkemesine"],note:"1909 değişikliğiyle Heyet-i Mebusan'a (meclise) karşı sorumlu hale geldi."});
Q.push({c:"Anayasa Tarihi",q:"1909 Kanun-i Esasi değişikliğinin önemi nedir?",a:"Padişahın yetkileri ilk kez mutlak olarak kısıtlandı ve meclis üstünlüğü sağlandı",o:["İlk kez anayasa yapıldı","Padişahın yetkileri ilk kez mutlak olarak kısıtlandı ve meclis üstünlüğü sağlandı","Cumhuriyet ilan edildi","Laiklik benimsendi"],note:""});
Q.push({c:"Anayasa Tarihi",q:"Türk hukuk sistemindeki çift meclisli anayasalar hangileridir?",a:"1876 ve 1961",o:["1876 ve 1924","1876 ve 1961","1921 ve 1961","1924 ve 1961"],note:"1876: Heyet-i Ayan + Heyet-i Mebusan. 1961: Cumhuriyet Senatosu + Millet Meclisi."});
Q.push({c:"Anayasa Tarihi",q:"1924 Anayasasında seçimler kaç yılda bir yapılır ve seçilme yaşı kaçtır?",a:"4 yılda bir — seçilme yaşı 30",o:["2 yılda bir — seçilme yaşı 25","4 yılda bir — seçilme yaşı 30","5 yılda bir — seçilme yaşı 25","4 yılda bir — seçilme yaşı 25"],note:"1921'de 2 yılda bir ve seçilme yaşı 25'tir — karıştırılır."});
Q.push({c:"Anayasa Tarihi",q:"Osmanlı döneminde 'Devletin dini İslam'dır' ibaresi hangi belgede ilk kez yer almış, hangi belgeyle kaldırılmıştır?",a:"1876 Kanun-i Esasi'nde yer aldı — 1928 değişikliğiyle kaldırıldı",o:["1839 Tanzimat Fermanı'nda yer aldı — 1924 ile kaldırıldı","1876 Kanun-i Esasi'nde yer aldı — 1928 değişikliğiyle kaldırıldı","1921'de yer aldı — 1937'de kaldırıldı","1924'te yer aldı — 1928'de kaldırıldı"],note:""});
Q.push({c:"Anayasa Tarihi",q:"1961 Anayasasıyla kurulanlar arasında hangisi YOKTUR?",a:"Yüksek Öğretim Kurulu",o:["Anayasa Mahkemesi","Diyanet İşleri Başkanlığı","Yüksek Seçim Kurulu","Yüksek Öğretim Kurulu"],note:"YÖK 1982 Anayasasıyla kuruldu."});
Q.push({c:"Anayasa Tarihi",q:"1982 Anayasası 2017 değişikliğiyle kaldırılan 'Cumhurbaşkanlığı Genel Sekreterliği' kaç yılında yeniden anayasaya dahil edilmiştir?",a:"2025",o:["2018","2020","2023","2025"],note:""});
Q.push({c:"Anayasa Tarihi",q:"Yargıdan hiç söz etmeyen tek Türk anayasası hangisidir?",a:"1921 Anayasası",o:["1876 Kanun-i Esasi","1921 Anayasası","1924 Anayasası","1961 Anayasası"],note:"1921 savaş dönemi anayasasıdır, 24 maddelidir ve yargıya yer vermez."});
Q.push({c:"Anayasa Tarihi",q:"Kanun-i Esasi'de üyeleri padişahın seçtiği ve ömür boyu görevde kalan meclis hangisidir?",a:"Heyet-i Ayan",o:["Heyet-i Mebusan","Heyet-i Ayan","Meclis-i Umumi","Divan-ı Hümayun"],note:"Heyet-i Mebusan seçimle gelirdi."});
Q.push({c:"Anayasa Tarihi",q:"Türk tarihinin ilk yazılı anayasal belgesi nedir ve hangi yılda imzalanmıştır?",a:"Sened-i İttifak — 1808",o:["Tanzimat Fermanı — 1839","Sened-i İttifak — 1808","Islahat Fermanı — 1856","Kanun-i Esasi — 1876"],note:""});
Q.push({c:"Anayasa Tarihi",q:"1982 Anayasası 2004 yılında yapılan değişiklikle neler kaldırıldı?",a:"Ölüm cezası ve Devlet Güvenlik Mahkemeleri",o:["Askeri yargı","Ölüm cezası ve Devlet Güvenlik Mahkemeleri","Sıkıyönetim","KHK yetkisi"],note:"Askeri yargı 2017'de, sıkıyönetim de 2017'de kaldırıldı."});
Q.push({c:"Anayasa Tarihi",q:"1982 Anayasasının kurucu meclisi hangi iki organdan oluşmuştur?",a:"Danışma Meclisi ve Milli Güvenlik Konseyi",o:["TBMM ve MGK","Danışma Meclisi ve Milli Güvenlik Konseyi","Senato ve Meclis","Anayasa Komisyonu ve MGK"],note:"1982 darbe anayasasıdır; kurucu meclis iki organdan oluştu."});

/* ===== YASAMA - ZOR ===== */

var CATS=[];Q.forEach(function(x){if(CATS.indexOf(x.c)===-1)CATS.push(x.c);});
var sel={};CATS.forEach(function(c){sel[c]=true;});
var qs=[],ci=0,co=0,wr=0,sk=0,ans=false,tmr=null,tl=20,ls=null;

function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function showCat(){
  document.getElementById('cat-screen').style.display='block';
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('hstats').style.display='none';
  renderCats();
}

function renderCats(){
  var icons={'Temel Hukuk':'⚖️','Anayasa Tarihi':'📜','Yasama':'🏛️','Yürütme':'🫅','Yargı':'🔨','İdare Hukuku':'🏢','Temel Haklar':'🛡️'};
  var g=document.getElementById('cat-grid'),h='';
  CATS.forEach(function(c){
    var cnt=0;Q.forEach(function(x){if(x.c===c)cnt++;});
    h+='<div class="cat-card'+(sel[c]?' selected':'')+'" onclick="tog(\''+c+'\',this)">';
    h+='<div class="ci">'+(icons[c]||'📚')+'</div><div class="cn">'+c+'</div><div class="cc">'+cnt+' soru</div></div>';
  });
  g.innerHTML=h;
}

function tog(c,el){
  var n=0;CATS.forEach(function(x){if(sel[x])n++;});
  if(sel[c]){if(n===1)return;sel[c]=false;el.classList.remove('selected');}
  else{sel[c]=true;el.classList.add('selected');}
}

function startQuiz(){
  ls={};CATS.forEach(function(c){ls[c]=sel[c];});
  var pool=[];Q.forEach(function(x){if(sel[x.c])pool.push(x);});
  qs=shuf(pool).slice(0,Math.min(20,pool.length));
  ci=0;co=0;wr=0;sk=0;
  document.getElementById('cat-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('hstats').style.display='flex';
  updS();showQ();
}

function replaySame(){if(ls)CATS.forEach(function(c){sel[c]=ls[c];});startQuiz();}

function showQ(){
  if(ci>=qs.length){showRes();return;}
  ans=false;clearInterval(tmr);tl=20;
  var q=qs[ci];
  document.getElementById('cpill').textContent=q.c;
  document.getElementById('qnum').textContent='SORU '+(ci+1)+' / '+qs.length;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('pbar').style.width=((ci/qs.length)*100)+'%';
  var note=document.getElementById('qnote');
  if(q.note){note.textContent='💡 İpucu: '+q.note;note.style.display='block';}
  else{note.style.display='none';}
  var opts=shuf(q.o),keys=['A','B','C','D'],h='';
  opts.forEach(function(o,i){
    var s=o.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h+='<button class="option-btn" onclick="pick(this,\''+s+'\')">';
    h+='<span class="key">'+keys[i]+'</span>'+o+'</button>';
  });
  document.getElementById('opts').innerHTML=h;
  document.getElementById('fb').className='feedback';
  document.getElementById('nbtn').className='next-btn';
  updT();tmr=setInterval(tick,1000);
}

function tick(){tl--;updT();if(tl<=0){clearInterval(tmr);if(!ans){ans=true;sk++;updS();hlC();showFB(false,true);document.getElementById('nbtn').className='next-btn show';var bs=document.getElementById('opts').getElementsByTagName('button');for(var i=0;i<bs.length;i++)bs[i].disabled=true;}}}

function updT(){var el=document.getElementById('tnum');el.textContent=tl;el.className='timer-num'+(tl<=5?' danger':'');}

function pick(btn,ch){
  if(ans)return;ans=true;clearInterval(tmr);
  var q=qs[ci],ok=(ch===q.a);
  if(ok){co++;btn.classList.add('correct');btn.querySelector('.key').style.cssText='background:var(--correct);color:#fff';}
  else{wr++;btn.classList.add('wrong');btn.querySelector('.key').style.cssText='background:var(--wrong);color:#fff';hlC();}
  updS();showFB(ok,false);
  document.getElementById('nbtn').className='next-btn show';
  var bs=document.getElementById('opts').getElementsByTagName('button');
  for(var i=0;i<bs.length;i++)bs[i].disabled=true;
}

function hlC(){var q=qs[ci];var bs=document.getElementById('opts').getElementsByTagName('button');for(var i=0;i<bs.length;i++){if(bs[i].textContent.indexOf(q.a)!==-1)bs[i].classList.add('correct');}}

function showFB(ok,to){
  var fb=document.getElementById('fb'),q=qs[ci];
  if(to){fb.textContent='⏰ Süre doldu! Doğru: '+q.a;fb.className='feedback wrong show';}
  else if(ok){fb.textContent='✅ Doğru!';fb.className='feedback correct show';}
  else{fb.textContent='❌ Yanlış! Doğru cevap: '+q.a;fb.className='feedback wrong show';}
}

function updS(){document.getElementById('sc').textContent=co;document.getElementById('sw').textContent=wr+sk;document.getElementById('st').textContent=ci;}

function nextQ(){ci++;updS();showQ();}

function showRes(){
  clearInterval(tmr);
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  var pct=Math.round((co/qs.length)*100);
  document.getElementById('rscore').textContent='%'+pct;
  var e=pct>=80?'🏆':pct>=60?'💪':'📖';
  var l=pct>=80?'Mükemmel! KPSS\'ye hazırsın.':pct>=60?'İyi! Kritik noktalara odaklan.':'Zor sorularda eksikler var — tekrar et.';
  document.getElementById('remoji').textContent=e;
  document.getElementById('rlabel').textContent=l;
  document.getElementById('rc').textContent=co;
  document.getElementById('rw').textContent=wr;
  document.getElementById('rs').textContent=sk;
  document.getElementById('pbar').style.width='100%';
}

showCat();
</script>
</body>
</html>
