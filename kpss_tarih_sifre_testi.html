<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KPSS Şifreli Ezber Testi</title>
<style>

  :root { --bg:#0d0d0d; --surface:#161616; --border:#2a2a2a; --accent:#e8c547; --green:#4caf78; --red:#e85d47; --blue:#47c5e8; --text:#f0ede8; --muted:#666; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; }
  #header { background:var(--surface); border-bottom:2px solid var(--accent); padding:12px 16px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
  #header h1 { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; color:var(--accent); }
  #pt { font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--muted); }
  #progress-wrap { height:4px; background:var(--border); }
  #progress-bar { height:4px; background:var(--accent); transition:width 0.4s; width:0%; }
  #app { max-width:680px; margin:0 auto; padding:20px 14px 100px; }
  #menu { display:none; } #menu.active { display:block; }
  .menu-title { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:3px; color:var(--accent); margin-bottom:4px; }
  .menu-sub { color:var(--muted); font-size:0.8rem; margin-bottom:28px; }
  .sifre-grid { display:grid; gap:10px; }
  .sifre-btn { background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--accent); padding:14px 16px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.15s; text-align:left; color:var(--text); }
  .sifre-btn:hover { background:#1e1e1e; transform:translateX(3px); }
  .sb-sifre { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--accent); letter-spacing:2px; }
  .sb-konu { font-size:0.75rem; color:var(--muted); margin-top:2px; }
  .sb-harf { font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--blue); margin-top:3px; }
  #test { display:none; } #test.active { display:block; }
  .ust-bar { display:flex; gap:8px; margin-bottom:16px; }
  .geri-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.78rem; }
  .geri-btn:hover { color:var(--text); border-color:var(--text); }
  .sifre-baslik { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--accent); letter-spacing:3px; margin-bottom:2px; }
  .sifre-konu { font-size:0.78rem; color:var(--muted); margin-bottom:16px; }
  .skor-bar { display:flex; gap:14px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:9px 14px; margin-bottom:14px; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; }
  .sk { display:flex; gap:5px; align-items:center; }
  .sk-n { font-size:0.95rem; font-weight:700; }
  .sk-d { color:var(--green); } .sk-y { color:var(--red); }
  .sifre-gosterge { background:rgba(232,197,71,0.05); border:1px solid rgba(232,197,71,0.2); border-radius:6px; padding:10px 14px; margin-bottom:14px; }
  .sg-label { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--accent); letter-spacing:2px; margin-bottom:8px; }
  .sg-harfler { display:flex; gap:4px; flex-wrap:wrap; }
  .sg-h { width:34px; height:38px; border-radius:4px; border:1px solid rgba(232,197,71,0.25); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; }
  .sg-h.biliyor { background:rgba(76,175,120,0.2); border-color:var(--green); color:var(--green); }
  .sg-h.aktif { background:rgba(232,197,71,0.15); border-color:var(--accent); color:var(--accent); }
  .sg-h.kalan { background:#111; color:#333; border-color:#222; }
  .soru-kart { background:var(--surface); border:1px solid var(--border); border-top:4px solid var(--accent); border-radius:8px; padding:18px 16px; margin-bottom:14px; }
  .soru-no { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--accent); letter-spacing:2px; margin-bottom:8px; }
  .soru-metin { font-size:1rem; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:12px; }
  .harf-wrap { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
  .harf-kutu { width:34px; height:40px; background:#111; border:2px solid var(--border); border-radius:5px; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--accent); transition:all 0.15s; }
  .harf-kutu.dogru { border-color:var(--green); background:rgba(76,175,120,0.15); color:var(--green); animation:zipla 0.3s ease; }
  .harf-kutu.yanlis { border-color:var(--red); background:rgba(232,93,71,0.15); color:var(--red); animation:titret 0.3s ease; }
  @keyframes zipla { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes titret { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .yazma-alani { background:#111; border:2px solid var(--accent); border-radius:8px; padding:10px 14px; margin-bottom:12px; min-height:52px; display:flex; flex-direction:column; cursor:text; }
  .yazma-alani:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(71,197,232,0.1); }
  .yazma-label { font-family:'IBM Plex Mono',monospace; font-size:0.6rem; color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .yazma-ic { display:flex; align-items:center; gap:1px; flex-wrap:wrap; min-height:28px; }
  .yazilan-harf { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--text); }
  .yazilan-harf.ok { color:var(--green); }
  .yazilan-harf.hata { color:var(--red); }
  .cursor-blink { display:inline-block; width:2px; height:1.2rem; background:var(--accent); animation:blink 0.9s infinite; vertical-align:middle; margin-left:1px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #gizli-input { position:fixed; left:-9999px; top:50%; opacity:0; width:1px; height:1px; }
  .aciklama-kutu { background:rgba(71,197,232,0.06); border:1px solid rgba(71,197,232,0.2); border-radius:6px; padding:10px 14px; margin-bottom:12px; font-size:0.8rem; color:#aaa; line-height:1.5; }
  .aciklama-kutu strong { color:var(--blue); }
  .cevap-goster { background:rgba(76,175,120,0.1); border:1px solid var(--green); border-radius:6px; padding:11px 14px; margin-bottom:12px; display:none; }
  .cevap-goster.aktif { display:block; }
  .cevap-label { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--green); letter-spacing:2px; margin-bottom:5px; }
  .cevap-metin { font-size:0.92rem; color:var(--green); font-weight:600; }
  .ipucu-bar { display:flex; gap:8px; align-items:center; }
  .ipucu-btn { background:rgba(71,197,232,0.1); border:1px solid var(--blue); color:var(--blue); padding:7px 14px; border-radius:4px; cursor:pointer; font-size:0.78rem; }
  .ipucu-txt { font-size:0.75rem; color:var(--muted); }
  #sonuc { display:none; } #sonuc.active { display:block; }
  .sonuc-baslik { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--accent); margin-bottom:8px; }
  .sonuc-stats { font-family:'IBM Plex Mono',monospace; font-size:0.82rem; color:var(--muted); line-height:1.9; margin-bottom:24px; }
  .sonuc-stats span { color:var(--text); }
  .btn-prim { background:var(--accent); color:#000; border:none; padding:12px 24px; border-radius:4px; font-weight:700; font-size:0.9rem; cursor:pointer; margin-right:8px; }
  .btn-sek { background:none; border:1px solid var(--border); color:var(--text); padding:10px 18px; border-radius:4px; font-size:0.85rem; cursor:pointer; }
  /* MÜZİK */
  #muzik-calar { position:fixed; bottom:16px; right:16px; z-index:999; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,0.5); min-width:190px; }
  .mc-btn { background:none; border:none; cursor:pointer; font-size:1.2rem; padding:0; line-height:1; }
  .mc-bilgi { flex:1; }
  .mc-parca { font-size:0.68rem; color:var(--accent); font-family:'IBM Plex Mono',monospace; }
  .mc-durum { font-size:0.6rem; color:var(--muted); }
  .mc-ses { width:55px; accent-color:var(--accent); cursor:pointer; }
  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div id="header">
  <h1>🔐 ŞİFRELİ EZBER</h1>
  <span id="pt">Şifre seç</span>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="app">
  <div id="menu" class="active">
    <div class="menu-title">ŞİFRE TESTİ</div>
    <div class="menu-sub">Şifreyi seç · Her harfi yaz · Ezberlediğini kanıtla</div>
    <div class="sifre-grid" id="sifre-grid"></div>
  </div>
  <div id="test">
    <div class="ust-bar">
      <button class="geri-btn" onclick="menuye()">← Geri</button>
      <button class="geri-btn" onclick="testBaslat()">↺ Yeniden</button>
    </div>
    <div class="sifre-baslik" id="t-sifre"></div>
    <div class="sifre-konu" id="t-konu"></div>
    <div class="skor-bar">
      <div class="sk">✓ <span class="sk-n sk-d" id="s-d">0</span></div>
      <div class="sk">✗ <span class="sk-n sk-y" id="s-y">0</span></div>
      <div class="sk">Kalan: <span class="sk-n" style="color:var(--accent)" id="s-k">0</span></div>
    </div>
    <div class="sifre-gosterge" id="sifre-gosterge"></div>
    <div class="soru-kart">
      <div class="soru-no" id="soru-no"></div>
      <div class="soru-metin" id="soru-metin"></div>
      <div class="aciklama-kutu" id="aciklama-kutu"></div>
      <div class="harf-wrap" id="harf-wrap"></div>
      <div class="cevap-goster" id="cevap-goster">
        <div class="cevap-label">✓ DOĞRU CEVAP</div>
        <div class="cevap-metin" id="cevap-metin"></div>
      </div>
    </div>
    <input id="gizli-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <div class="yazma-alani" onclick="odakla()" id="yazma-alani">
      <div class="yazma-label">CEVABINI YAZ ↓</div>
      <div class="yazma-ic" id="yazma-ic"><span class="cursor-blink"></span></div>
    </div>
    <div class="ipucu-bar">
      <button class="ipucu-btn" onclick="ipucuGoster()">💡 İpucu</button>
      <span class="ipucu-txt" id="ipucu-txt"></span>
    </div>
  </div>
  <div id="sonuc">
    <div class="ust-bar"><button class="geri-btn" onclick="menuye()">← Geri</button></div>
    <div class="sonuc-baslik" id="son-baslik"></div>
    <div class="sonuc-stats" id="son-stats"></div>
    <button class="btn-prim" onclick="testBaslat()">↺ Tekrar</button>
    <button class="btn-sek" onclick="menuye()">Menü</button>
  </div>
</div>

<!-- MÜZİK ÇALAR -->
<div id="muzik-calar">
  <button class="mc-btn" id="mc-pp" onclick="muzikToggle()">▶️</button>
  <div class="mc-bilgi">
    <div class="mc-parca" id="mc-parca">Parça 1 / 4</div>
    <div class="mc-durum" id="mc-durum">Sessiz — sesi aç →</div>
  </div>
  <input class="mc-ses" type="range" min="0" max="1" step="0.05" value="0" id="mc-ses" oninput="sesAyarla(this.value)">
  <span style="font-size:0.9rem;cursor:pointer;" onclick="var s=document.getElementById('mc-ses');s.value=s.value==0?0.5:0;sesAyarla(s.value);">🔊</span>
</div>
<audio id="muzik-player" preload="none"></audio>

// ── STATE ──
let aktifSifre = null;
let soruIdx = 0;
let dogruSayisi = 0;
let yanlisSayisi = 0;
let mevcutCevap = '';
let mevcutGirilen = [];
let ipucuHakki = 3;
let bilinenHarfler = [];
let soruKilitli = false;

function initMenu() {
  const grid = document.getElementById('sifre-grid');
  grid.innerHTML = '';
  SIFRELER.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sifre-btn';
    btn.onclick = () => sifreAc(i);
    btn.innerHTML = '<div><div class="sb-sifre">' + s.sifre + '</div><div class="sb-konu">' + s.konu + '</div><div class="sb-harf">' + s.sorular.map(q => q.harf).join(' · ') + '</div></div>';
    grid.appendChild(btn);
  });
}

function menuye() {
  document.getElementById('menu').classList.add('active');
  document.getElementById('test').classList.remove('active');
  document.getElementById('sonuc').classList.remove('active');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('pt').textContent = 'Şifre seç';
}

function sifreAc(i) { aktifSifre = SIFRELER[i]; testBaslat(); }

function testBaslat() {
  soruIdx = 0; dogruSayisi = 0; yanlisSayisi = 0; ipucuHakki = 3;
  bilinenHarfler = new Array(aktifSifre.sorular.length).fill(false);
  document.getElementById('menu').classList.remove('active');
  document.getElementById('test').classList.add('active');
  document.getElementById('sonuc').classList.remove('active');
  document.getElementById('t-sifre').textContent = aktifSifre.sifre;
  document.getElementById('t-konu').textContent = aktifSifre.konu;
  guncelleSifreGosterge();
  soruyuGoster();
}

function soruyuGoster() {
  if (soruIdx >= aktifSifre.sorular.length) { testBitti(); return; }
  const soru = aktifSifre.sorular[soruIdx];
  mevcutCevap = soru.cevap.toUpperCase().split('');
  mevcutGirilen = [];
  soruKilitli = false;
  document.getElementById('soru-no').textContent = 'SORU ' + (soruIdx + 1) + ' / ' + aktifSifre.sorular.length;
  document.getElementById('soru-metin').textContent = soru.soru;
  document.getElementById('aciklama-kutu').innerHTML = '<strong>💡 İpucu:</strong> ' + soru.aciklama;
  document.getElementById('cevap-goster').classList.remove('aktif');
  document.getElementById('ipucu-txt').textContent = ipucuHakki + ' ipucu hakkın var';
  harfKutulariCiz();
  yazmaAlaniniGuncelle();
  guncelleSkor();
  progressGuncelle();
  odakla();
}

function harfKutulariCiz() {
  const wrap = document.getElementById('harf-wrap');
  wrap.innerHTML = '';
  mevcutCevap.forEach((h, i) => {
    if (h === ' ') {
      const b = document.createElement('div');
      b.style.cssText = 'width:12px;height:40px;';
      wrap.appendChild(b);
    } else {
      const kutu = document.createElement('div');
      kutu.className = 'harf-kutu';
      kutu.id = 'hk-' + i;
      wrap.appendChild(kutu);
    }
  });
}

function yazmaAlaniniGuncelle() {
  const ic = document.getElementById('yazma-ic');
  ic.innerHTML = '';
  mevcutGirilen.forEach(h => {
    const span = document.createElement('span');
    span.className = 'yazilan-harf ok';
    span.textContent = h;
    ic.appendChild(span);
  });
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  ic.appendChild(cursor);
  const kalan = mevcutCevap.filter(h => h !== ' ').length - mevcutGirilen.length;
  if (kalan > 0) {
    const hint = document.createElement('span');
    hint.style.cssText = 'color:#2a2a2a;font-family:"Bebas Neue",sans-serif;font-size:1.1rem;margin-left:3px;letter-spacing:2px;';
    hint.textContent = '_'.repeat(kalan);
    ic.appendChild(hint);
  }
}

function normalize(h) {
  return h.toUpperCase()
    .replace(/İ/g,'I').replace(/I/g,'I')
    .replace(/Ş/g,'S').replace(/Ğ/g,'G')
    .replace(/Ü/g,'U').replace(/Ö/g,'O')
    .replace(/Ç/g,'C');
}

function harfGirildi(harf) {
  if (soruKilitli) return;
  if (harf === 'BACKSPACE') {
    if (mevcutGirilen.length > 0) {
      mevcutGirilen.pop();
      let poz = mevcutGirilen.length;
      while (poz < mevcutCevap.length && mevcutCevap[poz] === ' ') poz++;
      const k = document.getElementById('hk-' + poz);
      if (k) { k.textContent = ''; k.className = 'harf-kutu'; }
      yazmaAlaniniGuncelle();
    }
    return;
  }
  let hedefPoz = 0, doldurulan = 0;
  for (let i = 0; i < mevcutCevap.length; i++) {
    if (mevcutCevap[i] === ' ') continue;
    if (doldurulan === mevcutGirilen.length) { hedefPoz = i; break; }
    doldurulan++;
  }
  if (mevcutGirilen.length >= mevcutCevap.filter(h => h !== ' ').length) return;
  const beklenen = mevcutCevap[hedefPoz];
  const kutu = document.getElementById('hk-' + hedefPoz);
  if (normalize(harf) === normalize(beklenen)) {
    mevcutGirilen.push(harf);
    if (kutu) { kutu.textContent = harf; kutu.className = 'harf-kutu dogru'; }
    yazmaAlaniniGuncelle();
    if (mevcutGirilen.length >= mevcutCevap.filter(h => h !== ' ').length) {
      soruKilitli = true;
      dogruSayisi++;
      bilinenHarfler[soruIdx] = true;
      guncelleSifreGosterge();
      guncelleSkor();
      document.getElementById('cevap-goster').classList.add('aktif');
      document.getElementById('cevap-metin').textContent = aktifSifre.sorular[soruIdx].cevap;
      setTimeout(() => { soruIdx++; soruyuGoster(); }, 1400);
    }
  } else {
    yanlisSayisi++;
    guncelleSkor();
    if (kutu) {
      kutu.textContent = harf; kutu.className = 'harf-kutu yanlis';
      setTimeout(() => { kutu.textContent = ''; kutu.className = 'harf-kutu'; }, 500);
    }
    const ic = document.getElementById('yazma-ic');
    const e = document.createElement('span');
    e.className = 'yazilan-harf hata'; e.textContent = harf;
    ic.insertBefore(e, ic.querySelector('.cursor-blink'));
    setTimeout(() => { if (e.parentNode) e.remove(); }, 500);
  }
}

function ipucuGoster() {
  if (ipucuHakki <= 0 || soruKilitli) { document.getElementById('ipucu-txt').textContent = 'İpucu hakkın kalmadı!'; return; }
  ipucuHakki--;
  let doldurulan = 0;
  for (let i = 0; i < mevcutCevap.length; i++) {
    if (mevcutCevap[i] === ' ') continue;
    if (doldurulan === mevcutGirilen.length) { harfGirildi(normalize(mevcutCevap[i])); break; }
    doldurulan++;
  }
  document.getElementById('ipucu-txt').textContent = ipucuHakki + ' ipucu hakkın kaldı';
}

function odakla() { const inp = document.getElementById('gizli-input'); if (inp) { inp.value = ''; inp.focus(); } }

function guncelleSifreGosterge() {
  const wrap = document.getElementById('sifre-gosterge');
  const harfler = aktifSifre.sorular.map(s => s.harf);
  wrap.innerHTML = '<div class="sg-label">ŞİFRE İLERLEMESİ</div><div class="sg-harfler">' +
    harfler.map((h, i) => {
      let cls = i < soruIdx ? (bilinenHarfler[i] ? 'biliyor' : 'kalan') : (i === soruIdx ? 'aktif' : 'kalan');
      return '<div class="sg-h ' + cls + '">' + h + '</div>';
    }).join('') + '</div>';
}

function guncelleSkor() {
  document.getElementById('s-d').textContent = dogruSayisi;
  document.getElementById('s-y').textContent = yanlisSayisi;
  document.getElementById('s-k').textContent = aktifSifre.sorular.length - soruIdx;
}

function progressGuncelle() {
  const pct = (soruIdx / aktifSifre.sorular.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pt').textContent = aktifSifre.sifre + ' · ' + (soruIdx + 1) + '/' + aktifSifre.sorular.length;
}

function testBitti() {
  document.getElementById('test').classList.remove('active');
  document.getElementById('sonuc').classList.add('active');
  document.getElementById('progress-bar').style.width = '100%';
  const pct = Math.round((dogruSayisi / aktifSifre.sorular.length) * 100);
  document.getElementById('son-baslik').textContent = pct === 100 ? '🏆 MÜKEMMEL!' : pct >= 70 ? '✓ İYİ!' : '📚 TEKRAR ET';
  document.getElementById('son-stats').innerHTML = 'Şifre: <span>' + aktifSifre.sifre + '</span><br>Konu: <span>' + aktifSifre.konu + '</span><br>Doğru: <span>' + dogruSayisi + ' / ' + aktifSifre.sorular.length + '</span><br>Yanlış: <span style="color:var(--red)">' + yanlisSayisi + '</span><br>Başarı: <span>' + pct + '%</span>';
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('test').classList.contains('active')) return;
  if (e.key === 'Backspace') { e.preventDefault(); harfGirildi('BACKSPACE'); return; }
  if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) { e.preventDefault(); harfGirildi(e.key.toUpperCase()); }
});

document.addEventListener('DOMContentLoaded', function() {
  const inp = document.getElementById('gizli-input');
  if (!inp) return;
  inp.addEventListener('input', function() {
    const val = inp.value.toUpperCase();
    if (val.length > 0) { harfGirildi(val[val.length - 1]); inp.value = ''; }
  });
  inp.addEventListener('keydown', function(e) { if (e.key === 'Backspace') harfGirildi('BACKSPACE'); });
});

  player.src = PARCALAR[mevcutParca].url;
  document.getElementById('mc-parca').textContent = PARCALAR[mevcutParca].ad + ' · ' + (mevcutParca + 1) + ' / ' + PARCALAR.length;
  if (oyna) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; }
}

function muzikToggle() {
  if (!muzikBasladi) { muzikBasladi = true; parcaYukle(true); return; }
  if (player.paused) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = player.volume === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor'; }
  else { player.pause(); document.getElementById('mc-pp').textContent = '▶️'; document.getElementById('mc-durum').textContent = 'Duraklatıldı'; }
}

function sesAyarla(val) {
  player.volume = parseFloat(val);
  if (!muzikBasladi && parseFloat(val) > 0) { muzikBasladi = true; parcaYukle(true); }
  document.getElementById('mc-durum').textContent = parseFloat(val) === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor';
}

window.addEventListener('load', () => { parcaYukle(false); });
initMenu();
</script>
</body>
</html>
