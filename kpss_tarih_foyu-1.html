  .progress-text{font-size:0.8rem;color:var(--muted);text-align:center;margin-bottom:0.8rem;}
  .scoreboard{display:flex;justify-content:center;gap:2.5rem;width:100%;max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.65rem 1.5rem;margin-bottom:1.3rem;flex-wrap:wrap;}
  .score-item{text-align:center;}.score-item .snum{font-family:'Playfair Display',serif;font-size:1.5rem;display:block;}.score-item .slabel{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}

  .q-num-badge{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--accent);line-height:1;min-width:2.8rem;}
  .q-meta{flex:1;}
  .bolum-badge{display:inline-block;font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:0.3rem;background:var(--card2);color:var(--muted);border:1px solid var(--border);}
  .tag-badge{display:inline-block;font-size:0.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-left:0.4rem;background:var(--accent);color:white;}
  .q-text{font-size:0.97rem;line-height:1.75;color:var(--text);white-space:pre-line;}
  .options{display:flex;flex-direction:column;gap:0.5rem;margin-top:1.2rem;}
  .opt-wrap{display:flex;flex-direction:column;}
  .opt{display:flex;align-items:flex-start;gap:0.8rem;padding:0.7rem 1.1rem;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:0.93rem;line-height:1.5;background:#0d1b2e;transition:all 0.15s;user-select:none;}
  .opt:hover:not(.disabled){border-color:var(--accent2);background:#1a2d45;transform:translateX(4px);}
  .opt-letter{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--accent2);min-width:1.3rem;}
  .opt-text{flex:1;}.opt-icon{font-size:1.1rem;margin-left:auto;display:none;padding-top:1px;}

  .opt.wrong-ans{background:var(--wrong-bg);border-color:var(--wrong-border);}.opt.wrong-ans .opt-letter{color:var(--wrong);}.opt.wrong-ans .opt-icon{display:block;color:var(--wrong);}

  .opt-exp{display:none;font-size:0.84rem;line-height:1.65;padding:0.7rem 1rem 0.7rem 1.3rem;border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--opt-exp-bg);color:#b0c4de;}
  .opt-exp.show{display:block;}.opt-exp.correct-exp{background:var(--correct-bg);border-color:var(--correct-border);color:#7ddba0;}.opt-exp.wrong-exp{background:var(--wrong-bg);border-color:var(--wrong-border);color:#f0a0a0;}
  .general-exp{display:none;margin-top:1rem;padding:1rem 1.2rem;background:var(--explain-bg);border-left:3px solid var(--correct);border-radius:0 8px 8px 0;font-size:0.9rem;line-height:1.75;color:#a8d8b0;}
  .general-exp.show{display:block;animation:fadeIn 0.25s ease;}.general-exp.wrong-border{border-left-color:var(--accent);color:#d8b0a8;}

  .next-btn:hover{background:var(--card2);border-color:var(--accent2);transform:translateY(-1px);}.next-btn.show{display:block;}
  .finish-screen{display:none;width:100%;max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
  .finish-screen.show{display:block;animation:slideIn 0.4s ease;}.finish-screen h2{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--accent2);margin-bottom:0.4rem;}
  .finish-scores{display:flex;justify-content:center;gap:4rem;margin:2rem 0 1.5rem;flex-wrap:wrap;}
  .finish-score .num{font-family:'Playfair Display',serif;font-size:3.5rem;display:block;line-height:1;}.finish-score .lbl{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:0.3rem;display:block;}
  .finish-score.c .num{color:var(--correct);}.finish-score.w .num{color:var(--accent);}
  #fin-msg{font-size:1rem;margin-bottom:1.8rem;color:var(--muted);font-style:italic;}
  .restart-btn{padding:0.8rem 2.8rem;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Source Serif 4',serif;font-size:1rem;cursor:pointer;}.restart-btn:hover{opacity:0.85;}
  .resume-screen{text-align:center;padding:2rem 1rem;}.resume-screen h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--accent2);margin-bottom:0.8rem;}
  .resume-btn{display:inline-block;margin:0.4rem;padding:0.75rem 1.8rem;border-radius:8px;font-family:'Source Serif 4',serif;font-size:0.95rem;cursor:pointer;border:none;transition:all 0.2s;}
  .resume-btn.primary{background:var(--accent);color:white;}.resume-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--border);}.resume-btn:hover{opacity:0.85;transform:translateY(-1px);}
  @media(max-width:500px){.q-card{padding:1.2rem 1rem;}.q-num-badge{font-size:1.6rem;}}

</style>

const SAVE_KEY='kpss_tarih_foyu2';
const TOTAL=QUESTIONS.length;
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({current,correctCount,wrongCount,answers}));}catch(e){}}
function loadState(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function clearState(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
let current=0,correctCount=0,wrongCount=0,answers={};

function render(idx){
  const q=QUESTIONS[idx];
  const card=document.getElementById('qcard');
  const optsHtml=q.opts.map(o=>`
    <div class="opt-wrap">
      <div class="opt" data-letter="${o.letter}" data-correct="${o.correct}">
        <span class="opt-letter">${o.letter}</span>
        <span class="opt-text">${o.text}</span>
        <span class="opt-icon"></span>
      </div>
      <div class="opt-exp" id="optexp-${o.letter}"></div>
    </div>`).join('');
  card.innerHTML=`
    <div class="q-top">
      <div class="q-num-badge">${q.num}</div>
      <div class="q-meta">
        <span class="bolum-badge">${q.bolum}</span>
        <span class="tag-badge">${q.tag}</span>
      </div>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options" id="options-area">${optsHtml}</div>
    <div class="general-exp" id="genexp"></div>
    <button class="next-btn" id="nextbtn">${idx<TOTAL-1?'Sonraki Soru →':'Sonuçları Gör'}</button>`;

  // Event listeners - inline onclick yerine addEventListener
  card.querySelectorAll('.opt').forEach(optEl=>{
    optEl.addEventListener('click',function(){
      const chosen=this.getAttribute('data-letter');
      const correct=this.getAttribute('data-correct');
      doAnswer(chosen,correct);
    });
  });
  document.getElementById('nextbtn').addEventListener('click',nextQ);

  document.getElementById('prog').style.width=((idx/TOTAL)*100)+'%';
  document.getElementById('prog-text').textContent='Soru '+(idx+1)+' / '+TOTAL;
  if(answers[idx])restoreAnswer(idx,answers[idx].chosen,answers[idx].correct);
}

function restoreAnswer(idx,chosen,correct){
  const card=document.getElementById('qcard');
  card.dataset.answered='1';
  const q=QUESTIONS[idx];
  card.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  markOpts(chosen,correct);
  showExplanations(q,chosen,correct);
  document.getElementById('nextbtn').classList.add('show');
}

function markOpts(chosen,correct){
  const cEl=document.querySelector(`.opt[data-letter="${correct}"]`);
  if(cEl){cEl.classList.add('correct-ans');cEl.querySelector('.opt-icon').textContent='✓';}
  if(chosen!==correct){
    const wEl=document.querySelector(`.opt[data-letter="${chosen}"]`);
    if(wEl){wEl.classList.add('wrong-ans');wEl.querySelector('.opt-icon').textContent='✗';}
  }
}

function showExplanations(q,chosen,correct){
  if(q.isVerbal){
    q.opts.forEach(o=>{
      const expEl=document.getElementById('optexp-'+o.letter);
      const btn=document.querySelector(`.opt[data-letter="${o.letter}"]`);
      if(expEl&&o.optExp){
        expEl.innerHTML=o.optExp;expEl.classList.add('show');
        if(btn)btn.style.borderRadius='8px 8px 0 0';
        expEl.classList.add(o.letter===correct?'correct-exp':'wrong-exp');
      }
    });
  }else{
    const g=document.getElementById('genexp');
    if(g){g.innerHTML=q.exp;g.classList.add('show');if(chosen!==correct)g.classList.add('wrong-border');}
  }
}

function doAnswer(chosen,correct){
  const card=document.getElementById('qcard');
  if(card.dataset.answered)return;
  card.dataset.answered='1';
  const q=QUESTIONS[current];
  card.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  markOpts(chosen,correct);
  if(chosen!==correct){wrongCount++;}else{correctCount++;}
  showExplanations(q,chosen,correct);
  answers[current]={chosen,correct};
  saveState();
  document.querySelector('#sc-correct .snum').textContent=correctCount;
  document.querySelector('#sc-wrong .snum').textContent=wrongCount;
  document.querySelector('#sc-remain .snum').textContent=TOTAL-current-1;
  document.getElementById('nextbtn').classList.add('show');
}

function nextQ(){
  current++;
  if(current>=TOTAL){showFinish();return;}
  delete document.getElementById('qcard').dataset.answered;
  saveState();render(current);
  window.scrollTo({top:0,behavior:'smooth'});
}

function showFinish(){
  document.getElementById('qcard').style.display='none';
  document.querySelector('.progress-bar-wrap').style.display='none';
  document.querySelector('.progress-text').style.display='none';
  document.getElementById('prog').style.width='100%';
  clearState();
  document.getElementById('finish').classList.add('show');
  document.getElementById('fin-c').textContent=correctCount;
  document.getElementById('fin-w').textContent=wrongCount;
  const pct=Math.round(correctCount/TOTAL*100);
  document.getElementById('fin-msg').textContent=
    pct>=85?'Harika! Tarih konuları oturmuş.':
    pct>=70?'İyi gidiyorsun. Eksik kalan konuları tekrar et.':
    pct>=50?'Orta seviye. Kronoloji ve kurumları pekiştir.':
    'Konu anlatımına dön, ezber değil bağlantı kur.';
}

function doRestart(){
  current=0;correctCount=0;wrongCount=0;answers={};clearState();
  document.querySelector('#sc-correct .snum').textContent=0;
  document.querySelector('#sc-wrong .snum').textContent=0;
  document.querySelector('#sc-remain .snum').textContent=TOTAL;
  document.getElementById('qcard').style.display='';
  document.querySelector('.progress-bar-wrap').style.display='';
  document.querySelector('.progress-text').style.display='';
  document.getElementById('finish').classList.remove('show');
  delete document.getElementById('qcard').dataset.answered;
  render(0);window.scrollTo({top:0});
}

document.getElementById('restart-btn').addEventListener('click',doRestart);

// Sayfa açılışında kayıt kontrolü
const saved=loadState();
if(saved&&saved.current>0&&saved.current<TOTAL){
  current=saved.current;correctCount=saved.correctCount;wrongCount=saved.wrongCount;answers=saved.answers||{};
  document.getElementById('qcard').innerHTML=`
    <div class="resume-screen">
      <h2>Kaldığın yerden devam et</h2>
      <p style="color:var(--muted);font-size:0.92rem;margin-bottom:1.5rem;">
        ${current}. soruya kadar tamamlandı &nbsp;·&nbsp;
        <span style="color:var(--correct)">✓ ${correctCount} Doğru</span> &nbsp;
        <span style="color:var(--accent)">✗ ${wrongCount} Yanlış</span>
      </p>
      <button class="resume-btn primary" id="btn-resume">Devam Et →</button>
      <button class="resume-btn secondary" id="btn-fresh">Baştan Başla</button>
    </div>`;
  document.getElementById('prog').style.width=(current/TOTAL*100)+'%';
  document.getElementById('prog-text').textContent='Soru '+(current+1)+' / '+TOTAL;
  document.querySelector('#sc-correct .snum').textContent=correctCount;
  document.querySelector('#sc-wrong .snum').textContent=wrongCount;
  document.querySelector('#sc-remain .snum').textContent=TOTAL-current;
  document.getElementById('btn-resume').addEventListener('click',()=>{
    delete document.getElementById('qcard').dataset.answered;
    render(current);window.scrollTo({top:0});
  });
  document.getElementById('btn-fresh').addEventListener('click',doRestart);
}else if(saved&&saved.current>=TOTAL){clearState();render(0);}
else{render(0);}
</script>
<!-- MÜZİK ÇALAR -->
<div id="muzik-calar">
  <button class="mc-btn" onclick="oncekiParca()">⏮️</button>
  <button class="mc-btn" id="mc-pp" onclick="muzikToggle()">▶️</button>
  <button class="mc-btn" onclick="sonrakiParca()">⏭️</button>
  <div class="mc-bilgi">
    <div class="mc-parca" id="mc-parca">Yükleniyor...</div>
    <div class="mc-durum" id="mc-durum">Sessiz — sesi aç →</div>
  </div>
  <input class="mc-ses" type="range" min="0" max="1" step="0.05" value="0" id="mc-ses" oninput="sesAyarla(this.value)">
  <span style="font-size:0.9rem;cursor:pointer;" onclick="var s=document.getElementById('mc-ses');s.value=s.value==0?0.5:0;sesAyarla(s.value);">🔊</span>
</div>
<audio id="muzik-player" preload="none"></audio>
<script>
// ── MÜZİK — GitHub API otomatik ──
let PARCALAR = [];
let mevcutParca = 0;
let muzikBasladi = false;
const player = document.getElementById('muzik-player');
player.volume = 0;
player.addEventListener('ended', () => { mevcutParca = (mevcutParca + 1) % PARCALAR.length; parcaYukle(true); });
async function muzikListesiYukle() {
  try {
    const res = await fetch('https://api.github.com/repos/aksuirem0-max/kpss-calisma/contents/');
    const dosyalar = await res.json();
    PARCALAR = dosyalar.filter(d => d.type === 'file' && /\.(mp3|mpeg|ogg|wav|m4a)$/i.test(d.name)).map(d => ({ url: d.download_url, ad: d.name.replace(/\.[^.]+$/, '') }));
    if (PARCALAR.length > 0) { document.getElementById('mc-parca').textContent = PARCALAR[0].ad + ' · 1 / ' + PARCALAR.length; document.getElementById('mc-durum').textContent = PARCALAR.length + ' parça — sesi aç →'; parcaYukle(false); }
    else { document.getElementById('mc-durum').textContent = 'Müzik bulunamadı'; }
  } catch(e) { document.getElementById('mc-durum').textContent = 'Bağlantı hatası'; }
}
function parcaYukle(oyna) {
  if (PARCALAR.length === 0) return;
  player.src = PARCALAR[mevcutParca].url;
  document.getElementById('mc-parca').textContent = PARCALAR[mevcutParca].ad + ' · ' + (mevcutParca + 1) + ' / ' + PARCALAR.length;
  if (oyna) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = 'Çalıyor'; }
}
function muzikToggle() {
  if (!muzikBasladi) { muzikBasladi = true; parcaYukle(true); return; }
  if (player.paused) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = player.volume === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor'; }
  else { player.pause(); document.getElementById('mc-pp').textContent = '▶️'; document.getElementById('mc-durum').textContent = 'Duraklatıldı'; }
}
function sesAyarla(val) {
  player.volume = parseFloat(val);
  if (!muzikBasladi && parseFloat(val) > 0) { muzikBasladi = true; parcaYukle(true); }
  document.getElementById('mc-durum').textContent = parseFloat(val) === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor';
}
function oncekiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca - 1 + PARCALAR.length) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
function sonrakiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca + 1) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
window.addEventListener('load', () => { muzikListesiYukle(); });

</script>
</body>
</html>
