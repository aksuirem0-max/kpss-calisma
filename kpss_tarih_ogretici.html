<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Tarih — Öğretici</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8c547;
    --accent2: #e85d47;
    --accent3: #47c5e8;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf78;
    --red: #e85d47;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  #header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  #progress-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    height: 4px;
    background: var(--border);
  }
  #progress-bar {
    height: 4px;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── MAIN ── */
  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── BÖLÜM SEÇİCİ (ana ekran) ── */
  #menu {
    display: none;
  }
  #menu.active {
    display: block;
  }
  .menu-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .menu-sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  .bolum-grid {
    display: grid;
    gap: 12px;
  }
  .bolum-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    padding: 18px 20px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    text-align: left;
  }
  .bolum-btn:hover {
    border-color: var(--accent);
    background: #1e1e1e;
    transform: translateX(4px);
  }
  .bolum-btn.done {
    border-left-color: var(--green);
    opacity: 0.7;
  }
  .bolum-icon { font-size: 1.6rem; }
  .bolum-info { flex: 1; }
  .bolum-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    color: var(--text);
  }
  .bolum-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .bolum-kart-say {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(232,197,71,0.1);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .devam-badge {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.72rem;
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── KART EKRANI ── */
  #kart-ekrani { display: none; }
  #kart-ekrani.active { display: block; }

  .geri-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    margin-bottom: 20px;
    transition: all 0.2s;
  }
  .geri-btn:hover { color: var(--text); border-color: var(--text); }

  .kart-baslik {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .kart-sayac {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* ── KART ── */
  .kart-wrap {
    perspective: 1000px;
    margin-bottom: 20px;
  }
  .kart {
    width: 100%;
    min-height: 200px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    cursor: pointer;
  }
  .kart.cevrildi { transform: rotateY(180deg); }

  .kart-on, .kart-arka {
    position: absolute;
    width: 100%;
    min-height: 200px;
    backface-visibility: hidden;
    border-radius: 8px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .kart-on {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 4px solid var(--accent);
  }
  .kart-arka {
    background: #1a1f14;
    border: 1px solid var(--green);
    border-top: 4px solid var(--green);
    transform: rotateY(180deg);
  }

  .kart-etiket {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .kart-soru {
    font-size: 1.05rem;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
  }
  .kart-ipucu {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
  }
  .kart-cevap-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--green);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .kart-cevap {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--green);
    line-height: 1.5;
  }
  .kart-aciklama {
    margin-top: 14px;
    font-size: 0.82rem;
    color: #aaa;
    line-height: 1.6;
    border-top: 1px solid rgba(76,175,120,0.2);
    padding-top: 12px;
  }
  .cevir-hint {
    text-align: center;
    font-size: 0.73rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── BUTONLAR ── */
  .kart-butonlar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .kart-butonlar.gorunen {
    opacity: 1;
    pointer-events: all;
  }
  .btn-bilmiyorum, .btn-biliyorum {
    padding: 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .btn-bilmiyorum {
    background: rgba(232,93,71,0.15);
    color: var(--red);
    border: 1px solid var(--red);
  }
  .btn-bilmiyorum:hover { background: rgba(232,93,71,0.3); }
  .btn-biliyorum {
    background: rgba(76,175,120,0.15);
    color: var(--green);
    border: 1px solid var(--green);
  }
  .btn-biliyorum:hover { background: rgba(76,175,120,0.3); }

  /* ── MANTIK KUTUSU ── */
  .mantik-kutusu {
    background: rgba(71,197,232,0.08);
    border: 1px solid rgba(71,197,232,0.25);
    border-radius: 6px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .mantik-baslik {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent3);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .mantik-metin {
    font-size: 0.85rem;
    color: #ccc;
    line-height: 1.7;
  }
  .mantik-metin strong { color: var(--accent); }

  /* ── BİTİŞ EKRANI ── */
  #bitis { display: none; }
  #bitis.active { display: block; }
  .bitis-baslik {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .bitis-skor {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 28px;
  }
  .bitis-skor span { color: var(--green); }
  .tekrar-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 32px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-right: 12px;
    transition: all 0.2s;
  }
  .tekrar-btn:hover { background: #f0d060; }
  .menu-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 4px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .menu-btn:hover { border-color: var(--text); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 480px) {
    .menu-title { font-size: 2rem; }
    .kart-soru { font-size: 0.95rem; }
    .kart-cevap { font-size: 1rem; }
  }

  /* MÜZİK ÇALAR */
  #muzik-calar { position:fixed; bottom:16px; right:16px; z-index:999; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,0.5); min-width:220px; }
  .mc-btn { background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0; line-height:1; }
  .mc-bilgi { flex:1; }
  .mc-parca { font-size:0.68rem; color:#e8c547; font-family:'IBM Plex Mono',monospace; }
  .mc-durum { font-size:0.6rem; color:#666; }
  .mc-ses { width:55px; accent-color:#e8c547; cursor:pointer; }
</style>
</head>
<body>

<div id="header">
  <h1>⚔ KPSS TARİH</h1>
  <span id="progress-text">Bölüm seç</span>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="app">

  <!-- ANA MENÜ -->
  <div id="menu" class="active">
    <div class="menu-title">TARİH ÖĞRETİCİ</div>
    <div class="menu-sub">PDF'deki tüm tarih konuları · Önce mantık, sonra kart · Sayısalcı versiyonu</div>
    <div id="devam-div" style="display:none; background:#1a1f14; border:1px solid var(--green); border-radius:6px; padding:14px 18px; margin-bottom:20px;"></div>
    <div class="bolum-grid" id="bolum-grid"></div>
  </div>

  <!-- KART EKRANI -->
  <div id="kart-ekrani">
    <div style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;">
      <button class="geri-btn" style="margin-bottom:0;" onclick="anaMenuye()">← Geri</button>
      <button class="geri-btn" style="margin-bottom:0;" onclick="bolumBastan()">↺ Başa Dön</button>
      <button id="karistir-btn" class="geri-btn" style="margin-bottom:0; color:var(--accent); border-color:var(--accent);" onclick="toggleKaristir()">⇌ Karışık</button>
    </div>
    <div class="kart-baslik" id="kart-baslik"></div>
    <div class="kart-sayac" id="kart-sayac"></div>

    <div class="mantik-kutusu" id="mantik-kutusu">
      <div class="mantik-baslik">◈ NEDEN BÖYLE — MANTIK</div>
      <div class="mantik-metin" id="mantik-metin"></div>
    </div>

    <div class="kart-wrap">
      <div class="kart" id="kart" onclick="kartCevir()">
        <div class="kart-on">
          <div class="kart-etiket">▶ SORU</div>
          <div class="kart-soru" id="kart-soru"></div>
          <div class="kart-ipucu" id="kart-ipucu"></div>
        </div>
        <div class="kart-arka">
          <div class="kart-cevap-label">✓ CEVAP</div>
          <div class="kart-cevap" id="kart-cevap"></div>
          <div class="kart-aciklama" id="kart-aciklama"></div>
        </div>
      </div>
    </div>
    <div class="cevir-hint" id="cevir-hint">kartı çevirmek için dokun →</div>

    <div class="kart-butonlar" id="kart-butonlar">
      <button class="btn-bilmiyorum" onclick="bilmiyorum()">✗ Tekrar Göster</button>
      <button class="btn-biliyorum" onclick="biliyorum()">✓ Öğrendim</button>
    </div>
  </div>

  <!-- BİTİŞ -->
  <div id="bitis">
    <div class="bitis-baslik">BÖLÜM TAMAM!</div>
    <div class="bitis-skor" id="bitis-skor"></div>
    <button class="tekrar-btn" onclick="bolumBastan()">Tekrar Çalış</button>
    <button class="menu-btn" onclick="anaMenuye()">Ana Menü</button>
  </div>

</div>

// ── STATE ──
let aktifBolum = null;
let aktifBolumIdx = -1;
let kartDizisi = [];
let orijinalSira = [];  // karistir=false için
let mevcutIndex = 0;
let bilinenSayisi = 0;
let cevrildi = false;
let karistirMod = true;  // varsayılan: karıştır

const LS_KEY = 'kpss_tarih_state';

// ── KAYDET / YUKLE ──
function kaydet() {
  if (aktifBolumIdx < 0) return;
  const veri = {
    bolumIdx: aktifBolumIdx,
    mevcutIndex,
    bilinenSayisi,
    karistirMod,
    kartSiralari: kartDizisi.map(k => aktifBolum.kartlar.indexOf(k))
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(veri)); } catch(e) {}
}

function yukle() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function kaldigiYerdenDevam() {
  const veri = yukle();
  if (!veri || veri.bolumIdx < 0 || veri.bolumIdx >= BOLUMLER.length) return;
  aktifBolumIdx = veri.bolumIdx;
  aktifBolum = BOLUMLER[aktifBolumIdx];
  karistirMod = veri.karistirMod !== undefined ? veri.karistirMod : true;
  // Sırayı geri yükle
  if (veri.kartSiralari && veri.kartSiralari.length > 0) {
    kartDizisi = veri.kartSiralari.map(i => aktifBolum.kartlar[i]).filter(Boolean);
    // Eksik kartlar varsa sona ekle
    aktifBolum.kartlar.forEach(k => { if (!kartDizisi.includes(k)) kartDizisi.push(k); });
  } else {
    kartDizisi = karistirMod ? shuffle([...aktifBolum.kartlar]) : [...aktifBolum.kartlar];
  }
  orijinalSira = [...aktifBolum.kartlar];
  mevcutIndex = Math.min(veri.mevcutIndex || 0, kartDizisi.length - 1);
  bilinenSayisi = veri.bilinenSayisi || 0;

  document.getElementById('menu').classList.remove('active');
  document.getElementById('kart-ekrani').classList.add('active');
  document.getElementById('bitis').classList.remove('active');
  document.getElementById('kart-baslik').textContent = aktifBolum.ad;
  document.getElementById('mantik-metin').innerHTML = aktifBolum.mantik;
  updateKaristirBtn();
  kartGoster();
  progressGuncelle();
}

// ── INIT ──
function init() {
  const grid = document.getElementById('bolum-grid');
  grid.innerHTML = '';
  const kayitli = yukle();

  BOLUMLER.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'bolum-btn';
    btn.id = 'bolum-btn-' + i;
    btn.onclick = () => bolumAc(i, false);

    // Kaydedilmiş ilerleme var mı?
    let devamBadge = '';
    if (kayitli && kayitli.bolumIdx === i && kayitli.mevcutIndex > 0 && kayitli.mevcutIndex < b.kartlar.length) {
      devamBadge = `<span class="devam-badge">▶ ${kayitli.mevcutIndex}/${b.kartlar.length}</span>`;
    }

    btn.innerHTML = `
      <span class="bolum-icon">${b.icon}</span>
      <div class="bolum-info">
        <div class="bolum-name">${b.ad}</div>
        <div class="bolum-desc">${b.aciklama}</div>
        ${devamBadge}
      </div>
      <span class="bolum-kart-say">${b.kartlar.length} kart</span>
    `;
    grid.appendChild(btn);
  });

  // Kaldığı yerden devam butonu
  const devamDiv = document.getElementById('devam-div');
  if (kayitli && kayitli.bolumIdx >= 0 && kayitli.mevcutIndex > 0 && kayitli.mevcutIndex < BOLUMLER[kayitli.bolumIdx].kartlar.length) {
    const bolumAdi = BOLUMLER[kayitli.bolumIdx].ad;
    devamDiv.style.display = 'block';
    devamDiv.innerHTML = `
      <div style="font-size:0.72rem; color:var(--green); letter-spacing:2px; margin-bottom:8px; font-family:'IBM Plex Mono',monospace;">◈ KALDIGIN YER</div>
      <div style="font-size:0.9rem; color:var(--text); margin-bottom:12px;">${bolumAdi} · ${kayitli.mevcutIndex}/${BOLUMLER[kayitli.bolumIdx].kartlar.length}. kartta</div>
      <div style="display:flex; gap:10px;">
        <button onclick="kaldigiYerdenDevam()" style="background:var(--green); color:#000; border:none; padding:9px 18px; border-radius:4px; font-weight:700; font-size:0.85rem; cursor:pointer;">▶ Devam Et</button>
        <button onclick="try{localStorage.removeItem('kpss_tarih_state')}catch(e){}; document.getElementById('devam-div').style.display='none';" style="background:none; border:1px solid var(--border); color:var(--muted); padding:9px 14px; border-radius:4px; font-size:0.8rem; cursor:pointer;">Yoksay</button>
      </div>
    `;
  } else {
    devamDiv.style.display = 'none';
  }
}

function bolumAc(i, devam) {
  aktifBolumIdx = i;
  aktifBolum = BOLUMLER[i];
  orijinalSira = [...aktifBolum.kartlar];

  if (!devam) {
    // Baştan başla
    kartDizisi = karistirMod ? shuffle([...aktifBolum.kartlar]) : [...aktifBolum.kartlar];
    mevcutIndex = 0;
    bilinenSayisi = 0;
  }

  document.getElementById('menu').classList.remove('active');
  document.getElementById('kart-ekrani').classList.add('active');
  document.getElementById('bitis').classList.remove('active');
  document.getElementById('kart-baslik').textContent = aktifBolum.ad;
  document.getElementById('mantik-metin').innerHTML = aktifBolum.mantik;
  updateKaristirBtn();
  kartGoster();
  progressGuncelle();
  kaydet();
}

function kartGoster() {
  if (mevcutIndex >= kartDizisi.length) {
    bolumBitti();
    return;
  }
  const k = kartDizisi[mevcutIndex];
  document.getElementById('kart-soru').textContent = k.s;
  document.getElementById('kart-cevap').textContent = k.c;
  document.getElementById('kart-aciklama').textContent = k.a || '';
  document.getElementById('kart-ipucu').textContent = '';
  document.getElementById('kart-sayac').textContent =
    `${mevcutIndex + 1} / ${kartDizisi.length} · Öğrenilen: ${bilinenSayisi}`;

  const kart = document.getElementById('kart');
  kart.classList.remove('cevrildi');
  cevrildi = false;

  document.getElementById('kart-butonlar').classList.remove('gorunen');
  document.getElementById('cevir-hint').style.display = 'block';
  progressGuncelle();
  kaydet();
}

function kartCevir() {
  const kart = document.getElementById('kart');
  kart.classList.toggle('cevrildi');
  cevrildi = !cevrildi;
  if (cevrildi) {
    document.getElementById('kart-butonlar').classList.add('gorunen');
    document.getElementById('cevir-hint').style.display = 'none';
  } else {
    document.getElementById('kart-butonlar').classList.remove('gorunen');
    document.getElementById('cevir-hint').style.display = 'block';
  }
}

function biliyorum() {
  bilinenSayisi++;
  mevcutIndex++;
  kartGoster();
}

function bilmiyorum() {
  kartDizisi.push(kartDizisi[mevcutIndex]);
  mevcutIndex++;
  kartGoster();
}

function bolumBitti() {
  document.getElementById('kart-ekrani').classList.remove('active');
  document.getElementById('bitis').classList.add('active');
  const toplam = aktifBolum.kartlar.length;
  document.getElementById('bitis-skor').innerHTML =
    `<span>${aktifBolum.ad}</span> bölümü tamamlandı!<br>${toplam} kartın hepsini gördün.`;
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Bölüm tamamlandı!';
  // Tamamlandığında kaydı sil
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  init(); // menüyü güncelle
}

function bolumBastan() {
  bolumAc(aktifBolumIdx, false);
}

function anaMenuye() {
  kaydet();
  document.getElementById('menu').classList.add('active');
  document.getElementById('kart-ekrani').classList.remove('active');
  document.getElementById('bitis').classList.remove('active');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-text').textContent = 'Bölüm seç';
  init();
}

function progressGuncelle() {
  if (!aktifBolum) return;
  const pct = kartDizisi.length > 0 ? (mevcutIndex / aktifBolum.kartlar.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = Math.min(pct, 99) + '%';
  document.getElementById('progress-text').textContent =
    `${aktifBolum.ad} · ${mevcutIndex}/${aktifBolum.kartlar.length}`;
}

// ── KARIŞTIR TOGGLE ──
function toggleKaristir() {
  karistirMod = !karistirMod;
  // Mevcut bölümdeyse kartları yeniden sırala, indexi koru
  if (aktifBolum) {
    const mevcutKart = kartDizisi[mevcutIndex];
    if (karistirMod) {
      kartDizisi = shuffle([...aktifBolum.kartlar]);
    } else {
      kartDizisi = [...aktifBolum.kartlar];
    }
    // Mevcut kartı bul
    const yeniIdx = kartDizisi.indexOf(mevcutKart);
    mevcutIndex = yeniIdx >= 0 ? yeniIdx : 0;
    kartGoster();
  }
  updateKaristirBtn();
  kaydet();
}

function updateKaristirBtn() {
  const btn = document.getElementById('karistir-btn');
  if (!btn) return;
  if (karistirMod) {
    btn.textContent = '⇌ Karışık';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
  } else {
    btn.textContent = '↓ Sıralı';
    btn.style.color = 'var(--accent3)';
    btn.style.borderColor = 'var(--accent3)';
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

init();
</script>
<!-- MÜZİK ÇALAR -->
<div id="muzik-calar">
  <button class="mc-btn" onclick="oncekiParca()">⏮️</button>
  <button class="mc-btn" id="mc-pp" onclick="muzikToggle()">▶️</button>
  <button class="mc-btn" onclick="sonrakiParca()">⏭️</button>
  <div class="mc-bilgi">
    <div class="mc-parca" id="mc-parca">Yükleniyor...</div>
    <div class="mc-durum" id="mc-durum">Sessiz — sesi aç →</div>
  </div>
  <input class="mc-ses" type="range" min="0" max="1" step="0.05" value="0" id="mc-ses" oninput="sesAyarla(this.value)">
  <span style="font-size:0.9rem;cursor:pointer;" onclick="var s=document.getElementById('mc-ses');s.value=s.value==0?0.5:0;sesAyarla(s.value);">🔊</span>
</div>
<audio id="muzik-player" preload="none"></audio>
</body>
