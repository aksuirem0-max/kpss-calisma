<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Sayısal Mantık</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#070b14;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}

/* ARKA PLAN */
.bg-glow{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(56,189,248,0.06),transparent 70%);pointer-events:none;z-index:0;animation:bgmove 8s ease-in-out infinite alternate;}
@keyframes bgmove{from{transform:translate(0,0);}to{transform:translate(300px,200px);}}

.wrap{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:14px;}

/* HEADER */
.hdr{background:rgba(15,23,42,0.95);border-radius:16px;padding:12px 16px;margin-bottom:12px;border:1px solid #1e3a5f;display:flex;justify-content:space-between;align-items:center;}
.bolum-adi{font-size:0.8rem;font-weight:700;color:#38bdf8;letter-spacing:1px;}
.puan-b{font-size:1.3rem;font-weight:900;color:#fbbf24;}
.seri-b{font-size:0.75rem;background:#7c3aed;border-radius:12px;padding:3px 10px;color:#fff;font-weight:700;transition:all 0.3s;}
.seri-b.hot{background:#f59e0b;color:#0a0a1a;animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

/* İLERLEME */
.prog-wrap{margin-bottom:12px;}
.prog-info{display:flex;justify-content:space-between;font-size:0.72rem;color:#475569;margin-bottom:4px;}
.prog-bar{height:5px;background:#1e293b;border-radius:10px;overflow:hidden;}
.prog-dolu{height:100%;border-radius:10px;transition:width 0.5s ease;}

/* SORU KARTI */
.kart{background:rgba(15,23,42,0.97);border-radius:18px;padding:16px;margin-bottom:12px;border:1px solid #1e3a5f;animation:fadeUp 0.4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.tip-badge{display:inline-block;font-size:0.7rem;font-weight:700;border-radius:8px;padding:3px 10px;margin-bottom:8px;letter-spacing:0.5px;}
.tip-tablo{background:rgba(56,189,248,0.15);color:#38bdf8;border:1px solid #38bdf8;}
.tip-oruntu{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid #a855f7;}
.tip-kosul{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid #22c55e;}
.tip-boss{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #ef4444;}

.boss-anim{text-align:center;font-size:0.85rem;font-weight:800;margin-bottom:6px;animation:bossFlash 0.8s infinite alternate;}
@keyframes bossFlash{from{color:#f59e0b;}to{color:#ef4444;}}

.soru-metin{font-size:0.84rem;color:#cbd5e1;line-height:1.65;margin-bottom:14px;background:rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;border-left:3px solid #f59e0b;}

/* TABLOLAR */
.tablo-wrap{overflow-x:auto;margin-bottom:14px;}
table.veri{border-collapse:collapse;width:100%;font-size:0.8rem;}
table.veri th{background:#0f172a;color:#38bdf8;padding:7px 10px;border:1px solid #1e3a5f;text-align:center;font-weight:700;}
table.veri td{background:#0a0f1e;color:#cbd5e1;padding:7px 10px;border:1px solid #1e293b;text-align:center;}
table.veri tr:nth-child(even) td{background:#0d1424;}
.vurgu-hucre{color:#fbbf24 !important;font-weight:700;}

/* ÖRÜNTÜ */
.oruntu-dizi{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.oruntu-kutu{min-width:44px;height:44px;border-radius:10px;background:#0f172a;border:1.5px solid #1e3a5f;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#60a5fa;}
.oruntu-soru{border-color:#f59e0b;color:#fbbf24;background:#1c1400;}
.oruntu-ok{color:#475569;font-size:1.2rem;}

/* KOŞUL LİSTESİ */
.kosul-liste{background:#0a0f1e;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:0.8rem;line-height:2;}
.kosul-liste li{list-style:none;padding-left:4px;color:#94a3b8;}
.kosul-liste li::before{content:"•";color:#38bdf8;margin-right:8px;}

/* SEÇENEKLER */
.secenekler{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sec{padding:11px 8px;border-radius:12px;border:1.5px solid #1e3a5f;background:#0a0f1e;color:#cbd5e1;font-size:0.85rem;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;}
.sec:active{transform:scale(0.96);}
.sec:hover{border-color:#3b82f6;color:#fff;}
.sec.dogru{background:#052e16;border-color:#4ade80;color:#4ade80;animation:popIn 0.3s ease;}
.sec.yanlis{background:#2d0a0a;border-color:#ef4444;color:#f87171;animation:wobble 0.3s;}
.sec.goster-dogru{background:#052e16;border-color:#4ade80;color:#4ade80;}
@keyframes popIn{0%{transform:scale(0.9);}60%{transform:scale(1.05);}100%{transform:scale(1);}}
@keyframes wobble{0%,100%{transform:translateX(0);}30%{transform:translateX(-6px);}70%{transform:translateX(6px);}}

/* AÇIKLAMA */
.aciklama-kutu{border-radius:10px;padding:10px 14px;font-size:0.82rem;line-height:1.6;display:none;margin-bottom:12px;}
.aciklama-dogru{background:#052e16;color:#86efac;border:1px solid #166534;display:block;}
.aciklama-yanlis{background:#2d0a0a;color:#fca5a5;border:1px solid #991b1b;display:block;}

/* BUTON */
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:11px;border-radius:12px;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn:active{transform:scale(0.95);}
.btn-ipucu{background:rgba(124,58,237,0.2);color:#a78bfa;border:1px solid #7c3aed;}
.btn-ipucu.off{opacity:0.3;pointer-events:none;}
.btn-atla{background:rgba(30,41,59,0.6);color:#64748b;border:1px solid #1e293b;font-size:0.78rem;}

/* PUAN UÇUŞ */
.puan-uc{position:fixed;font-size:1.6rem;font-weight:900;color:#fbbf24;pointer-events:none;z-index:999;animation:ucus 1.2s ease forwards;}
@keyframes ucus{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-90px) scale(1.6);}}

/* GEÇİŞ EKRANI */
.gecis{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;}
.gecis.ac{display:flex;}
.gecis-emoji{font-size:5rem;margin-bottom:12px;animation:bounce 0.8s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-12px);}}
.gecis h2{font-size:1.6rem;font-weight:900;margin-bottom:8px;}
.gecis p{color:#94a3b8;font-size:0.9rem;margin-bottom:24px;}
.btn-devam{padding:14px 44px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;font-size:1rem;font-weight:800;border:none;cursor:pointer;}

/* BİTİŞ */
.bitis{display:none;text-align:center;padding:30px 16px;animation:fadeUp 0.5s;}
.bitis.ac{display:block;}
.bitis-puan{font-size:3.5rem;font-weight:900;color:#fbbf24;}
.bitis-yildiz{font-size:2.8rem;margin:10px 0;}
.btn-tekrar{margin-top:20px;padding:14px 44px;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;font-size:1rem;font-weight:800;border:none;cursor:pointer;}

/* İPUCU */
.ipucu-kutu{background:#1c1400;border:1px solid #92400e;border-radius:10px;padding:10px 14px;font-size:0.81rem;color:#fbbf24;line-height:1.6;margin-bottom:10px;display:none;}
.ipucu-kutu.ac{display:block;}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="bolum-adi" id="bolumAdi">📊 TABLO OKUMA</div>
    </div>

  <div class="bitis" id="bitisEkran">

</div>

// ============================================================
// OYUN MOTORU
// ============================================================
let mB=0, mS=0, puan=0, seri=0, ipucuK=false;

function baslat(){
  mB=0; mS=0; puan=0; seri=0;
  document.getElementById('bitisEkran').classList.remove('ac');
  document.getElementById('gecisEkran').classList.remove('ac');
  soruGoster();
}

function soruGoster(){
  const b=bolumler[mB], s=b.sorular[mS];
  ipucuK=false;

  // Header
  document.getElementById('bolumAdi').textContent=b.ad;
  document.getElementById('puanGoster').textContent=puan;
  seriGunc();

  // İlerleme
  const topS=bolumler.reduce((a,x)=>a+x.sorular.length,0);
  const tamS=bolumler.slice(0,mB).reduce((a,x)=>a+x.sorular.length,0)+mS;
  const yuzde=Math.round(tamS/topS*100);
  document.getElementById('progDolu').style.width=yuzde+'%';
  document.getElementById('progDolu').style.background=b.renk;
  document.getElementById('progBilgi').textContent=`Soru ${mS+1}/${b.sorular.length}`;
  document.getElementById('progYuzde').textContent=yuzde+'%';

  // Soru HTML
  let html=`<div class="kart">`;
  if(s.boss) html+=`<div class="boss-anim">⚡ BOSS SORU ⚡</div>`;
  html+=`<span class="tip-badge ${s.badge}">${tipAdi(s.tip)}</span>`;
  html+=`<div class="soru-metin">${s.metin.replace(/\n/g,'<br>')}</div>`;

  // İçerik tipine göre
  if(s.tip==='tablo'||s.tip==='tip-boss'&&s.tablo){
    html+=tabloHTML(s.tablo);
  }
  if(s.tip==='oruntu'){
    html+=`<div class="oruntu-dizi">`;
    s.dizi.forEach((d,i)=>{
      if(d==='→'){html+=`<span class="oruntu-ok">→</span>`;return;}
      const isSoru=d==='?';
      html+=`<div class="oruntu-kutu${isSoru?' oruntu-soru':''}">${d}</div>`;
    });
    html+=`</div>`;
  }
  if(s.tip==='kosul'){
    html+=`<ul class="kosul-liste">`;
    s.kosullar.forEach(k=>html+=`<li>${k}</li>`);
    html+=`</ul>`;
    if(s.soru) html+=`<div class="soru-metin" style="margin-top:-6px"><b>Soru:</b> ${s.soru}</div>`;
  }

  // Seçenekler
  html+=`<div class="secenekler">`;
  s.secenekler.forEach((opt,i)=>{
    html+=`<button class="sec" id="sec${i}" onclick="secimYap(${i})">${opt}</button>`;
  });
  html+=`</div>`;

  // İpucu & Atla
  html+=`<div class="ipucu-kutu" id="ipucuKutu">💡 ${s.ipucu}</div>`;
  html+=`<div class="aciklama-kutu" id="aciklamaKutu"></div>`;
  html+=`<div class="btn-row">
    <button class="btn btn-ipucu" id="ipucuBtn" onclick="ipucuGoster()">💡 İpucu (−3p)</button>
    <button class="btn btn-atla" onclick="sonraki(false)">Atla →</button>
  </div></div>`;

  document.getElementById('soruAlani').innerHTML=html;
}

function tipAdi(t){
  if(t==='tablo') return '📊 Tablo Okuma';
  if(t==='oruntu') return '🔢 Örüntü';
  if(t==='kosul') return '🧩 Koşullu Yerleştirme';
  return '⚡ Boss';
}

function tabloHTML(t){
  let h=`<div class="tablo-wrap"><table class="veri"><thead><tr>`;
  t.basliklar.forEach(b=>h+=`<th>${b}</th>`);
  h+=`</tr></thead><tbody>`;
  t.satirlar.forEach(s=>{
    h+=`<tr>`;
    s.forEach((c,i)=>h+=`<td${i>0?' class="vurgu-hucre"':''}>${c}</td>`);
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function secimYap(i){
  const s=bolumler[mB].sorular[mS];
  // Butonları devre dışı
  s.secenekler.forEach((_,j)=>{
    const el=document.getElementById('sec'+j);
    if(el) el.onclick=null;
  });

  const secEl=document.getElementById('sec'+i);
  const acik=document.getElementById('aciklamaKutu');

  if(i===s.cevap){
    secEl.classList.add('dogru');
    let p=s.boss?20:10;
    if(ipucuK) p-=3;
    if(seri>=2) p=Math.round(p*1.5);
    seri++; puan+=p;
    document.getElementById('puanGoster').textContent=puan;
    seriGunc();
    acik.className='aciklama-kutu aciklama-dogru';
    const bonus=seri>2?` 🔥 ${seri} Seri!`:'';
    acik.innerHTML=`✅ +${p} puan${bonus}<br><small>${s.aciklama}</small>`;
    puanUc('+'+p);
    setTimeout(()=>sonraki(true),2000);
  } else {
    secEl.classList.add('yanlis');
    document.getElementById('sec'+s.cevap).classList.add('goster-dogru');
    seri=0; seriGunc();
    acik.className='aciklama-kutu aciklama-yanlis';
    acik.innerHTML=`❌ Yanlış.<br><small>${s.aciklama}</small>`;
    setTimeout(()=>sonraki(false),2200);
  }
}

function ipucuGoster(){
  if(ipucuK) return;
  ipucuK=true;
  document.getElementById('ipucuBtn').classList.add('off');
  document.getElementById('ipucuKutu').classList.add('ac');
}

function sonraki(dogru){
  const b=bolumler[mB];
  if(mS<b.sorular.length-1){
    mS++;
    soruGoster();
  } else {
    if(mB<bolumler.length-1){
      bolumGecis();
    } else {
      oyunBit();
    }
  }
}

function bolumGecis(){
  const b=bolumler[mB];
  const g=document.getElementById('gecisEkran');
  document.getElementById('gecisEmoji').textContent=b.gecisEmoji;
  document.getElementById('gecisBaslik').textContent=b.gecisBaslik;
  document.getElementById('gecisAcik').textContent=b.gecisAcik;
  g.classList.add('ac');
}

function gecisDevam(){
  document.getElementById('gecisEkran').classList.remove('ac');
  mB++; mS=0;
  soruGoster();
}

function oyunBit(){
  document.getElementById('soruAlani').innerHTML='';
  const be=document.getElementById('bitisEkran');
  document.getElementById('bPuan').textContent=puan;
  const max=bolumler.reduce((a,b)=>a+b.sorular.reduce((c,s)=>c+(s.boss?20:10),0),0);
  const oran=puan/max;
  let yildiz='⭐', yorum='Daha fazla pratik yap!';
  if(oran>=0.8){yildiz='⭐⭐⭐';yorum='Mükemmel! KPSS\'ye hazırsın.';}
  else if(oran>=0.5){yildiz='⭐⭐';yorum='İyi gidiyorsun, biraz daha pratik!';}
  document.getElementById('bYildiz').textContent=yildiz;
  document.getElementById('bYorum').textContent=yorum;
  be.classList.add('ac');
}

function seriGunc(){
  const el=document.getElementById('seriB');
  el.textContent=`🔥 ${seri}`;
  if(seri>=3) el.classList.add('hot');
  else el.classList.remove('hot');
}

function puanUc(metin){
  const el=document.createElement('div');
  el.className='puan-uc';
  el.textContent=metin;
  el.style.left=(window.innerWidth/2-30)+'px';
  el.style.top='100px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

baslat();
</script>
