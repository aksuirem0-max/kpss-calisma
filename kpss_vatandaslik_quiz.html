<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Vatandaşlık Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D1117; --surface: #161B22; --border: #21262D;
    --accent: #E8572A; --accent2: #F5A623;
    --correct: #2EA043; --wrong: #DA3633;
    --text: #E6EDF3; --muted: #7D8590; --card: #1C2128;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }
  header { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; padding: 14px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--text); }
  .stats { display: flex; gap: 18px; font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); font-size: 16px; display: block; }
  .stat { text-align: center; }
  .progress-wrap { width: 100%; max-width: 720px; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
  .category-badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 3px 10px; border-radius: 2px; margin-bottom: 12px; }
  .question-card { width: 100%; max-width: 720px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px 28px; margin-bottom: 14px; }
  .q-number { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 19px; line-height: 1.5; color: var(--text); }
  .options { width: 100%; max-width: 720px; display: grid; gap: 10px; margin-bottom: 16px; }
  .option-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 13px 16px; color: var(--text); font-family: inherit; font-size: 15px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); }
  .option-btn .key { width: 26px; height: 26px; border-radius: 4px; background: var(--border); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--muted); }
  .option-btn.correct { border-color: var(--correct); background: rgba(46,160,67,0.12); }
  .option-btn.correct .key { background: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(218,54,51,0.12); }
  .option-btn.wrong .key { background: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; }
  .feedback { width: 100%; max-width: 720px; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; margin-bottom: 14px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(46,160,67,0.15); border: 1px solid var(--correct); color: #3fb950; }
  .feedback.wrong { background: rgba(218,54,51,0.15); border: 1px solid var(--wrong); color: #f85149; }
  .next-btn { width: 100%; max-width: 720px; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 14px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; display: none; }
  .next-btn:hover { opacity: 0.88; }
  .next-btn.show { display: block; }
  #result-screen { display: none; width: 100%; max-width: 720px; text-align: center; }
  .result-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .result-score { font-size: 68px; font-weight: 700; color: var(--accent); line-height: 1; margin: 14px 0; }
  .result-label { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .result-stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .result-stat .num { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .result-stat .lbl { font-size: 12px; color: var(--muted); }
  .restart-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 13px 32px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; margin-right: 8px; }
  .restart-btn:hover { opacity: 0.88; }
  .category-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 13px 32px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
  .category-btn:hover { border-color: var(--accent); }
  #cat-screen { width: 100%; max-width: 720px; }
  .cat-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; text-align: center; }
  .cat-sub { color: var(--muted); text-align: center; font-size: 14px; margin-bottom: 28px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
  .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; cursor: pointer; transition: border-color 0.15s; text-align: left; }
  .cat-card:hover { border-color: var(--accent); }
  .cat-card.selected { border-color: var(--accent); background: rgba(232,87,42,0.1); }
  .cat-card .cat-icon { font-size: 22px; margin-bottom: 8px; }
  .cat-card .cat-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .cat-card .cat-count { font-size: 12px; color: var(--muted); }
  .start-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 14px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
  .start-btn:hover { opacity: 0.88; }
  #quiz-screen { display: none; width: 100%; }
  .timer-wrap { width: 100%; max-width: 720px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .timer-label { font-size: 12px; color: var(--muted); }
  .timer-num { font-size: 18px; font-weight: 700; color: var(--accent2); min-width: 32px; }
  .timer-num.danger { color: var(--wrong); }
  @media (max-width: 520px) {
    .cat-grid { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr 1fr; }
    .question-card { padding: 18px; }
    .q-text { font-size: 17px; }
    .restart-btn, .category-btn { padding: 12px 18px; font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">KPSS <span>Vatandaşlık</span></div>
  <div class="stats" id="header-stats" style="display:none">
    <div class="stat"><strong id="stat-correct">0</strong>Doğru</div>
    <div class="stat"><strong id="stat-wrong">0</strong>Yanlış</div>
    <div class="stat"><strong id="stat-total">0</strong>Toplam</div>
  </div>
</header>

<div id="cat-screen">
  <div class="cat-title">Konu Seç</div>
  <div class="cat-sub">Çalışmak istediğin konuyu seçerek başla</div>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="start-btn" onclick="startQuiz()">Başla →</button>
</div>

<div id="quiz-screen">
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="timer-wrap">
    <span class="timer-label">Süre:</span>
    <span class="timer-num" id="timer-num">20</span>
  </div>
  <div id="category-badge" class="category-badge"></div>
  <div class="question-card">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Sonraki Soru →</button>
</div>

<div id="result-screen">
  <div class="result-title">Sonuç</div>
  <div class="result-score" id="result-score"></div>
  <div class="result-label" id="result-label"></div>
  <div class="result-grid">
    <div class="result-stat"><div class="num" style="color:var(--correct)" id="res-correct">0</div><div class="lbl">Doğru</div></div>
    <div class="result-stat"><div class="num" style="color:var(--wrong)" id="res-wrong">0</div><div class="lbl">Yanlış</div></div>
    <div class="result-stat"><div class="num" style="color:var(--accent2)" id="res-skip">0</div><div class="lbl">Süre Doldu</div></div>
  </div>
  <button class="restart-btn" onclick="showCatScreen()">Yeniden Oyna</button>
  <button class="category-btn" onclick="restartSameCat()">Aynı Konuyu Tekrar Et</button>
</div>

<script>

// ---- YASAMA ----
ALL_QUESTIONS.push({cat:"Yasama", q:"TBMM Başkanlık seçiminde 1. ve 2. turda aranan oy çokluğu kaçtır?", a:"400", opts:["301","360","400","450"]});

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function showCatScreen() {
  document.getElementById('cat-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('header-stats').style.display = 'none';
  renderCatGrid();
}

function renderCatGrid() {
  var icons = {'Temel Hukuk':'⚖️','Anayasa Tarihi':'📜','Yasama':'🏛️','Yürütme':'🫅','Yargı':'🔨','İdare Hukuku':'🏢','Memurlar':'👨‍💼'};
  var grid = document.getElementById('cat-grid');
  var html = '';
  CATEGORIES.forEach(function(cat) {
    var count = 0;
    ALL_QUESTIONS.forEach(function(q) { if (q.cat === cat) count++; });
    var sel = selectedCats[cat] ? 'selected' : '';
    html += '<div class="cat-card ' + sel + '" onclick="toggleCat(\'' + cat + '\',this)">';
    html += '<div class="cat-icon">' + (icons[cat]||'📚') + '</div>';
    html += '<div class="cat-name">' + cat + '</div>';
    html += '<div class="cat-count">' + count + ' soru</div>';
    html += '</div>';
  });
  grid.innerHTML = html;
}

function toggleCat(cat, el) {
  var selCount = 0;
  CATEGORIES.forEach(function(c) { if (selectedCats[c]) selCount++; });
  if (selectedCats[cat]) {
    if (selCount === 1) return;
    selectedCats[cat] = false;
    el.classList.remove('selected');
  } else {
    selectedCats[cat] = true;
    el.classList.add('selected');
  }
}

function startQuiz() {
  lastSelectedCats = {};
  CATEGORIES.forEach(function(c) { lastSelectedCats[c] = selectedCats[c]; });
  var pool = [];
  ALL_QUESTIONS.forEach(function(q) { if (selectedCats[q.cat]) pool.push(q); });
  questions = shuffle(pool).slice(0, Math.min(20, pool.length));
  currentIdx = 0; correct = 0; wrong = 0; skipped = 0;
  document.getElementById('cat-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('header-stats').style.display = 'flex';
  updateStats();
  showQuestion();
}

function restartSameCat() {
  if (lastSelectedCats) {
    CATEGORIES.forEach(function(c) { selectedCats[c] = lastSelectedCats[c]; });
  }
  startQuiz();
}

function showQuestion() {
  if (currentIdx >= questions.length) { showResult(); return; }
  answered = false;
  clearInterval(timerInterval);
  timeLeft = 20;
  var q = questions[currentIdx];
  document.getElementById('category-badge').textContent = q.cat;
  document.getElementById('q-number').textContent = 'Soru ' + (currentIdx+1) + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';
  var opts = shuffle(q.opts);
  var keys = ['A','B','C','D'];
  var html = '';
  opts.forEach(function(o, i) {
    html += '<button class="option-btn" onclick="selectOption(this,\'' + o.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">';
    html += '<span class="key">' + keys[i] + '</span>' + o;
    html += '</button>';
  });
  document.getElementById('options').innerHTML = html;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';
  updateTimer();
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  updateTimer();
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    if (!answered) {
      answered = true;
      skipped++;
      updateStats();
      highlightCorrect();
      showFeedback(false, true);
      document.getElementById('next-btn').className = 'next-btn show';
      var btns = document.getElementById('options').getElementsByTagName('button');
      for (var i=0;i<btns.length;i++) btns[i].disabled = true;
    }
  }
}

function updateTimer() {
  var el = document.getElementById('timer-num');
  el.textContent = timeLeft;
  el.className = 'timer-num' + (timeLeft <= 5 ? ' danger' : '');
}

function selectOption(btn, chosen) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  var q = questions[currentIdx];
  var isCorrect = (chosen === q.a);
  if (isCorrect) {
    correct++;
    btn.classList.add('correct');
    btn.querySelector('.key').style.background = 'var(--correct)';
    btn.querySelector('.key').style.color = '#fff';
  } else {
    wrong++;
    btn.classList.add('wrong');
    btn.querySelector('.key').style.background = 'var(--wrong)';
    btn.querySelector('.key').style.color = '#fff';
    highlightCorrect();
  }
  updateStats();
  showFeedback(isCorrect, false);
  document.getElementById('next-btn').className = 'next-btn show';
  var btns = document.getElementById('options').getElementsByTagName('button');
  for (var i=0;i<btns.length;i++) btns[i].disabled = true;
}

function highlightCorrect() {
  var q = questions[currentIdx];
  var btns = document.getElementById('options').getElementsByTagName('button');
  for (var i=0;i<btns.length;i++) {
    var txt = btns[i].textContent.trim().replace(/^[ABCD]\s*/,'');
    if (txt === q.a || btns[i].textContent.indexOf(q.a) !== -1) {
      btns[i].classList.add('correct');
    }
  }
}

function showFeedback(isCorrect, timeout) {
  var fb = document.getElementById('feedback');
  var q = questions[currentIdx];
  if (timeout) {
    fb.textContent = 'Süre doldu! Doğru cevap: ' + q.a;
    fb.className = 'feedback wrong show';
  } else if (isCorrect) {
    fb.textContent = 'Doğru!';
    fb.className = 'feedback correct show';
  } else {
    fb.textContent = 'Yanlış! Doğru cevap: ' + q.a;
    fb.className = 'feedback wrong show';
  }
}

function updateStats() {
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong + skipped;
  document.getElementById('stat-total').textContent = currentIdx;
}

function nextQuestion() {
  currentIdx++;
  updateStats();
  showQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  var pct = Math.round((correct / questions.length) * 100);
  document.getElementById('result-score').textContent = '%' + pct;
  var label = pct >= 80 ? 'Harika! KPSS\'ye hazırsın.' : pct >= 60 ? 'İyi, biraz daha çalış.' : 'Tekrar çalışman gerekiyor.';
  document.getElementById('result-label').textContent = label;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skipped;
  document.getElementById('progress-bar').style.width = '100%';
}

showCatScreen();
</script>
</body>
</html>
