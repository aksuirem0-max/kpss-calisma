var DEPO_KEY = "s4_gecmis";
var adim = 0;
var cevaplar = {};
var secim = [];

function gecmisCek() {
  try { var v = localStorage.getItem(DEPO_KEY); if (v) return JSON.parse(v); } catch(e) {}
  return [];
}

function gecmisKaydet(s) {
  try {
    var g = gecmisCek();
    g.push(s);
    if (g.length > 20) g = g.slice(g.length - 20);
    localStorage.setItem(DEPO_KEY, JSON.stringify(g));
  } catch(e) {}
}

function yeniSecimYap() {
  var gecmis = gecmisCek();
  var deneme = 0, yeni;
  while (deneme < 50) {
    yeni = [];
    for (var i = 0; i < HAVUZ.length; i++) {
      yeni.push(Math.floor(Math.random() * HAVUZ[i].length));
    }
    var ayni = false;
    for (var g = 0; g < gecmis.length; g++) {
      var esit = true;
      for (var k = 0; k < yeni.length; k++) {
        if (gecmis[g][k] !== yeni[k]) { esit = false; break; }
      }
      if (esit) { ayni = true; break; }
    }
    if (!ayni) break;
    deneme++;
  }
  return yeni;
}

function soruGoster() {
  var s = HAVUZ[adim][secim[adim]];
  document.getElementById("soru-no").textContent = s.baslik;
  document.getElementById("puan-rozet").textContent = s.puan + " puan";
  document.getElementById("tema-rozet").textContent = s.tema;
  document.getElementById("soru-metin").innerHTML = (s.metin || "").replace(/\n/g, "<br>");

  var btnMetin = adim === 6 ? "✅ Bitir" : "➡️ Sonraki";

  if (s.mikro) {
    document.getElementById("cevap-kutu").style.display = "none";
    document.getElementById("mikro-kutu").style.display = "block";
    mikroOlustur(s.adimlar);
    document.getElementById("btn-mikro-ileri").textContent = btnMetin;
    document.getElementById("btn-mikro-ileri").disabled = true;
  } else {
    document.getElementById("mikro-kutu").style.display = "none";
    document.getElementById("cevap-kutu").style.display = "block";
    document.getElementById("cevap-alan").value = "";
    document.getElementById("karakter-say").textContent = "0 karakter";
    document.getElementById("btn-ileri").disabled = true;
    document.getElementById("btn-ileri").textContent = btnMetin;
    document.getElementById("cevap-alan").focus();
  }

  document.getElementById("ilerleme-sayi").textContent = adim + "/7";
  document.getElementById("ilerleme-bar").style.width = Math.round((adim/7)*100) + "%";
}

function mikroOlustur(adimlar) {
  var kap = document.getElementById("mikro-adimlar");
  kap.innerHTML = "";
  adimlar.forEach(function(a, idx) {
    var div = document.createElement("div");
    div.className = "mikro-adim";
    div.innerHTML =
      '<div class="mikro-adim-label">' + a.label + '</div>' +
      '<div class="mikro-adim-ipucu">' + a.ipucu + '</div>' +
      '<textarea id="mikro-' + idx + '" rows="' + (a.satirlar || 3) + '" placeholder="Burayı doldurun..." oninput="mikroDegisti()"></textarea>';
    kap.appendChild(div);
  });
}

function mikroDegisti() {
  var s = HAVUZ[adim][secim[adim]];
  var tamam = true;
  for (var i = 0; i < s.adimlar.length; i++) {
    var el = document.getElementById("mikro-" + i);
    if (!el || !el.value.trim()) { tamam = false; break; }
  }
  document.getElementById("btn-mikro-ileri").disabled = !tamam;
  document.getElementById("mikro-karakter").textContent = tamam ? "✓ Tüm alanlar dolu" : "Tüm alanları doldurun";
}

function mikroCevapBirlestir() {
  var s = HAVUZ[adim][secim[adim]];
  var parcalar = [];
  s.adimlar.forEach(function(a, idx) {
    var el = document.getElementById("mikro-" + idx);
    parcalar.push("[" + a.label + "]\n" + (el ? el.value.trim() : ""));
  });
  return parcalar.join("\n\n");
}

function ileri() {
  var yazi = document.getElementById("cevap-alan").value.trim();
  if (!yazi) return;
  cevaplar[adim] = yazi;
  adimIlerle();
}

function mikroIleri() {
  cevaplar[adim] = mikroCevapBirlestir();
  adimIlerle();
}

function adimIlerle() {
  if (adim >= 6) {
    gecmisKaydet(secim.slice());
    bittiGoster();
  } else {
    adim++;
    soruGoster();
  }
}

function bittiGoster() {
  document.getElementById("ust-bar").style.display = "none";
  document.getElementById("soru-kart").style.display = "none";
  document.getElementById("cevap-kutu").style.display = "none";
  document.getElementById("mikro-kutu").style.display = "none";
  document.getElementById("not-yazi").style.display = "none";
  document.getElementById("bitti-ekran").style.display = "block";

  var ozet = "";
  for (var i = 0; i < 7; i++) {
    var c = cevaplar[i] || "";
    var kisa = c.length > 50 ? c.slice(0,50) + "..." : c;
    ozet += '<div class="ozet-satir"><span class="ozet-no">S' + (i+1) + '</span><span class="ozet-metin">' + (kisa || "—") + '</span></div>';
  }
  document.getElementById("ozet-kutu").innerHTML = ozet;
}

function kopyala() {
  var txt = "CALIKUSU SENARYO 4 CEVAPLARI\n\n";
  for (var i = 0; i < 7; i++) {
    var s = HAVUZ[i][secim[i]];
    txt += "SORU " + (i+1) + " (" + s.puan + " puan):\n";
    txt += (cevaplar[i] || "(bos)") + "\n\n";
  }
  var el = document.createElement("textarea");
  el.value = txt;
  el.setAttribute("readonly","");
  el.style.position = "fixed";
  el.style.left = "-9999px";
  document.body.appendChild(el);
  el.focus(); el.select(); el.setSelectionRange(0, 99999);
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(el);
  var btn = document.getElementById("btn-kopyala");
  btn.textContent = "✅ Kopyalandı! WhatsApp'a yapıştır.";
  btn.classList.add("kopyalandi");
  setTimeout(function() {
    btn.textContent = "📋 Cevapları Kopyala (WhatsApp için)";
    btn.classList.remove("kopyalandi");
  }, 3000);
}

function sifirla() {
  adim = 0;
  cevaplar = {};
  secim = yeniSecimYap();
  document.getElementById("bitti-ekran").style.display = "none";
  document.getElementById("ust-bar").style.display = "block";
  document.getElementById("soru-kart").style.display = "block";
  document.getElementById("not-yazi").style.display = "block";
  soruGoster();
}

// Normal textarea event
document.getElementById("cevap-alan").addEventListener("input", function() {
  var v = this.value.trim();
  document.getElementById("btn-ileri").disabled = !v;
  document.getElementById("karakter-say").textContent = this.value.length + " karakter";
});
document.getElementById("cevap-alan").addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key === "Enter") ileri();
});

secim = yeniSecimYap();
soruGoster();
