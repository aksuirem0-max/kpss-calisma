<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Tarih 2000 - Soru Bankası</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#09090f;color:#e2d8c8;font-family:Georgia,"Times New Roman",serif;min-height:100vh}
  .zarf{max-width:700px;margin:0 auto;padding:20px 16px}
  .kbaslik{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#8b7355;margin-bottom:8px}
  .btn{cursor:pointer;border:none;border-radius:6px;font-family:inherit;font-size:15px;transition:all .15s;padding:12px 18px}
  .btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .card{background:#0f0f1a;border:1px solid #1c1c2e;border-radius:10px;padding:18px;margin-bottom:12px}
  .bar{height:4px;background:#14142a;border-radius:2px;overflow:hidden;margin-bottom:20px}
  .baric{height:100%;background:linear-gradient(90deg,#c9a227,#e8c86a);border-radius:2px;transition:width .4s}
  input{font-family:inherit;width:100%;padding:13px 15px;background:#0a0a14;border:1px solid #2a2a3e;border-radius:7px;color:#e2d8c8;font-size:15px;outline:none;margin-bottom:10px}
  input:focus{border-color:#c9a227}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .dogru-kutu{background:#0d1e0d;border:1px solid #2a4a2a;border-radius:8px;padding:14px;margin-bottom:12px}
  .yanlis-kutu{background:#1e1a0c;border:1px solid #3a3010;border-radius:8px;padding:12px;margin-bottom:12px}
  .flip-wrap{perspective:600px;height:200px;cursor:pointer;margin-bottom:18px}
  .flip-inner{position:relative;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .flip-inner.open{transform:rotateY(180deg)}
  .ff,.fb{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
  .ff{background:#0f0f1a;border:1px solid #1c1c2e}
  .fb{background:#0d1e0d;border:1px solid #2a4a2a;transform:rotateY(180deg)}
  .an{animation:fi .35s ease}
  @keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0f0f1a}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
  .arama-sonuc{max-height:240px;overflow-y:auto;margin-top:12px}
  .arama-item{border-bottom:1px solid #1a1a2a;padding:8px 4px}
  .konu-scroll{max-height:400px;overflow-y:auto}
  .ust{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .sure{color:#c9a227;font-size:13px;font-variant-numeric:tabular-nums}
  .soru-kutu{background:#0f0f1a;border:1px solid #1c1c2e;border-radius:10px;padding:24px;font-size:17px;line-height:1.65;margin-bottom:18px;min-height:90px;display:flex;align-items:center}
  #ekran-ana,#ekran-quiz,#ekran-flash,#ekran-sonuc{display:none}
  .hidden{display:none!important}
  .analiz-satir{margin-bottom:10px}
  .as-ust{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
  .yanlis-liste{max-height:300px;overflow-y:auto}
  .yanlis-item{border-bottom:1px solid #2a1414;padding-bottom:10px;margin-bottom:10px}
  h1{font-size:clamp(24px,6vw,44px);color:#c9a227;font-weight:normal;letter-spacing:-1px;margin:6px 0}
  .merkez{text-align:center;padding:28px 0 20px}
  .buyuk-no{font-size:52px;font-weight:bold;line-height:1}
  .alt-bilgi{color:#5a5060;font-size:14px;margin-top:8px}
  .emoji-buyuk{font-size:52px;margin-bottom:8px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}

  /* Konu kartı */
  .konu-kart{
    border-radius:10px;border:1px solid #1c1c2e;
    padding:14px 16px;margin-bottom:10px;
    cursor:pointer;transition:all .15s;
    display:flex;align-items:flex-start;gap:12px;
    background:#0f0f1a;
  }
  .konu-kart:hover{border-color:#3a3050;background:#12121f}
  .konu-kart.secili{border-color:#c9a227;background:#c9a22710}
  .konu-no{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:bold;flex-shrink:0;margin-top:2px;
    background:#1a1a2e;color:#8b7355;
  }
  .konu-icerik{flex:1;min-width:0}
  .konu-adi{font-size:14px;color:#d0c8b8;margin-bottom:4px}
  .konu-donem{font-size:11px;color:#5a5060;margin-bottom:6px}
  .konu-badge{
    display:inline-block;padding:3px 8px;border-radius:12px;
    font-size:11px;font-weight:bold;margin-bottom:6px;
  }
  .konu-istatistik{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .konu-ort{font-size:12px;color:#9a8a6a}
  .konu-bar-wrap{flex:1;min-width:60px}
  .konu-bar{height:3px;background:#1a1a2e;border-radius:2px;overflow:hidden}
  .konu-bar-ic{height:100%;border-radius:2px;transition:width .4s}
  .konu-adet{font-size:11px;color:#5a5060;white-space:nowrap}
  .konu-yillar{display:flex;gap:3px;margin-top:6px}
  .konu-yil-kutu{
    width:20px;height:20px;border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:bold;color:#09090f;
    flex-shrink:0;
  }
  .oncelik-baslik{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:#6b5a3a;margin:16px 0 8px;padding-left:4px;
  }
  .secim-buton{
    width:100%;padding:14px;background:#c9a227;color:#09090f;
    font-size:15px;font-weight:bold;letter-spacing:1px;
    border:none;border-radius:8px;cursor:pointer;
    transition:all .15s;margin-top:4px;font-family:inherit;
  }
  .secim-buton:hover{filter:brightness(1.1)}
  .tumunu-sec{
    font-size:12px;color:#8b7355;cursor:pointer;
    border:1px solid #2a2a3e;background:transparent;
    border-radius:6px;padding:6px 12px;font-family:inherit;
  }
  .tumunu-sec:hover{border-color:#c9a227;color:#c9a227}
  .mod-secim{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .mod-kart{
    padding:14px;border-radius:8px;border:1px solid #1c1c2e;
    background:transparent;cursor:pointer;transition:all .15s;text-align:left;
    font-family:inherit;color:#e2d8c8;
  }
  .mod-kart.aktif{background:#c9a22718;border-color:#c9a227}
  .mod-kart:hover{border-color:#3a3050}
  .tab-bar{display:flex;gap:0;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #1c1c2e}
  .tab{flex:1;padding:10px;text-align:center;font-size:13px;cursor:pointer;background:#0f0f1a;color:#6b6050;border:none;font-family:inherit;transition:all .15s}
  .tab.aktif{background:#c9a22720;color:#c9a227}
  .tab:hover:not(.aktif){background:#141420;color:#9a8a6a}
</style>
</head>
<body>
<div class="zarf">

<!-- ANA EKRAN -->
<div id="ekran-ana">
  <div class="merkez">
    <div class="kbaslik">KPSS Hazırlık</div>
    <h1>Tarih 2000</h1>
    <p style="color:#5a5060;font-size:13px" id="toplam-bilgi"></p>
  </div>

  <!-- Tab -->
  <div class="tab-bar">
    <button class="tab aktif" onclick="tabSec('quiz-tab')" id="tab-quiz">✍️ Quiz & Flashcard</button>
    <button class="tab" onclick="tabSec('arama-tab')" id="tab-arama">🔍 Arama</button>
  </div>

  <!-- QUIZ TAB -->
  <div id="quiz-tab">
    <div class="card">
      <div class="kbaslik" style="margin-bottom:12px">Çalışma Modu</div>
      <div class="mod-secim">
        <button class="mod-kart aktif" id="mod-quiz" onclick="modSec('quiz')">
          <div style="font-size:14px;margin-bottom:3px">✍️ Quiz Modu</div>
          <div style="font-size:12px;color:#5a5060">Cevabı yaz, kontrol et</div>
        </button>
        <button class="mod-kart" id="mod-flash" onclick="modSec('flashcard')">
          <div style="font-size:14px;margin-bottom:3px">🃏 Flashcard</div>
          <div style="font-size:12px;color:#5a5060">Karta bak, işaretle</div>
        </button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="kbaslik" style="margin-bottom:0">Konu Seçimi — Kronolojik Sıra</div>
        <button class="tumunu-sec" onclick="tumunuSec()">Tümünü Seç</button>
      </div>
      <p style="font-size:11px;color:#4a4050;margin-bottom:12px">🔥 = Kesinlikle çıkar &nbsp; ⚡ = Yüksek &nbsp; 📌 = Orta &nbsp; 💤 = Düşük &nbsp; (Kaynak: ÖSYM 2018–2025)</p>
      <div class="konu-scroll" id="konu-listesi"></div>
    </div>

    <button class="secim-buton" onclick="baslat()" id="baslat-btn">BAŞLAT</button>
  </div>

  <!-- ARAMA TAB -->
  <div id="arama-tab" class="hidden">
    <div class="card">
      <div class="kbaslik">Soru / Cevap Ara</div>
      <input type="text" id="arama-input" placeholder="Anahtar kelime girin..." oninput="aramaYap()">
      <div id="arama-bilgi" style="font-size:12px;color:#5a5060"></div>
      <div class="arama-sonuc hidden" id="arama-sonuclar"></div>
    </div>
  </div>
</div>

<!-- QUIZ EKRANI -->
<div id="ekran-quiz">
  <div class="ust">
    <span style="color:#5a5060;font-size:13px" id="q-ilerleme"></span>
    <span class="sure" id="q-sure">00:00</span>
  </div>
  <div class="bar"><div class="baric" id="q-bar" style="width:0%"></div></div>
  <div class="kbaslik" id="q-konu"></div>
  <div class="soru-kutu" id="q-soru"></div>
  <div id="q-giris">
    <input type="text" id="q-input" placeholder="Cevabınızı yazın... (Enter)">
    <div class="grid2">
      <button class="btn" onclick="kontrolEt()" style="background:#c9a227;color:#09090f;font-weight:bold">Kontrol Et</button>
      <button class="btn" onclick="bilmiyorum()" style="background:#1a1a2e;color:#7a6a5a;border:1px solid #2a2a3e">Bilmiyorum</button>
    </div>
  </div>
  <div id="q-cevap" class="hidden an">
    <div class="dogru-kutu">
      <div style="font-size:11px;color:#5a9a5a;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px">Doğru Cevap</div>
      <div style="font-size:16px;color:#80cc80" id="q-dogru-metin"></div>
    </div>
    <div class="yanlis-kutu hidden" id="q-verilen-kutu">
      <div style="font-size:11px;color:#8a7a3a;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Sizin Cevabınız</div>
      <div style="color:#b0a060" id="q-verilen-metin"></div>
    </div>
    <div class="grid2">
      <button class="btn" onclick="cevapla(true)" style="padding:14px;background:#183018;color:#70d070;border:1px solid #2a6a2a;font-size:16px">✓ Doğru Bildim</button>
      <button class="btn" onclick="cevapla(false)" style="padding:14px;background:#301818;color:#d07070;border:1px solid #6a2a2a;font-size:16px">✗ Yanlış Bildim</button>
    </div>
  </div>
  <button class="btn" onclick="anaEkran()" style="margin-top:18px;width:100%;padding:9px;background:transparent;color:#3a3040;border:1px solid #1c1c2e;font-size:12px">← Ana Ekrana Dön</button>
</div>

<!-- FLASHCARD EKRANI -->
<div id="ekran-flash">
  <div class="ust">
    <span style="color:#5a5060;font-size:13px" id="f-ilerleme"></span>
    <span class="sure" id="f-sure">00:00</span>
  </div>
  <div class="bar"><div class="baric" id="f-bar" style="width:0%"></div></div>
  <div class="kbaslik" id="f-konu"></div>
  <div class="flip-wrap" onclick="kartCevir()">
    <div class="flip-inner" id="flip-inner">
      <div class="ff">
        <div style="font-size:11px;color:#3a3040;letter-spacing:2px;margin-bottom:12px">SORU — dokunarak çevir</div>
        <div style="font-size:16px;line-height:1.6" id="f-soru"></div>
      </div>
      <div class="fb">
        <div style="font-size:11px;color:#5a9a5a;letter-spacing:2px;margin-bottom:12px">CEVAP</div>
        <div style="font-size:20px;color:#80cc80;line-height:1.4" id="f-cevap"></div>
      </div>
    </div>
  </div>
  <div id="f-butonlar" class="hidden an">
    <div class="grid2">
      <button class="btn" onclick="flashIleri(true)" style="padding:15px;background:#183018;color:#70d070;border:1px solid #2a6a2a;font-size:16px">✓ Bildim</button>
      <button class="btn" onclick="flashIleri(false)" style="padding:15px;background:#301818;color:#d07070;border:1px solid #6a2a2a;font-size:16px">✗ Bilmedim</button>
    </div>
  </div>
  <div id="f-ipucu" style="text-align:center;color:#2a2030;font-size:12px;margin-top:8px">Cevabı görmek için karta dokunun</div>
  <button class="btn" onclick="anaEkran()" style="margin-top:18px;width:100%;padding:9px;background:transparent;color:#3a3040;border:1px solid #1c1c2e;font-size:12px">← Ana Ekrana Dön</button>
</div>

<!-- SONUÇ EKRANI -->
<div id="ekran-sonuc">
  <div class="merkez">
    <div class="emoji-buyuk" id="s-emoji"></div>
    <div class="kbaslik">Sonuç</div>
    <div class="buyuk-no" id="s-oran"></div>
    <div class="alt-bilgi" id="s-bilgi"></div>
  </div>
  <div class="card">
    <div class="kbaslik" style="margin-bottom:14px">Konu Analizi</div>
    <div id="s-analiz"></div>
  </div>
  <div class="card hidden" id="s-yanlis-card" style="background:#190e0e;border-color:#3a1c1c">
    <div class="kbaslik" style="color:#9a5050;margin-bottom:12px" id="s-yanlis-baslik"></div>
    <div class="yanlis-liste" id="s-yanlis-liste"></div>
  </div>
  <div class="grid2" id="s-butonlar"></div>
</div>

</div><!-- /zarf -->

// --- Yardımcılar ---
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function sureFmt(s) {
  return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
}
function sureyiBaslat() {
  sure=0; clearInterval(sureIv);
  sureIv = setInterval(()=>{
    sure++;
    const qs = document.getElementById("q-sure");
    const fs = document.getElementById("f-sure");
    if(qs) qs.textContent = sureFmt(sure);
    if(fs) fs.textContent = sureFmt(sure);
  },1000);
}
function sureyiDurdur(){ clearInterval(sureIv); }
function goster(id){
  ["ekran-ana","ekran-quiz","ekran-flash","ekran-sonuc"].forEach(e=>{
    document.getElementById(e).style.display="none";
  });
  document.getElementById(id).style.display="block";
}
function tabSec(tab) {
  aktifTab = tab;
  ["quiz-tab","arama-tab"].forEach(t=>{
    document.getElementById(t).classList.add("hidden");
  });
  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("tab-quiz").className = "tab" + (tab==="quiz-tab"?" aktif":"");
  document.getElementById("tab-arama").className = "tab" + (tab==="arama-tab"?" aktif":"");
}

function badgeStyle(etiket) {
  if(etiket.includes("KESİNLİKLE")) return "background:#e05c0030;color:#e08060;border:1px solid #e05c0050";
  if(etiket.includes("YÜKSEK")) return "background:#c9a22730;color:#c9a227;border:1px solid #c9a22750";
  if(etiket.includes("ORTA")) return "background:#b8860b20;color:#b8860b;border:1px solid #b8860b40";
  return "background:#2a2a3e;color:#6b6050;border:1px solid #3a3050";
}
function barRenk(etiket) {
  if(etiket.includes("KESİNLİKLE")) return "linear-gradient(90deg,#e05c00,#ff8040)";
  if(etiket.includes("YÜKSEK")) return "linear-gradient(90deg,#c9a227,#e8c86a)";
  if(etiket.includes("ORTA")) return "linear-gradient(90deg,#8b7355,#b09070)";
  return "linear-gradient(90deg,#3a3a5a,#5a5a7a)";
}
function yilKutuRenk(sayi) {
  if(sayi >= 5) return "#e05c00";
  if(sayi >= 3) return "#c9a227";
  if(sayi >= 1) return "#6b7355";
  return "#1a1a2e";
}
function yilKutuTextRenk(sayi) {
  return sayi === 0 ? "#3a3a5a" : "#09090f";
}

  const gruplar = [
    {etiket:"🔥 KESİNLİKLE ÇIKAR", renk:"#e05c00", aciklama:"Her yıl kesinlikle soru çıkan konular"},
    {etiket:"⚡ YÜKSEK", renk:"#c9a227", aciklama:"Yüksek olasılıkla soru çıkan konular"},
    {etiket:"📌 ORTA", renk:"#b8860b", aciklama:"Orta sıklıkla soru çıkan konular"},
    {etiket:"💤 DÜŞÜK", renk:"#6b6050", aciklama:"Seyrek soru çıkan konular"},
  ];

  gruplar.forEach(g => {
    const grupdakiler = KONULAR_KPSS.filter(k=>k.etiket===g.etiket).sort((a,b)=>a.sira-b.sira);
    if(!grupdakiler.length) return;
    html += `<div style="font-size:11px;color:${g.renk};letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px 2px;font-weight:bold">${g.etiket} — ${g.aciklama}</div>`;
    grupdakiler.forEach(k=>{
      const adet = SORULAR_HAM.filter(s=>s.konu===k.konu).length;
      const maxYil = Math.max(...k.yillar, 1);
      const barYuzde = Math.min((k.ortalama / 7) * 100, 100);
      const secili = seciliKonular.has(k.konu);

      html += `<div class="konu-kart ${secili?"secili":""}" onclick="konuToggle('${k.konu.replace(/'/g,"\'")}')">
        <div class="konu-no" style="${secili?"background:#c9a22730;color:#c9a227":""}">${k.sira}</div>
        <div class="konu-icerik">
          <div class="konu-adi">${k.konu}</div>
          <div class="konu-donem">📅 ${k.donem}</div>
          <span class="konu-badge" style="${badgeStyle(k.etiket)}">${k.etiket}</span>
          <div class="konu-istatistik">
            <span class="konu-ort">Ort: <strong style="color:#e2d8c8">${k.ortalama}</strong> soru/yıl</span>
            <div class="konu-bar-wrap">
              <div class="konu-bar"><div class="konu-bar-ic" style="width:${barYuzde}%;background:${barRenk(k.etiket)}"></div></div>
            </div>
            <span class="konu-adet">${adet} soru</span>
          </div>
          <div class="konu-yillar">
            ${YILLAR.map((y,i)=>`<div style="text-align:center"><div style="font-size:8px;color:#3a3a5a;margin-bottom:2px">${y.slice(2)}</div><div class="konu-yil-kutu" style="background:${yilKutuRenk(k.yillar[i])};color:${yilKutuTextRenk(k.yillar[i])}">${k.yillar[i]||"·"}</div></div>`).join("")}
          </div>
        </div>
      </div>`;
    });
  });

  div.innerHTML = html;

  // Başlat butonu
  document.getElementById("baslat-btn").textContent =
    `BAŞLAT → ${toplamSoru} SORU (${seciliArr.length} konu)`;
  goster("ekran-ana");
}

function konuToggle(konu) {
  if(seciliKonular.has(konu)) {
    if(seciliKonular.size > 1) seciliKonular.delete(konu);
  } else {
    seciliKonular.add(konu);
  }
  renderAna();
}

function tumunuSec() {
  if(seciliKonular.size === KONULAR_KPSS.length) {
    // Hepsini kaldır, en yükseği seç
    seciliKonular = new Set(["Atatürk İlkeleri ve İnkılaplar","Kurtuluş Savaşı"]);
  } else {
    seciliKonular = new Set(KONULAR_KPSS.map(k=>k.konu));
  }
  renderAna();
}

function modSec(m) {
  mod = m;
  document.getElementById("mod-quiz").className = "mod-kart" + (m==="quiz"?" aktif":"");
  document.getElementById("mod-flash").className = "mod-kart" + (m==="flashcard"?" aktif":"");
}

function aramaYap() {
  const q = document.getElementById("arama-input").value;
  const sonucDiv = document.getElementById("arama-sonuclar");
  const bilgiDiv = document.getElementById("arama-bilgi");
  if(q.length < 2) {
    sonucDiv.classList.add("hidden");
    bilgiDiv.textContent = "";
    return;
  }
  const sonuc = SORULAR_HAM.filter(s=>
    s.soru.toLowerCase().includes(q.toLowerCase()) ||
    s.cevap.toLowerCase().includes(q.toLowerCase())
  );
  bilgiDiv.textContent = sonuc.length + " sonuç bulundu" + (sonuc.length>50?" (ilk 50 gösteriliyor)":"");
  sonucDiv.classList.remove("hidden");
  sonucDiv.innerHTML = sonuc.slice(0,50).map(s=>
    `<div class="arama-item">
      <div style="font-size:11px;color:#5a5060;margin-bottom:2px">${s.konu}</div>
      <div style="font-size:13px;color:#b0a090;margin-bottom:3px">${s.id}) ${s.soru}</div>
      <div style="font-size:13px;color:#70c070">→ ${s.cevap}</div>
    </div>`
  ).join("");
}

// --- Quiz ---
function baslat() {
  const filtreli = SORULAR_HAM.filter(s=>seciliKonular.has(s.konu));
  if(!filtreli.length) return;
  sorular = shuffle(filtreli);
  idx=0; sonuclar=[]; mevcutCevap="";
  yanlisSorular=[];
  sureyiBaslat();
  if(mod==="quiz") renderQuiz();
  else renderFlash();
}

function renderQuiz() {
  const s = sorular[idx];
  document.getElementById("q-ilerleme").textContent = (idx+1)+" / "+sorular.length;
  document.getElementById("q-bar").style.width = (idx/sorular.length*100)+"%";
  document.getElementById("q-konu").textContent = s.konu;
  document.getElementById("q-soru").textContent = s.soru;
  document.getElementById("q-input").value = "";
  document.getElementById("q-giris").classList.remove("hidden");
  document.getElementById("q-cevap").classList.add("hidden");
  goster("ekran-quiz");
  setTimeout(()=>document.getElementById("q-input").focus(),100);
}

function kontrolEt() {
  mevcutCevap = document.getElementById("q-input").value;
  gosterCevap();
}
function bilmiyorum() { mevcutCevap=""; gosterCevap(); }
function gosterCevap() {
  const s = sorular[idx];
  document.getElementById("q-dogru-metin").textContent = s.cevap;
  if(mevcutCevap) {
    document.getElementById("q-verilen-kutu").classList.remove("hidden");
    document.getElementById("q-verilen-metin").textContent = mevcutCevap;
  } else {
    document.getElementById("q-verilen-kutu").classList.add("hidden");
  }
  document.getElementById("q-giris").classList.add("hidden");
  document.getElementById("q-cevap").classList.remove("hidden");
}
function cevapla(dogru) {
  const s = sorular[idx];
  sonuclar.push({...s,dogru,verilen:mevcutCevap});
  if(!dogru) yanlisSorular.push(s);
  idx++;
  if(idx>=sorular.length){sureyiDurdur();renderSonuc();}
  else renderQuiz();
}

// --- Flashcard ---
function renderFlash() {
  const s = sorular[idx];
  document.getElementById("f-ilerleme").textContent = (idx+1)+" / "+sorular.length;
  document.getElementById("f-bar").style.width = (idx/sorular.length*100)+"%";
  document.getElementById("f-konu").textContent = s.konu;
  document.getElementById("f-soru").textContent = s.soru;
  document.getElementById("f-cevap").textContent = s.cevap;
  flashAcik=false;
  document.getElementById("flip-inner").classList.remove("open");
  document.getElementById("f-butonlar").classList.add("hidden");
  document.getElementById("f-ipucu").style.display="block";
  goster("ekran-flash");
}
function kartCevir(){
  flashAcik=!flashAcik;
  document.getElementById("flip-inner").classList.toggle("open",flashAcik);
  document.getElementById("f-butonlar").classList.toggle("hidden",!flashAcik);
  document.getElementById("f-ipucu").style.display=flashAcik?"none":"block";
}
function flashIleri(dogru){
  const s=sorular[idx];
  sonuclar.push({...s,dogru});
  if(!dogru) yanlisSorular.push(s);
  idx++;
  if(idx>=sorular.length){sureyiDurdur();renderSonuc();}
  else renderFlash();
}

// --- Sonuç ---
function renderSonuc(){
  const dogru=sonuclar.filter(s=>s.dogru).length;
  const yanlis=sonuclar.filter(s=>!s.dogru).length;
  const oran=Math.round((dogru/sorular.length)*100);
  document.getElementById("s-emoji").textContent=oran>=80?"🏆":oran>=60?"👍":"📚";
  document.getElementById("s-oran").textContent=oran+"%";
  document.getElementById("s-oran").style.color=oran>=80?"#80cc80":oran>=60?"#c9a227":"#d07070";
  document.getElementById("s-bilgi").textContent=dogru+" doğru / "+yanlis+" yanlış • "+sureFmt(sure);
  const a={};
  sonuclar.forEach(s=>{
    if(!a[s.konu])a[s.konu]={dogru:0,toplam:0};
    a[s.konu].toplam++;
    if(s.dogru)a[s.konu].dogru++;
  });
  document.getElementById("s-analiz").innerHTML=Object.entries(a).map(([k,v])=>{
    const y=Math.round((v.dogru/v.toplam)*100);
    const r=y>=70?"linear-gradient(90deg,#3a9a3a,#70d070)":"linear-gradient(90deg,#9a3a3a,#d07070)";
    return `<div class="analiz-satir"><div class="as-ust"><span style="color:#b0a080">${k}</span><span style="color:${y>=70?"#80cc80":"#d07070"}">${v.dogru}/${v.toplam}</span></div><div class="bar"><div class="baric" style="width:${y}%;background:${r}"></div></div></div>`;
  }).join("");
  if(yanlisSorular.length>0){
    document.getElementById("s-yanlis-card").classList.remove("hidden");
    document.getElementById("s-yanlis-baslik").textContent="Yanlış Yapılanlar ("+yanlisSorular.length+")";
    document.getElementById("s-yanlis-liste").innerHTML=sonuclar.filter(s=>!s.dogru).map(s=>
      `<div class="yanlis-item"><div style="font-size:13px;color:#b09080;margin-bottom:3px">${s.id}) ${s.soru}</div><div style="font-size:13px;color:#70c070">✓ ${s.cevap}</div>${s.verilen?`<div style="font-size:12px;color:#9a6060">✗ ${s.verilen}</div>`:""}</div>`
    ).join("");
  } else {
    document.getElementById("s-yanlis-card").classList.add("hidden");
  }
  let btnHtml="";
  if(yanlisSorular.length>0) btnHtml+=`<button class="btn" onclick="tekrarYanlis()" style="padding:13px;background:#241010;color:#d09090;border:1px solid #4a2020;font-size:13px">🔁 Yanlışları Tekrar</button>`;
  btnHtml+=`<button class="btn" onclick="yenidenBasla()" style="padding:13px;background:#c9a227;color:#09090f;font-weight:bold;${yanlisSorular.length?"":"grid-column:1/-1"}">Ana Ekrana Dön</button>`;
  document.getElementById("s-butonlar").innerHTML=btnHtml;
  goster("ekran-sonuc");
}
function tekrarYanlis(){
  sorular=shuffle(yanlisSorular); idx=0; sonuclar=[]; mevcutCevap="";
  sureyiBaslat();
  if(mod==="flashcard")renderFlash(); else renderQuiz();
}
function yenidenBasla(){ yanlisSorular=[]; renderAna(); }
function anaEkran(){ sureyiDurdur(); renderAna(); }

// Enter key
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("q-input").addEventListener("keydown",function(e){
    if(e.key==="Enter") kontrolEt();
  });
  renderAna();
});
</script>
</body>
</html>
