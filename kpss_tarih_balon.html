<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

  :root {
    --bg: #0a0a1a;
    --accent: #e8c547;
    --green: #4caf78;
    --red: #e85d47;
    --text: #f0ede8;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
  }

  /* ── MENÜ ── */
  #menu {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  #menu.gizli { display: none; }

  .menu-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem; letter-spacing: 4px;
    color: var(--accent); margin-bottom: 4px;
  }
  .menu-sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 32px; }

  .bolum-listesi {
    width: 100%; max-width: 420px;
    max-height: 60vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
  }
  .bolum-btn {
    background: #111127;
    border: 1px solid #2a2a4a;
    border-left: 4px solid var(--accent);
    padding: 14px 16px;
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s; text-align: left; color: var(--text);
  }
  .bolum-btn:hover { background: #16163a; transform: translateX(3px); }
  .b-icon { font-size: 1.3rem; }
  .b-info { flex: 1; }
  .b-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 1px; }
  .b-desc { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
  .b-say { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--accent); }

  /* ── OYUN ── */
  #oyun {
    display: none; flex-direction: column;
    height: 100dvh; position: relative;
    overflow: hidden;
  }
  #oyun.aktif { display: flex; }

  /* Arka plan yıldızlar */
  #oyun::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(71,100,232,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(232,71,197,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── ÜSTTE SORU BANDI ── */
  #soru-bant {
    background: linear-gradient(135deg, #1a1a3e 0%, #0d1030 100%);
    border-bottom: 3px solid var(--accent);
    padding: 12px 16px 14px;
    position: relative; z-index: 10;
    flex-shrink: 0;
  }
  #soru-bolum {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; color: var(--accent);
    letter-spacing: 2px; margin-bottom: 6px;
  }
  #soru-metin {
    font-size: 1.05rem; font-weight: 600;
    color: #fff; line-height: 1.3;
    text-align: center;
  }

  /* ── SKOR BAR ── */
  #skor-bar {
    display: flex; gap: 0; align-items: stretch;
    background: #0d0d20; border-bottom: 1px solid #1a1a3a;
    flex-shrink: 0;
  }
  .skor-item {
    flex: 1; padding: 6px 10px;
    display: flex; align-items: center; justify-content: center;
    gap: 5px; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; border-right: 1px solid #1a1a3a;
  }
  .skor-item:last-child { border-right: none; }
  .skor-n { font-size: 1rem; font-weight: 700; }
  .sn-dogru { color: var(--green); }
  .sn-yanlis { color: var(--red); }
  .sn-kalan { color: var(--accent); }
  .sn-sure { color: var(--accent); }

  /* SURE BAR */
  #sure-wrap { height: 5px; background: #1a1a3a; flex-shrink: 0; }
  #sure-bar { height: 5px; background: var(--green); transition: width 0.25s linear; }

  /* ── OYUN ALANI ── */
  #arena {
    flex: 1; position: relative; overflow: hidden;
  }

  /* ── BALONLAR ── */
  .balon {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
    will-change: transform, top;
  }
  .balon:active { transform: scale(0.93); }
  .balon-ic {
    font-size: 0.78rem;
    font-weight: 600;
    color: #fff;
    padding: 8px;
    line-height: 1.2;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    width: 100%;
    text-align: center;
  }

  /* Yanlış animasyon */
  @keyframes yanlisAnim {
    0% { transform: scale(1); }
    30% { transform: scale(1.2); background: rgba(232,93,71,0.9) !important; }
    60% { transform: scale(0.8); }
    100% { transform: scale(0); opacity: 0; }
  }
  .balon.patladi-yanlis {
    animation: yanlisAnim 0.4s ease forwards;
    pointer-events: none;
  }

  /* Kalıcı kırmızı — patlama yok, yerinde durur */
  .balon.patladi-yanlis-sabit {
    border: 3px solid var(--red) !important;
    background: rgba(232,93,71,0.55) !important;
    box-shadow: 0 0 24px rgba(232,93,71,0.7) !important;
    pointer-events: none;
    animation: titretBalon 0.3s ease;
  }
  @keyframes titretBalon {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Doğru animasyon */
  @keyframes dogruAnim {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(0); opacity: 0; }
  }
  .balon.patladi-dogru {
    animation: dogruAnim 0.35s ease forwards;
    pointer-events: none;
  }

  /* Parçacık */
  .parca {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: parcaAnim 0.6s ease-out forwards;
  }
  @keyframes parcaAnim {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Doğru mesaj */
  .dogru-mesaj {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
    pointer-events: none;
    animation: mesajAnim 0.8s ease forwards;
    z-index: 50;
  }
  @keyframes mesajAnim {
    0% { transform: scale(0.5); opacity: 1; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: translateY(-40px) scale(1); opacity: 0; }
  }

  /* ── OVERLAY MESAJLAR ── */
  #overlay {
    position: absolute; inset: 0; z-index: 100;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
  }
  #overlay.aktif { display: flex; }
  .ov-baslik {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; color: var(--accent); margin-bottom: 8px;
  }
  .ov-stats {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem; color: var(--muted);
    line-height: 1.8; text-align: center; margin-bottom: 24px;
  }
  .ov-stats span { color: var(--text); }
  .ov-aciklama {
    background: #111127; border: 1px solid #2a2a4a;
    border-left: 3px solid var(--accent3, #47c5e8);
    padding: 12px 16px; border-radius: 4px;
    font-size: 0.82rem; color: #ccc;
    max-width: 300px; margin-bottom: 20px;
    line-height: 1.5;
  }
  .ov-btn {
    background: var(--accent); color: #000;
    border: none; padding: 13px 28px;
    border-radius: 6px; font-weight: 700;
    font-size: 1rem; cursor: pointer; margin: 4px;
    transition: background 0.15s;
  }
  .ov-btn:hover { background: #f0d060; }
  .ov-btn-sek {
    background: none; border: 1px solid #333;
    color: var(--text); padding: 11px 20px;
    border-radius: 6px; font-size: 0.85rem;
    cursor: pointer; margin: 4px;
  }

  /* GERI BUTONU */
  #geri-btn {
    position: absolute; top: 8px; right: 8px; z-index: 20;
    background: rgba(0,0,0,0.5); border: 1px solid #333;
    color: var(--muted); padding: 5px 10px;
    border-radius: 4px; font-size: 0.72rem; cursor: pointer;
  }

  /* CAN */
  #canlar {
    display: flex; gap: 3px;
    font-size: 1rem; align-items: center;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* MÜZİK ÇALAR */
  #muzik-calar { position:fixed; bottom:16px; right:16px; z-index:999; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,0.5); min-width:220px; }
  .mc-btn { background:none; border:none; cursor:pointer; font-size:1.1rem; padding:0; line-height:1; }
  .mc-bilgi { flex:1; }
  .mc-parca { font-size:0.68rem; color:#e8c547; font-family:'IBM Plex Mono',monospace; }
  .mc-durum { font-size:0.6rem; color:#666; }
  .mc-ses { width:55px; accent-color:#e8c547; cursor:pointer; }
</style>
</head>

        "s": "Amasya Genelgesi sonrasında ne dedi?",
        "c": "\"Artık İstanbul Anadolu'ya hakim değil, tabi olmak zorundadır!\"",
        "a": "",
        "t": "soz"
      },
      {
        "s": "Bursa Olayı'nda ne söyledi?",
        "c": "\"Bu bir din meselesi değil, dil meselesidir.\"",
        "a": "Ezanın Türkçe okunması meselesinde.",
        "t": "soz"
      },
      {
        "s": "Hatay Sorunu'nda ne söyledi?",
        "c": "\"Hatay, benim şahsi meselemdir.\"",
        "a": "",
        "t": "soz"
      }
    ]
  }
];


// ── OYUN CONFIG ──
const BALON_SAYISI = 4;       // ekranda 4 balon
const BALON_BOYUT = 100;      // px (mobil için)
const YUKSELIS_SURE = 8000;   // ms — balonlar bu sürede yukarı çıkar
const SURE_SANIYE = 30;
const MAX_CAN = 3;
const RENK_PALETI = [
  'rgba(71,100,232,0.85)',
  'rgba(232,71,197,0.8)',
  'rgba(71,197,232,0.8)',
  'rgba(197,71,232,0.8)',
  'rgba(232,150,71,0.85)',
  'rgba(71,232,150,0.8)',
];

// ── STATE ──
let aktifBolum = null;
let sorular = [];
let soruIdx = 0;
let mevcutSoru = null;
let dogruSayisi = 0;
let yanlisSayisi = 0;
let can = MAX_CAN;
let sureKalan = SURE_SANIYE;
let sureInterval = null;
let balonlar = [];       // { el, dogru, animFrame, startY, targetY, startTime }
let oyunBitti = false;
let balonAnimFrame = null;

// ── MENÜ ──
function initMenu() {
  const liste = document.getElementById('bolum-listesi');
  liste.innerHTML = '';
  BOLUMLER.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'bolum-btn';
    btn.onclick = () => bolumAc(i);
    btn.innerHTML = `
      <span class="b-icon">${b.icon}</span>
      <div class="b-info">
        <div class="b-name">${b.ad}</div>
        <div class="b-desc">${b.aciklama}</div>
      </div>
      <span class="b-say">${b.kartlar.length} soru</span>
    `;
    liste.appendChild(btn);
  });
}

function anaMenuye() {
  temizle();
  document.getElementById('menu').classList.remove('gizli');
  document.getElementById('oyun').classList.remove('aktif');
  document.getElementById('overlay').classList.remove('aktif');
}

// ── BÖLÜM AÇ ──
function bolumAc(i) {
  aktifBolum = BOLUMLER[i];
  sorular = shuffle([...aktifBolum.kartlar]);
  soruIdx = 0;
  dogruSayisi = 0;
  yanlisSayisi = 0;
  can = MAX_CAN;
  oyunBitti = false;

  document.getElementById('menu').classList.add('gizli');
  document.getElementById('oyun').classList.add('aktif');
  document.getElementById('soru-bolum').textContent = aktifBolum.icon + ' ' + aktifBolum.ad;
  document.getElementById('overlay').classList.remove('aktif');

  guncelleUI();
  sonrakiSoru();
}

// ── SORU ──
function sonrakiSoru() {
  temizle();
  document.getElementById('overlay').classList.remove('aktif');

  if (soruIdx >= sorular.length) {
    oyunSonu('tum-bitti');
    return;
  }

  mevcutSoru = sorular[soruIdx];
  soruIdx++;
  oyunBitti = false;
  soruKilitli = false;
  yanlisVurulanlar = new Set();
  buSorudaCanYakti = false;

  document.getElementById('soru-metin').textContent = mevcutSoru.s;

  const dogruTip = mevcutSoru.t || 'genel';

  // 1. Aynı bölüm + aynı tip
  let havuz = shuffle(aktifBolum.kartlar.filter(k => k.c !== mevcutSoru.c && k.t === dogruTip)).map(k => k.c);

  // 2. Aynı bölüm, farklı tip
  if (havuz.length < BALON_SAYISI - 1) {
    const ek = shuffle(aktifBolum.kartlar.filter(k => k.c !== mevcutSoru.c && k.t !== dogruTip && !havuz.includes(k.c))).map(k => k.c);
    havuz = [...havuz, ...ek];
  }

  // 3. Diğer bölümler, aynı tip
  if (havuz.length < BALON_SAYISI - 1) {
    const ek = shuffle(BOLUMLER.filter(b => b !== aktifBolum).flatMap(b => b.kartlar).filter(k => k.c !== mevcutSoru.c && k.t === dogruTip && !havuz.includes(k.c))).map(k => k.c);
    havuz = [...havuz, ...ek];
  }

  // 4. Her şeyden
  if (havuz.length < BALON_SAYISI - 1) {
    const ek = shuffle(BOLUMLER.flatMap(b => b.kartlar).filter(k => k.c !== mevcutSoru.c && !havuz.includes(k.c))).map(k => k.c);
    havuz = [...havuz, ...ek];
  }

  const yanlisCevaplar = havuz.slice(0, BALON_SAYISI - 1);

  // 4 seçenek: 1 doğru + 3 yanlış, karışık
  const secenekler = shuffle([
    { metin: mevcutSoru.c, dogru: true },
    ...yanlisCevaplar.map(c => ({ metin: c, dogru: false }))
  ]);

  // Balonları oluştur — süreyi balonlar hazır olduktan sonra başlat
  balonlariOlustur(secenekler);

  // En son balonun çıkış gecikmesi: (BALON_SAYISI-1)*400ms + balonun ekrana gelme süresi (~1sn)
  const sureBaslangicGecikmesi = (BALON_SAYISI - 1) * 400 + 1200;
  setTimeout(() => {
    if (soruKilitli) return; // Bu arada soru çözüldüyse başlatma
    sureKalan = SURE_SANIYE;
    guncelleSure();
    sureInterval = setInterval(() => {
      sureKalan--;
      guncelleSure();
      if (sureKalan <= 0) {
        temizleSure();
        sureDoldu();
      }
    }, 1000);
  }, sureBaslangicGecikmesi);
}

// ── BALONLAR ──
function balonlariOlustur(secenekler) {
  const arena = document.getElementById('arena');
  // Eski balonları temizle
  arena.querySelectorAll('.balon').forEach(b => b.remove());
  balonlar = [];

  const arenaW = arena.offsetWidth;
  const arenaH = arena.offsetHeight;
  const bolumGenislik = arenaW / BALON_SAYISI;

  secenekler.forEach((sec, i) => {
    const el = document.createElement('div');
    el.className = 'balon';

    const renk = RENK_PALETI[i % RENK_PALETI.length];
    el.style.cssText = `
      width: ${BALON_BOYUT}px;
      height: ${BALON_BOYUT}px;
      background: ${renk};
      box-shadow: 0 0 20px ${renk}, inset 0 -10px 20px rgba(0,0,0,0.3), inset 0 5px 10px rgba(255,255,255,0.15);
      left: ${bolumGenislik * i + (bolumGenislik - BALON_BOYUT) / 2}px;
      top: ${arenaH + 20}px;
    `;

    el.innerHTML = `<div class="balon-ic">${sec.metin}</div>`;
    el.addEventListener('click', () => balonaTiklandi(el, sec, i));

    arena.appendChild(el);

    // Animasyon bilgisi — hız bazlı, sekme var
    const hiz = 0.04 + Math.random() * 0.04; // px/ms — yavaş yükseliş
    const obj = {
      el,
      dogru: sec.dogru,
      idx: i,
      x: bolumGenislik * i + (bolumGenislik - BALON_BOYUT) / 2,
      y: arenaH + 20 + Math.random() * 80,   // başlangıç konumu (altta)
      vy: -(hiz),                              // negatif = yukarı
      startTime: performance.now() + i * 400, // sırayla çık
      done: false,
      renk,
    };
    balonlar.push(obj);
  });

  // Animasyon döngüsü
  if (balonAnimFrame) cancelAnimationFrame(balonAnimFrame);
  animasyonDongusu(performance.now());
}

function animasyonDongusu(now) {
  if (soruKilitli) return;

  const arena = document.getElementById('arena');
  const arenaH = arena.offsetHeight;
  const TAVAN = 10;          // üst duvar (px)
  const TABAN = arenaH - BALON_BOYUT - 10; // alt sınır
  const SEKME_KAYIP = 0.82;  // her sekmede hızın %82'si korunur

  let hepsiBekliyor = true;

  balonlar.forEach(b => {
    if (b.done) return;

    // Henüz çıkma zamanı gelmediyse bekle
    if (now < b.startTime) return;
    hepsiBekliyor = false;

    // dt hesapla (ms cinsinden)
    if (!b.lastTime) b.lastTime = now;
    const dt = Math.min(now - b.lastTime, 50); // max 50ms (tab arkaplanda kalırsa)
    b.lastTime = now;

    // Konum güncelle
    b.y += b.vy * dt;

    // Hafif yatay sallanma
    const sallanma = Math.sin(now / 700 + b.idx * 2.1) * 7;

    // Üst duvara çarptı mı? → sek aşağı
    if (b.y <= TAVAN) {
      b.y = TAVAN;
      b.vy = Math.abs(b.vy) * SEKME_KAYIP; // aşağı doğru sekme
      // Minimum hız — durmasın
      if (b.vy < 0.02) b.vy = 0.02 + Math.random() * 0.02;
    }

    // Alt sınıra çarptı mı? → sek yukarı
    if (b.y >= TABAN) {
      b.y = TABAN;
      b.vy = -Math.abs(b.vy) * SEKME_KAYIP; // yukarı doğru sekme
      if (Math.abs(b.vy) < 0.03) b.vy = -(0.03 + Math.random() * 0.03);
    }

    b.el.style.top = b.y + 'px';
    b.el.style.left = (b.x + sallanma) + 'px';
  });

  balonAnimFrame = requestAnimationFrame(animasyonDongusu);
}

// ── TIKLAMA ──
let yanlisVurulanlar = new Set();
let soruKilitli = false;
let buSorudaCanYakti = false; // bu soruda zaten can yaktıysa tekrar yakma

function balonaTiklandi(el, sec, idx) {
  if (soruKilitli) return;
  if (yanlisVurulanlar.has(idx)) return;
  if (el.classList.contains('patladi-yanlis-sabit')) return;

  if (sec.dogru) {
    // ── DOĞRU ──
    soruKilitli = true;
    dogruSayisi++;
    el.classList.add('patladi-dogru');
    parcaciklar(el, var_yesil_renk());
    temizleSure();
    if (balonAnimFrame) { cancelAnimationFrame(balonAnimFrame); balonAnimFrame = null; }
    guncelleUI();
    if (can <= 0) {
      setTimeout(() => oyunSonu('can-bitti'), 400);
    } else if (soruIdx >= sorular.length) {
      setTimeout(() => oyunSonu('tum-bitti'), 400);
    } else {
      setTimeout(() => sonrakiSoru(), 400);
    }
  } else {
    // ── YANLIŞ ── kırmızı işaretle, yanlış say
    yanlisVurulanlar.add(idx);
    yanlisSayisi++;

    // Can: bu soruda ilk yanlışta 1 can yak, sonrakiler sadece yanlış sayar
    if (!buSorudaCanYakti) {
      buSorudaCanYakti = true;
      can--;
    }

    el.classList.add('patladi-yanlis-sabit');
    parcaciklar(el, '#e85d47');
    guncelleUI();

    if (can <= 0) {
      soruKilitli = true;
      temizleSure();
      if (balonAnimFrame) { cancelAnimationFrame(balonAnimFrame); balonAnimFrame = null; }
      setTimeout(() => oyunSonu('can-bitti'), 600);
    }
  }
}

function soruSonuOverlay(tip) {
  // Balonları durdur
  if (balonAnimFrame) cancelAnimationFrame(balonAnimFrame);

  const overlay = document.getElementById('overlay');
  const baslik = document.getElementById('ov-baslik');
  const stats = document.getElementById('ov-stats');
  const aciklama = document.getElementById('ov-aciklama');
  const devamBtn = document.getElementById('ov-devam');

  if (tip === 'dogru') {
    baslik.textContent = '✓ DOĞRU!';
    baslik.style.color = 'var(--green)';
  } else if (tip === 'yanlis') {
    baslik.textContent = '✗ YANLIŞ!';
    baslik.style.color = 'var(--red)';
  } else {
    baslik.textContent = '⏱ SÜRE DOLDU!';
    baslik.style.color = 'var(--accent)';
  }

  // Doğru cevabı göster
  const dogCevap = mevcutSoru.c;
  const dogAciklama = mevcutSoru.a;

  stats.innerHTML = `
    Doğru cevap: <span style="color:var(--green)">${dogCevap}</span><br>
    ${dogruSayisi} doğru · <span style="color:var(--red)">${yanlisSayisi} yanlış</span> · ${canIkonlari()}
  `;

  if (dogAciklama) {
    aciklama.style.display = 'block';
    aciklama.textContent = dogAciklama;
  } else {
    aciklama.style.display = 'none';
  }

  if (can <= 0) {
    devamBtn.textContent = 'Yeniden Oyna';
    devamBtn.onclick = () => bolumAc(BOLUMLER.indexOf(aktifBolum));
  } else if (soruIdx >= sorular.length) {
    devamBtn.textContent = 'Bitti! Menü';
    devamBtn.onclick = anaMenuye;
  } else {
    devamBtn.textContent = `Devam → (${sorular.length - soruIdx} kaldı)`;
    devamBtn.onclick = () => {
      if (can <= 0) { oyunSonu('can-bitti'); return; }
      sonrakiSoru();
    };
  }

  overlay.classList.add('aktif');

  if (can <= 0) {
    setTimeout(() => oyunSonu('can-bitti'), 1200);
  }
}

function sureDoldu() {
  if (soruKilitli) return;
  // Süre dolunca sadece sayacı sıfırla — can düşme, balonlar devam etsin
  sureKalan = SURE_SANIYE;
  guncelleSure();
  sureInterval = setInterval(() => {
    sureKalan--;
    guncelleSure();
    if (sureKalan <= 0) {
      temizleSure();
      sureDoldu();
    }
  }, 1000);
}

function oyunSonu(neden) {
  temizle();
  const overlay = document.getElementById('overlay');
  const baslik = document.getElementById('ov-baslik');
  const stats = document.getElementById('ov-stats');
  const aciklama = document.getElementById('ov-aciklama');
  const devamBtn = document.getElementById('ov-devam');

  aciklama.style.display = 'none';

  if (neden === 'can-bitti') {
    baslik.textContent = '💀 CANLAR BİTTİ';
    baslik.style.color = 'var(--red)';
  } else {
    baslik.textContent = '🏆 TAMAMLANDI!';
    baslik.style.color = 'var(--accent)';
  }

  const pct = sorular.length > 0 ? Math.round((dogruSayisi / soruIdx) * 100) : 0;
  stats.innerHTML = `
    <span>${dogruSayisi}</span> doğru · <span style="color:var(--red)">${yanlisSayisi}</span> yanlış<br>
    ${soruIdx} sorudan <span>${pct}%</span> başarı<br>
    Bölüm: <span>${aktifBolum.ad}</span>
  `;

  devamBtn.textContent = '↺ Tekrar';
  devamBtn.onclick = () => bolumAc(BOLUMLER.indexOf(aktifBolum));
  overlay.classList.add('aktif');
}

// ── YARDIMCI ──
function parcaciklar(el, renk) {
  const arena = document.getElementById('arena');
  const r = el.getBoundingClientRect();
  const ar = arena.getBoundingClientRect();
  const cx = r.left - ar.left + r.width / 2;
  const cy = r.top - ar.top + r.height / 2;

  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'parca';
    const angle = (i / 10) * Math.PI * 2;
    const dist = 40 + Math.random() * 40;
    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      background: ${renk};
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
    `;
    arena.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

function guncelleSure() {
  const bar = document.getElementById('sure-bar');
  const txt = document.getElementById('s-sure');
  const pct = (sureKalan / SURE_SANIYE) * 100;
  bar.style.width = pct + '%';
  if (pct < 30) bar.style.background = 'var(--red)';
  else if (pct < 60) bar.style.background = 'var(--accent)';
  else bar.style.background = 'var(--green)';
  txt.textContent = sureKalan + 's';
}

function guncelleUI() {
  document.getElementById('s-dogru').textContent = dogruSayisi;
  document.getElementById('s-yanlis').textContent = yanlisSayisi;
  document.getElementById('canlar-wrap').textContent = canIkonlari();
}

function canIkonlari() {
  return '❤️'.repeat(Math.max(can, 0)) + '🖤'.repeat(Math.max(MAX_CAN - can, 0));
}

function var_yesil_renk() { return '#4caf78'; }

function temizleSure() {
  if (sureInterval) { clearInterval(sureInterval); sureInterval = null; }
}

function temizle() {
  temizleSure();
  if (balonAnimFrame) { cancelAnimationFrame(balonAnimFrame); balonAnimFrame = null; }
  const arena = document.getElementById('arena');
  arena.querySelectorAll('.balon, .parca').forEach(e => e.remove());
  balonlar = [];
  oyunBitti = true;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

initMenu();
</script>

<div id="muzik-calar">
  <button class="mc-btn" onclick="oncekiParca()">⏮️</button>
  <button class="mc-btn" id="mc-pp" onclick="muzikToggle()">▶️</button>
  <button class="mc-btn" onclick="sonrakiParca()">⏭️</button>
  <div class="mc-bilgi">
    <div class="mc-parca" id="mc-parca">Yükleniyor...</div>
    <div class="mc-durum" id="mc-durum">Sessiz — sesi aç →</div>
  </div>
  <input class="mc-ses" type="range" min="0" max="1" step="0.05" value="0" id="mc-ses" oninput="sesAyarla(this.value)">
  <span style="font-size:0.9rem;cursor:pointer;" onclick="var s=document.getElementById('mc-ses');s.value=s.value==0?0.5:0;sesAyarla(s.value);">🔊</span>
</div>
<audio id="muzik-player" preload="none"></audio>
<script>
// ── MÜZİK — GitHub API otomatik ──
let PARCALAR = [];
let mevcutParca = 0;
let muzikBasladi = false;
const player = document.getElementById('muzik-player');
player.volume = 0;
player.addEventListener('ended', () => { mevcutParca = (mevcutParca + 1) % PARCALAR.length; parcaYukle(true); });
async function muzikListesiYukle() {
  try {
    const res = await fetch('https://api.github.com/repos/aksuirem0-max/kpss-calisma/contents/');
    const dosyalar = await res.json();
    PARCALAR = dosyalar.filter(d => d.type === 'file' && /\.(mp3|mpeg|ogg|wav|m4a)$/i.test(d.name)).map(d => ({ url: 'https://raw.githubusercontent.com/aksuirem0-max/kpss-calisma/main/' + d.name, ad: d.name.replace(/\.[^.]+$/, '') }));
    if (PARCALAR.length > 0) { document.getElementById('mc-parca').textContent = PARCALAR[0].ad + ' · 1 / ' + PARCALAR.length; document.getElementById('mc-durum').textContent = PARCALAR.length + ' parça — sesi aç →'; parcaYukle(false); }
    else { document.getElementById('mc-durum').textContent = 'Müzik bulunamadı'; }
  } catch(e) { document.getElementById('mc-durum').textContent = 'Bağlantı hatası'; }
}
function parcaYukle(oyna) {
  if (PARCALAR.length === 0) return;
  player.src = PARCALAR[mevcutParca].url;
  document.getElementById('mc-parca').textContent = PARCALAR[mevcutParca].ad + ' · ' + (mevcutParca + 1) + ' / ' + PARCALAR.length;
  if (oyna) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = 'Çalıyor'; }
}
function muzikToggle() {
  if (!muzikBasladi) { muzikBasladi = true; parcaYukle(true); return; }
  if (player.paused) { player.play().catch(()=>{}); document.getElementById('mc-pp').textContent = '⏸️'; document.getElementById('mc-durum').textContent = player.volume === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor'; }
  else { player.pause(); document.getElementById('mc-pp').textContent = '▶️'; document.getElementById('mc-durum').textContent = 'Duraklatıldı'; }
}
function sesAyarla(val) {
  player.volume = parseFloat(val);
  if (!muzikBasladi && parseFloat(val) > 0) { muzikBasladi = true; parcaYukle(true); }
  document.getElementById('mc-durum').textContent = parseFloat(val) === 0 ? 'Sessiz — sesi aç →' : 'Çalıyor';
}
function oncekiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca - 1 + PARCALAR.length) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
function sonrakiParca() { if (PARCALAR.length === 0) return; mevcutParca = (mevcutParca + 1) % PARCALAR.length; muzikBasladi = true; parcaYukle(true); }
window.addEventListener('load', () => { muzikListesiYukle(); });
</script>
